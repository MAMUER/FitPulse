version: "2"

run:
  timeout: 10m

linters:
  enable:
    # Базовые
    - errcheck
    - govet
    - ineffassign
    - unused
    - staticcheck
    - gofmt
    - goimports
    # Security-oriented
    - gosec
    - goconst
    - gochecknoglobals
    - nilerr
    - bodyclose
    - noctx
    - prealloc
    - errorlint
    - exhaustive
    - copyloopvar
    - fatcontext
    - wrapcheck
    - rowserrcheck
    # Complexity & maintainability
    - gocyclo
    - gocognit
    - funlen
    - dupl
    - nestif
    # Code style
    - misspell
    - wsl
  settings:
    gosec:
      severity: medium
      confidence: medium
    govet:
      enable-all: true
    staticcheck:
      checks: ["all", "-SA1029"]
    # Code-smell thresholds (Вирт: «простота — основа надёжности»)
    # Установлены ВЫШЕ худшего существующего кода.
    # Новые функции должны быть ПРОЩЕ. Со временем пороги снижать.
    gocyclo:
      min-complexity: 30
    gocognit:
      min-complexity: 45
    funlen:
      lines: 220
      statements: 90
    dupl:
      threshold: 160
    misspell:
      locale: "US"
