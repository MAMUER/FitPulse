version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

output:
  format: colored-line-number

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - unused
    - staticcheck
    - gosec
    - bodyclose
    - rowserrcheck
    - errorlint
    - copyloopvar
    - gocyclo
    - gocognit
    - funlen
    - dupl
    - misspell
  disable:
    - gochecknoglobals
    - gochecknoinits
    - nilerr
    - wrapcheck
    - noctx
    - prealloc
    - exhaustive
    - fatcontext
    - nestif
    - revive
  settings:
    gosec:
      severity: medium
      confidence: medium
    govet:
      enable-all: false
      checks:
        - all
        - "-SA1029"
        - "-fieldalignment"
    staticcheck:
      checks: ["all", "-SA1029"]
    gocyclo:
      min-complexity: 30
    gocognit:
      min-complexity: 45
    funlen:
      lines: 220
      statements: 90
    dupl:
      threshold: 160
    misspell:
      locale: "US"

issues:
  new: false
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - gocognit
        - funlen
        - dupl
        - bodyclose
        - rowserrcheck
        - errorlint
    - path: api/gen/.*\.go
      linters:
        - all
    - linters:
        - govet
      text: "fieldalignment"
    - path: mocks/.*\.go|mock_.*\.go
      linters:
        - gocyclo
        - gocognit
        - funlen
        - dupl
        - bodyclose
        - rowserrcheck
        - errorlint
  max-issues-per-linter: 0
  max-same-issues: 0
