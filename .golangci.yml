version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true
  modules-download-mode: readonly
  go: "1.26"

output:
  formats:
    text:
      path: stdout
      colors: true
      print-linter-name: true
      print-issued-lines: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - unused
    - staticcheck
    - gosec
    - bodyclose
    - rowserrcheck
    - errorlint
    - copyloopvar
    - gocyclo
    - gocognit
    - funlen
    - dupl
    - misspell
    - unparam
    - nakedret
    - perfsprint
  disable:
    - gochecknoglobals
    - gochecknoinits
    - nilerr
    - wrapcheck
    - noctx
    - prealloc
    - fatcontext
    - nestif
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocyclo
          - gocognit
          - funlen
          - dupl
          - bodyclose
          - rowserrcheck
          - errorlint
      - path: api/gen/.*\.go
        linters:
          - all
      - path: mocks/.*\.go|mock_.*\.go
        linters:
          - gocyclo
          - gocognit
          - funlen
          - dupl
          - bodyclose
          - rowserrcheck
          - errorlint
  settings:
    nakedret:
      max-func-lines: 30
    gosec:
      severity: medium
      confidence: medium
    govet:
      enable-all: true
      disable:
        - fieldalignment
    staticcheck:
      checks:
        - all
        - -SA1029
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 100
      statements: 50
    dupl:
      threshold: 100
    misspell:
      locale: "US"

formatters:
  enable:
    - gci
    - gofmt
  exclusions:
    paths:
      - third_party$
      - builtin$
      - std$
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/MAMUER/project)
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
