services:
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fitness}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../configs/k8s/base/jobs/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-fitness}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fitness-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitness-network

  # ML сервисы (уже обучены, просто запускаем API)
  ml-classifier:
    image: ghcr.io/MAMUER/Project/ml-classifier:latest
    container_name: fitness-ml-classifier
    ports:
      - "${ML_CLASSIFIER_PORT:-8001}:8001"
    volumes:
      - ../models:/app/models
      - ../datasets:/app/datasets
    environment:
      - KERAS_BACKEND=tensorflow
      - ML_ASYNC=true
      - ML_CONSUMER_THREADS=3
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  ml-generator:
    image: ghcr.io/mamuer/project/ml-generator:latest
    container_name: fitness-ml-generator
    ports:
      - "${ML_GENERATOR_PORT:-8002}:8002"
    volumes:
      - ../models:/app/models
    environment:
      - KERAS_BACKEND=tensorflow
      - ML_ASYNC=true
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

# Go микросервисы
  user-service:
    image: ghcr.io/mamuer/project/user-service:latest
    container_name: fitness-user-service
    env_file:
      - .env
    ports:
      - "${USER_SERVICE_PORT:-50051}:50051"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-fitness_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-fitness}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@fitpulse.app}
      - SMTP_TLS=${SMTP_TLS:-false}
      - EMAIL_DAILY_LIMIT=${EMAIL_DAILY_LIMIT:-100}
      - EMAIL_SKIP_DOMAINS=${EMAIL_SKIP_DOMAINS:-}
      - BASE_URL=${BASE_URL:-https://localhost:8443}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: fitness-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MP_MAX_MESSAGES=5000
    networks:
      - fitness-network
    restart: unless-stopped

  biometric-service:
    image: ghcr.io/mamuer/project/biometric-service:latest
    container_name: fitness-biometric-service
    ports:
      - "${BIOMETRIC_SERVICE_PORT:-50052}:50052"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-fitness_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-fitness}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  device-connector:
    image: ghcr.io/mamuer/project/device-connector:latest
    container_name: fitness-device-connector
    ports:
      - "${DEVICE_CONNECTOR_PORT:-8082}:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-fitness_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-fitness}
      - DB_SSLMODE=disable
      - BIOMETRIC_SERVICE_ADDR=biometric-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      biometric-service:
        condition: service_started
    networks:
      - fitness-network
    restart: unless-stopped

  training-service:
    image: ghcr.io/mamuer/project/training-service:latest
    container_name: fitness-training-service
    ports:
      - "${TRAINING_SERVICE_PORT:-50053}:50053"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-fitness_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-fitness}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - ML_ASYNC=false
      - ML_CLASSIFIER_URL=http://ml-classifier:8001
      - ML_GENERATOR_URL=http://ml-generator:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-classifier:
        condition: service_started
      ml-generator:
        condition: service_started
    networks:
      - fitness-network
    restart: unless-stopped

  gateway:
    image: ghcr.io/mamuer/project/gateway:latest
    container_name: fitness-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ../web:/app/web:ro
    environment:
      - USER_SERVICE_ADDR=user-service:50051
      - BIOMETRIC_SERVICE_ADDR=biometric-service:50052
      - TRAINING_SERVICE_ADDR=training-service:50053
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ML_CLASSIFIER_URL=http://ml-classifier:8001
      - ML_GENERATOR_URL=http://ml-generator:8002
      - DEVICE_CONNECTOR_URL=http://device-connector:8082
      - ML_ASYNC=true
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}@rabbitmq:5672/
      - REDIS_HOST=redis
      - DATABASE_URL=postgres://${POSTGRES_USER:-fitness_admin}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-fitness}?sslmode=disable
    depends_on:
      user-service:
        condition: service_started
      biometric-service:
        condition: service_started
      training-service:
        condition: service_started
      device-connector:
        condition: service_started
      ml-classifier:
        condition: service_started
      ml-generator:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  # ELK Stack для централизованного логирования
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: fitness-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fitness-network
    restart: unless-stopped

  logstash:
    image: logstash:8.11.0
    container_name: fitness-logstash
    ports:
      - "${LOGSTASH_PORT:-5044}:5044"
    volumes:
      - ../configs/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ../configs/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      - LS_JAVA_OPTS=-Xmx256m -Xms256m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  kibana:
    image: kibana:8.11.0
    container_name: fitness-kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - fitness-network
    restart: unless-stopped

  # Prometheus Stack для метрик и алертов
  prometheus:
    image: prom/prometheus:latest
    container_name: fitness-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../configs/prometheus_rules.yml:/etc/prometheus/prometheus_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - fitness-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fitness-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../configs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - fitness-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: fitness-alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ../configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - fitness-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: fitness-node-exporter
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - fitness-network
    restart: unless-stopped

  nginx-proxy:
    image: nginx:latest
    ports:
      - "8443:8443"
      - "80:80"
    volumes:
      - ../deploy/tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../deploy/tls/certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
    networks:
      - fitness-network

networks:
  fitness-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data: