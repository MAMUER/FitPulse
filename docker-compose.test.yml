# Лёгкая тестовая среда для CI и локальной разработки
services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./configs/k8s/base/jobs/init-db.sql:/docker-entrypoint-initdb.d/init.sql

  valkey-test:
    image: valkey/valkey:9-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq-test:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: testuser
      RABBITMQ_DEFAULT_PASS: testpass
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service-test:
    build:
      context: .
      dockerfile: cmd/user-service/Dockerfile
    environment:
      DB_HOST: postgres-test
      DB_PORT: 5432
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
      DB_SSLMODE: disable
      REDIS_HOST: valkey-test
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://testuser:testpass@rabbitmq-test:5672/
      JWT_PRIVATE_KEY_PEM: test_ec_private_key_placeholder_for_smoke_tests_only
      TOTP_ENCRYPTION_KEY: test_totp_key_32bytes_long_str!!
      GOOGLE_CLIENT_ID: test-google-client-id.apps.googleusercontent.com
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@fitpulse.test
    depends_on:
       postgres-test:
         condition: service_healthy
       valkey-test:
         condition: service_healthy
       rabbitmq-test:
        condition: service_healthy
    ports:
      - "50054:50051"

  gateway-test:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    environment:
      USER_SERVICE_ADDR: user-service-test:50051
      JWT_PRIVATE_KEY_PEM: test_ec_private_key_placeholder_for_smoke_tests_only
      JWT_PUBLIC_KEY_PEM: test_ec_public_key_placeholder_for_smoke_tests_only
      REDIS_HOST: valkey-test
      REDIS_PORT: 6379
      DATABASE_URL: postgres://testuser:testpass@postgres-test:5432/testdb?sslmode=disable
    depends_on:
       user-service-test:
         condition: service_started
       valkey-test:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_test_data:
