# Hadolint configuration for FitPulse project

ignored:
  # DL3018: Pin versions in apk add.
  # We intentionally skip version pinning for Alpine packages:
  # 1. The Alpine version is pinned by the base image (golang:1.26-alpine / alpine:3.24).
  # 2. `apk add` resolves from that specific release, so unpinned names are broadly stable.
  # 3. Hard pinning would require exact per-image package hashes (e.g. git=X-r0).
  - DL3018

  # DL3008: Pin versions in apt get install.
  # Same reasoning as DL3018, but for Debian/Ubuntu-based images (if any).
  - DL3008

  # DL3059: Multiple consecutive RUN instructions.
  # We prefer readability and layer clarity over minimal layer count.
  - DL3059

trustedRegistries:
  - docker.io
  - ghcr.io
