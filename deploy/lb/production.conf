# Production Nginx config for fittpulse.duckdns.org
load_module modules/ngx_http_modsecurity_module.so;
modsecurity on;
modsecurity_rules_file /etc/nginx/modsecurity.conf;
upstream k3s_http {
    server 127.0.0.1:30080; # ingress-nginx NodePort (replaces Traefik 30080)
    keepalive 32;
}

# Redirect HTTP to HTTPS — catch-all for both domain and IP
server {
    listen 80 default_server;
    server_tokens off;
    server_name fittpulse.duckdns.org 2.27.32.242 _;

    # Let Certbot verify domain ownership for auto-renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — accepts both domain and direct IP access
server {
    listen 443 ssl http2 default_server;
    server_tokens off;
    server_name fittpulse.duckdns.org 2.27.32.242 _;

    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity.conf;

    # SSL certificates from Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/fittpulse.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fittpulse.duckdns.org/privkey.pem;

    # OCSP Must-Staple / Certificate Transparency
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/fittpulse.duckdns.org/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # TLS 1.3 only (no TLS 1.2)
    ssl_protocols TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (включаем, так как теперь сертификаты настоящие)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(); microphone=(); geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Proxy to k3s (HTTP backend)
    location / {
        proxy_pass http://k3s_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://k3s_http/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}