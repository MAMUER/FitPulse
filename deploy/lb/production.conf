# Production Nginx config for fittpulse.duckdns.org
upstream k3s_http {
    server 127.0.0.1:30080; # Ingress NodePort для HTTP
    keepalive 32;
}

# Redirect HTTP to HTTPS — catch-all for both domain and IP
server {
    listen 80 default_server;
    server_name fittpulse.duckdns.org 2.27.32.242 _;

    # Let Certbot verify domain ownership for auto-renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — accepts both domain and direct IP access
server {
    listen 443 ssl http2 default_server;
    server_name fittpulse.duckdns.org 2.27.32.242 _;

    # SSL certificates from Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/fittpulse.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fittpulse.duckdns.org/privkey.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (включаем, так как теперь сертификаты настоящие)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to k3s (HTTP backend)
    location / {
        proxy_pass http://k3s_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://k3s_http/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}