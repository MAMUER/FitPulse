syntax = "proto3";

package user;

option go_package = "github.com/MAMUER/project/api/gen/user";

service UserService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc RegisterWithInvite(RegisterWithInviteRequest) returns (RegisterResponse);
    rpc ConfirmEmail(ConfirmEmailRequest) returns (ConfirmEmailResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc AuthenticateGoogle(AuthenticateGoogleRequest) returns (LoginResponse);
    rpc GetProfile(GetProfileRequest) returns (UserProfile);
    rpc UpdateProfile(UpdateProfileRequest) returns (UserProfile);
    rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
    rpc ChangeEmail(ChangeEmailRequest) returns (ChangeEmailResponse);
    rpc UploadProfilePhoto(UploadProfilePhotoRequest) returns (UploadProfilePhotoResponse);
    rpc RemoveProfilePhoto(RemoveProfilePhotoRequest) returns (RemoveProfilePhotoResponse);
    rpc ChangeNickname(ChangeNicknameRequest) returns (ChangeNicknameResponse);
    rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
    rpc AddDevice(AddDeviceRequest) returns (AddDeviceResponse);
    rpc RemoveDevice(RemoveDeviceRequest) returns (RemoveDeviceResponse);
    rpc SyncDeviceData(SyncDeviceDataRequest) returns (SyncDeviceDataResponse);
    rpc GetTrainingStats(GetTrainingStatsRequest) returns (GetTrainingStatsResponse);
    rpc GetAchievements(GetAchievementsRequest) returns (GetAchievementsResponse);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
    rpc ValidateInviteCode(ValidateInviteCodeRequest) returns (ValidateInviteCodeResponse);
    rpc SetupTOTP(SetupTOTPRequest) returns (SetupTOTPResponse);
    rpc ConfirmTOTP(ConfirmTOTPRequest) returns (ConfirmTOTPResponse);
    rpc VerifyTOTP(VerifyTOTPRequest) returns (VerifyTOTPResponse);
    rpc DisableTOTP(DisableTOTPRequest) returns (DisableTOTPResponse);
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
    rpc ListHealthConditions(ListHealthConditionsRequest) returns (ListHealthConditionsResponse);
    rpc UpsertHealthCondition(UpsertHealthConditionRequest) returns (HealthCondition);
    rpc DeleteHealthCondition(DeleteHealthConditionRequest) returns (DeleteHealthConditionResponse);
    rpc ListBodyComposition(ListBodyCompositionRequest) returns (ListBodyCompositionResponse);
    rpc CreateBodyComposition(CreateBodyCompositionRequest) returns (BodyCompositionRecord);
    rpc ListMenstrualCycles(ListMenstrualCyclesRequest) returns (ListMenstrualCyclesResponse);
    rpc CreateMenstrualCycle(CreateMenstrualCycleRequest) returns (MenstrualCycle);
    rpc UpdateMenstrualCycle(UpdateMenstrualCycleRequest) returns (MenstrualCycle);
    rpc DeleteMenstrualCycle(DeleteMenstrualCycleRequest) returns (DeleteMenstrualCycleResponse);
    rpc SyncFloData(SyncFloDataRequest) returns (SyncFloDataResponse);
    rpc SyncOKOKData(SyncOKOKDataRequest) returns (SyncOKOKDataResponse);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
    string full_name = 3;
    string role = 4;
}

message RegisterResponse {
    string user_id = 1;
    string message = 2;
}

message ConfirmEmailRequest {
    string token = 1;
}

message ConfirmEmailResponse {
    string user_id = 1;
    string message = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string token_type = 2;
    int64 expires_in = 3;
    string user_id = 4;
    string role = 5;
    string refresh_token = 6;
}

message AuthenticateGoogleRequest {
    string id_token = 1;
}

message GetProfileRequest {
    string user_id = 1;
}

message UpdateProfileRequest {
    string user_id = 1;
    optional string full_name = 11;
    optional string nickname = 12;
    optional int32 age = 2;
    optional string gender = 3;
    optional int32 height_cm = 4;
    optional double weight_kg = 5;
    optional string fitness_level = 6;
    repeated string goals = 7;
    repeated string contraindications = 8;
    optional string nutrition = 9;
    optional float sleep_hours = 10;
}

message ChangePasswordRequest {
    string user_id = 1;
    string current_password = 2;
    string new_password = 3;
}

message ChangePasswordResponse {
    string message = 1;
}

message ChangeEmailRequest {
    string user_id = 1;
    string new_email = 2;
    string password = 3;
}

message ChangeEmailResponse {
    string message = 1;
}

message UploadProfilePhotoRequest {
    string user_id = 1;
    bytes photo_data = 2;
    string content_type = 3;
}

message UploadProfilePhotoResponse {
    string photo_url = 1;
}

message RemoveProfilePhotoRequest {
    string user_id = 1;
}

message RemoveProfilePhotoResponse {
    string message = 1;
}

message ChangeNicknameRequest {
    string user_id = 1;
    string new_nickname = 2;
}

message ChangeNicknameResponse {
    string message = 1;
}

message Device {
    string device_id = 1;
    string device_type = 2;
    string device_name = 3;
    bool is_connected = 4;
    string last_sync = 5;
}

message ListDevicesRequest {
    string user_id = 1;
}

message ListDevicesResponse {
    repeated Device devices = 1;
}

message AddDeviceRequest {
    string user_id = 1;
    string device_type = 2;
    string device_name = 3;
}

message AddDeviceResponse {
    Device device = 1;
}

message RemoveDeviceRequest {
    string user_id = 1;
    string device_id = 2;
}

message RemoveDeviceResponse {
    string message = 1;
}

message SyncDeviceDataRequest {
    string user_id = 1;
    string device_id = 2;
}

message SyncDeviceDataResponse {
    string message = 1;
    int32 synced_samples = 2;
}

message GetTrainingStatsRequest {
    string user_id = 1;
    string from_date = 2;
    string to_date = 3;
}

message TrainingStats {
    int32 total_workouts = 1;
    int32 completed_workouts = 2;
    double average_duration_minutes = 3;
    double total_calories_burned = 4;
    string most_frequent_exercise = 5;
}

message GetTrainingStatsResponse {
    TrainingStats stats = 1;
}

message Achievement {
    string achievement_id = 1;
    string title = 2;
    string description = 3;
    string earned_date = 4;
    string icon_url = 5;
}

message GetAchievementsRequest {
    string user_id = 1;
}

message GetAchievementsResponse {
    repeated Achievement achievements = 1;
}

message UserProfile {
    string user_id = 1;
    string email = 2;
    string full_name = 3;
    string nickname = 4;
    string role = 5;
    bool email_confirmed = 6;
    int32 age = 7;
    string gender = 8;
    int32 height_cm = 9;
    double weight_kg = 10;
    string fitness_level = 11;
    repeated string goals = 12;
    repeated string contraindications = 13;
    string created_at = 14;
    string updated_at = 15;
    string nutrition = 16;
    float sleep_hours = 17;
    string profile_photo_url = 18;
}

message ListUsersRequest {
    int32 page = 1;
    int32 page_size = 2;
    string role = 3;
}

message ListUsersResponse {
    repeated UserProfile users = 1;
    int32 total = 2;
}

message RegisterWithInviteRequest {
    string email = 1;
    string password = 2;
    string full_name = 3;
    string invite_code = 4;
}

message ValidateInviteCodeRequest {
    string code = 1;
}

message ValidateInviteCodeResponse {
    bool is_valid = 1;
    string role = 2;
    string specialty = 3;
    string error_message = 4;
}

message SetupTOTPRequest {
    string user_id = 1;
}

message SetupTOTPResponse {
    string qr_code_url = 1;
    string secret = 2;
    repeated string backup_codes = 3;
}

message ConfirmTOTPRequest {
    string user_id = 1;
    string passcode = 2;
    string temp_secret = 3;
    repeated string backup_codes = 4;
}

message ConfirmTOTPResponse {
    bool success = 1;
    string message = 2;
}

message VerifyTOTPRequest {
    string user_id = 1;
    string passcode = 2;
    bool is_backup_code = 3;
}

message VerifyTOTPResponse {
    bool valid = 1;
    int32 backup_codes_remaining = 2;
}

message DisableTOTPRequest {
    string user_id = 1;
    string passcode = 2;
}

message DisableTOTPResponse {
    bool success = 1;
    string message = 2;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message RefreshTokenResponse {
    string access_token = 1;
    string token_type = 2;
    int64 expires_in = 3;
    string user_id = 4;
    string role = 5;
    string refresh_token = 6;
}

message HealthCondition {
    string id = 1;
    string user_id = 2;
    string condition_type = 3;
    string condition_name = 4;
    string severity = 5;
    string diagnosed_at = 6;
    bool is_active = 7;
    string notes = 8;
    string created_at = 9;
    string updated_at = 10;
}

message ListHealthConditionsRequest {
    string user_id = 1;
    string condition_type = 2;
}

message ListHealthConditionsResponse {
    repeated HealthCondition conditions = 1;
    int32 total = 2;
}

message UpsertHealthConditionRequest {
    string user_id = 1;
    string condition_type = 2;
    string condition_name = 3;
    string severity = 4;
    string diagnosed_at = 5;
    bool is_active = 6;
    string notes = 7;
}

message DeleteHealthConditionRequest {
    string user_id = 1;
    string condition_id = 2;
}

message DeleteHealthConditionResponse {
    bool success = 1;
    string message = 2;
}

message BodyCompositionRecord {
    string id = 1;
    string user_id = 2;
    string recorded_at = 3;
    double weight_kg = 4;
    int32 height_cm = 5;
    double bmi = 6;
    double body_fat_percentage = 7;
    double muscle_mass_percentage = 8;
    double bone_mass_percentage = 9;
    double water_percentage = 10;
    int32 visceral_fat_rating = 11;
    int32 metabolic_age = 12;
    string source = 13;
    string created_at = 14;
}

message ListBodyCompositionRequest {
    string user_id = 1;
    string from = 2;
    string to = 3;
    int32 limit = 4;
}

message ListBodyCompositionResponse {
    repeated BodyCompositionRecord records = 1;
    int32 total = 2;
}

message CreateBodyCompositionRequest {
    string user_id = 1;
    string recorded_at = 2;
    double weight_kg = 3;
    int32 height_cm = 4;
    double bmi = 5;
    double body_fat_percentage = 6;
    double muscle_mass_percentage = 7;
    double bone_mass_percentage = 8;
    double water_percentage = 9;
    int32 visceral_fat_rating = 10;
    int32 metabolic_age = 11;
    string source = 12;
}

message MenstrualCycle {
    string id = 1;
    string user_id = 2;
    string cycle_start_date = 3;
    string cycle_end_date = 4;
    string flow_intensity = 5;
    repeated string symptoms = 6;
    repeated string moods = 7;
    string notes = 8;
    string created_at = 9;
    string updated_at = 10;
}

message ListMenstrualCyclesRequest {
    string user_id = 1;
    string from = 2;
    string to = 3;
    int32 limit = 4;
}

message ListMenstrualCyclesResponse {
    repeated MenstrualCycle cycles = 1;
    int32 total = 2;
}

message CreateMenstrualCycleRequest {
    string user_id = 1;
    string cycle_start_date = 2;
    string cycle_end_date = 3;
    string flow_intensity = 4;
    repeated string symptoms = 5;
    repeated string moods = 6;
    string notes = 7;
}

message UpdateMenstrualCycleRequest {
    string user_id = 1;
    string cycle_id = 2;
    string cycle_start_date = 3;
    string cycle_end_date = 4;
    string flow_intensity = 5;
    repeated string symptoms = 6;
    repeated string moods = 7;
    string notes = 8;
}

message DeleteMenstrualCycleRequest {
    string user_id = 1;
    string cycle_id = 2;
}

message DeleteMenstrualCycleResponse {
    bool success = 1;
    string message = 2;
}

message SyncFloDataRequest {
    string user_id = 1;
    string access_token = 2;
    string refresh_token = 3;
}

message SyncFloDataResponse {
    bool success = 1;
    string message = 2;
    int32 synced_cycles = 3;
}

message SyncOKOKDataRequest {
    string user_id = 1;
    string access_token = 2;
    string refresh_token = 3;
}

message SyncOKOKDataResponse {
    bool success = 1;
    string message = 2;
    int32 synced_records = 3;
}