components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    criticalSession:
      type: apiKey
      in: header
      name: X-Critical-Session-Token

  schemas:
    HealthCondition:
      type: object
      properties:
        condition_id:
          type: string
        condition_type:
          type: string
          enum: [chronic, allergy, injury, cardiovascular, respiratory, metabolic, neurological, musculoskeletal, gastrointestinal, dermatological, mental_health, other]
        condition_name:
          type: string
        severity:
          type: string
          enum: [mild, moderate, severe]
        diagnosed_at:
          type: string
          format: date-time
        is_active:
          type: boolean
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpsertHealthConditionRequest:
      type: object
      required:
        - condition_type
        - condition_name
      properties:
        condition_type:
          type: string
          enum: [chronic, allergy, injury, cardiovascular, respiratory, metabolic, neurological, musculoskeletal, gastrointestinal, dermatological, mental_health, other]
        condition_name:
          type: string
        severity:
          type: string
          enum: [mild, moderate, severe]
        diagnosed_at:
          type: string
          format: date-time
        is_active:
          type: boolean
        notes:
          type: string

    BodyCompositionRecord:
      type: object
      properties:
        record_id:
          type: string
        recorded_at:
          type: string
          format: date-time
        weight_kg:
          type: number
        height_cm:
          type: integer
        bmi:
          type: number
        body_fat_percentage:
          type: number
        muscle_mass_percentage:
          type: number
        bone_mass_percentage:
          type: number
        water_percentage:
          type: number
        visceral_fat_rating:
          type: integer
        metabolic_age:
          type: integer
        source:
          type: string
          enum: [manual, fitbit, garmin, withings, apple_health]
        created_at:
          type: string
          format: date-time

    BodyCompositionRequest:
      type: object
      required:
        - recorded_at
        - weight_kg
        - height_cm
      properties:
        recorded_at:
          type: string
          format: date-time
        weight_kg:
          type: number
        height_cm:
          type: integer
        bmi:
          type: number
        body_fat_percentage:
          type: number
        muscle_mass_percentage:
          type: number
        bone_mass_percentage:
          type: number
        water_percentage:
          type: number
        visceral_fat_rating:
          type: integer
        metabolic_age:
          type: integer
        source:
          type: string
          enum: [manual, fitbit, garmin, withings, apple_health]

    MenstrualCycle:
      type: object
      properties:
        cycle_id:
          type: string
        cycle_start_date:
          type: string
          format: date
        cycle_end_date:
          type: string
          format: date
        flow_intensity:
          type: string
          enum: [light, moderate, heavy, spotting]
        symptoms:
          type: array
          items:
            type: string
        moods:
          type: array
          items:
            type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MenstrualCycleRequest:
      type: object
      required:
        - cycle_start_date
      properties:
        cycle_start_date:
          type: string
          format: date
        cycle_end_date:
          type: string
          format: date
        flow_intensity:
          type: string
          enum: [light, moderate, heavy, spotting]
        symptoms:
          type: array
          items:
            type: string
        moods:
          type: array
          items:
            type: string
        notes:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
        age:
          type: integer
          minimum: 13
          maximum: 120
        gender:
          type: string
          enum: [male, female, other, prefer_not_to_say]
        height_cm:
          type: integer
          minimum: 50
          maximum: 250
        weight_kg:
          type: number
          minimum: 20
          maximum: 300
        fitness_level:
          type: string
          enum: [beginner, intermediate, advanced, athlete]
        goals:
          type: array
          items:
            type: string
            enum: [weight_loss, muscle_gain, endurance, flexibility, general_health, sport_specific]
        contraindications:
          type: array
          items:
            type: string
        nutrition:
          type: string
        sleep_hours:
          type: number
          minimum: 0
          maximum: 24

    BiometricRecord:
      type: object
      properties:
        record_id:
          type: string
        metric_type:
          type: string
        value:
          oneOf:
            - type: number
            - type: integer
        timestamp:
          type: string
          format: date-time
        device_type:
          type: string
        quality:
          type: string
        created_at:
          type: string
          format: date-time

    BiometricIngestRequest:
      type: object
      required:
        - device_type
        - records
      properties:
        device_type:
          type: string
          enum: [fitbit, garmin, withings, apple_watch, manual]
        device_token:
          type: string
        sync_interval_ms:
          type: integer
        records:
          type: array
          items:
            type: object
            required:
              - metric_type
              - value
              - timestamp
            properties:
              metric_type:
                type: string
              value:
                oneOf:
                  - type: number
                  - type: integer
              timestamp:
                type: string
                format: date-time
              quality:
                type: string
                enum: [high, medium, low]
