name: ML Model Retraining

on:
  schedule:
    - cron: '0 2 * * 1'  # Каждый понедельник в 2 ночи
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force retrain even if no data changes'
        required: false
        type: boolean
        default: false

jobs:
  retrain-classifier:
    name: Retrain Classifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install DVC
        run: |
          pip install dvc==3.58.0
          dvc version
          
      - name: Pull data via DVC (local remote)
        run: |
          # DVC будет искать данные в локальном remote на VPS
          # Для CI/CD на GitHub Actions мы используем артефакты
          echo "Using cached data from GitHub Actions cache..."
          dvc pull datasets/processed/training_data_real.csv.dvc || echo "No DVC remote configured, using local cache"
          
      - name: Install dependencies
        run: |
          pip install -r cmd/ml-classifier/requirements.txt
          
      - name: Train with MLflow tracking (local)
        run: |
          cd cmd/ml-classifier
          python train.py
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"  # Локальный файл
          
      - name: Validate model quality
        run: |
          python -c "
          import json
          with open('models/training_history.json') as f:
              h = json.load(f)
          assert h['metrics']['test_accuracy'] > 0.7, 'Model accuracy too low!'
          print('✅ Model quality check passed')
          "
          
      - name: Save model as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ml-models
          path: models/
          retention-days: 7
          
      - name: Notify on success/failure
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🔄 ML Retraining: ${{ job.status }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  retrain-generator:
    name: Retrain Generator
    runs-on: ubuntu-latest
    needs: retrain-classifier
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install DVC
        run: pip install dvc==3.58.0
        
      - name: Pull training plans data
        run: dvc pull datasets/processed/training_plans_exercises.csv.dvc || echo "Using local cache"
        
      - name: Train GAN
        run: |
          pip install -r cmd/ml-generator/requirements.txt
          cd cmd/ml-generator
          python train_gan.py
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
          
      - name: Save generator model as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ml-models
          path: models/
          retention-days: 7