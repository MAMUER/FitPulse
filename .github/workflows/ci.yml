name: CI/CD Pipeline

on:
  push:
    branches: [main, master, Microservice_arc]
  pull_request:
    branches: [main, master, Microservice_arc]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
env:
  GO_VERSION: "1.26.3"
  REGISTRY: ghcr.io
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: binary_build
    steps:  # ← 4 пробела
      - name: Set git default branch to main  # ← 6 пробелей
        run: |  # ← 8 пробелов
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false

      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Start test environment
        run: |
          docker compose -f docker-compose.test.yml up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for test services to become healthy..."
          docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 180 || true
          docker compose -f docker-compose.test.yml ps
          echo "=== Gateway logs (last 100 lines) ==="
          docker compose -f docker-compose.test.yml logs --tail=100 gateway-test || true
          echo "=== User Service logs (last 100 lines) ==="
          docker compose -f docker-compose.test.yml logs --tail=100 user-service-test || true

      - name: Smoke tests (real API)
        run: |
          set -euo pipefail
          echo "Running real smoke tests against Gateway..."
          
          GATEWAY_URL="http://localhost:8081"
          
          # 1. Health check (up to ~3 minutes)
          echo "→ Checking /health..."
          for i in $(seq 1 36); do
            if curl -f --silent --max-time 3 "$GATEWAY_URL/health" > /dev/null; then
              echo "Gateway is healthy"
              break
            fi
            echo "Waiting for gateway... ($i/36)"
            sleep 5
          done

          if ! curl -f --silent --max-time 5 "$GATEWAY_URL/health" > /dev/null; then
            echo "❌ Gateway did not become healthy after waiting"
            echo "=== Gateway logs (last 150 lines) ==="
            docker compose -f docker-compose.test.yml logs --tail=150 gateway-test || true
            exit 1
          fi
          echo "✅ Gateway is ready"
          
          # 2. Register new user
          echo "→ Testing registration..."
          REGISTER_RESPONSE=$(curl -s -w "%{http_code}" -X POST "$GATEWAY_URL/api/v1/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke'$(date +%s)'@test.com","password":"Test123!","full_name":"Smoke Test","role":"client"}')
          
          HTTP_CODE="${REGISTER_RESPONSE: -3}"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Registration failed with code: $HTTP_CODE"
            echo "Response: $REGISTER_RESPONSE"
            exit 1
          fi
          echo "✅ Registration successful (HTTP $HTTP_CODE)"
          
          echo "✅ All smoke tests passed!"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy
    env:
      STAGING_URL: ${{ secrets.VPS_HOST }}
    steps:
      - name: Set git default branch to main
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false

      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Prepare staging target URL
        id: prepare-staging-target
        run: |
          if [[ "$STAGING_URL" == http* ]]; then
            echo "target=$STAGING_URL" >> $GITHUB_OUTPUT
          else
            echo "target=http://$STAGING_URL" >> $GITHUB_OUTPUT
          fi

      - name: Configure kubectl
        id: kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config 2>/dev/null || printf '%s' "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          if [ ! -s $HOME/.kube/config ] || ! grep -q '^apiVersion:' $HOME/.kube/config 2>/dev/null; then
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Safely apply PVC (skip if exists)
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          if ! kubectl get pvc -n fitness-platform -o jsonpath='{.items[?(@.metadata.name=="postgres-pvc")]}' &>/dev/null; then
            echo "Creating postgres-pvc..."
            kubectl apply --validate=false -f configs/k8s/pvc.yaml
          else
            echo "postgres-pvc already exists - skipping apply"
          fi

      - name: Skip PVC — no KUBECONFIG
        if: steps.kubeconfig.outputs.configured != 'true'
        run: echo "KUBECONFIG not configured, skipping PVC apply"

      - name: Debug staging connectivity
        run: |
          TARGET="${{ steps.prepare-staging-target.outputs.target }}"
          echo "🔍 Testing: $TARGET"
    
          # Проверка DNS/сети
          curl -v --max-time 10 "$TARGET" || echo "❌ Base URL unreachable"
    
          # Проверка health с деталями
          echo "→ GET $TARGET/health"
          curl -sf --max-time 10 "$TARGET/health" || {
            echo "❌ Health endpoint failed"
            echo "=== K8s pods status ==="
            kubectl get pods -n fitness-platform 2>/dev/null || echo "kubectl not available"
            exit 1
          }
          echo "✅ Staging is responding"

      - name: UAT Tests
        run: |
          echo "Running UAT tests against ${{ steps.prepare-staging-target.outputs.target }}"
          python scripts/api-test.py --base-url "${{ steps.prepare-staging-target.outputs.target }}"

      - name: Validate staging target URL
        id: validate-staging-target
        run: |
          if [ -z "${{ steps.prepare-staging-target.outputs.target }}" ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TARGET="${{ steps.prepare-staging-target.outputs.target }}"
          if python - <<'PY'
          import os
          from urllib.parse import urlparse
          u = urlparse(os.getenv('TARGET'))
          if u.scheme not in ('http', 'https') or not u.netloc:
            raise SystemExit(1)
          PY
          then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
        env:
          TARGET: ${{ steps.prepare-staging-target.outputs.target }}

      - name: Performance tests (k6)
        if: ${{ steps.validate-staging-target.outputs.valid == 'true' }}
        uses: k6io/action@v0.3.1
        env:
          BASE_URL: ${{ steps.prepare-staging-target.outputs.target }}
        with:
          filename: load-test.k6
        continue-on-error: true

      - name: Security scan (OWASP ZAP)
        if: ${{ steps.validate-staging-target.outputs.valid == 'true' }}
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.prepare-staging-target.outputs.target }}
          fail_action: false
        continue-on-error: true

      - name: OWASP ZAP skipped
        if: ${{ steps.validate-staging-target.outputs.valid != 'true' }}
        run: |
          echo "OWASP ZAP scan skipped - invalid or missing STAGING_URL"

      - name: Chaos engineering
        run: |
          echo "Running chaos tests (simulated failures)"
          for i in {1..20}; do
            curl -s -o /dev/null -w "%{http_code}\n" "${{ steps.prepare-staging-target.outputs.target }}/health"
            sleep 0.5
          done
          echo "Chaos test completed"

  release-candidate:
    name: Release Candidate
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check K8s cluster and rollback
        continue-on-error: true
        run: |
          # Graceful K8s rollback (only if KUBECONFIG configured)
          if [ -n "$KUBECONFIG" ] && command -v kubectl &> /dev/null; then
            echo "Attempting K8s rollback..."
            kubectl rollout undo deployment/gateway -n fitness-platform 2>/dev/null || echo "K8s rollback failed or cluster unavailable"
          else
            echo " K8s not configured, skipping K8s rollback"
          fi
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Run vet
        run: go vet ./...
      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run --timeout=5m
      - name: Run fmt check
        run: |
          FILES=$(gofmt -l ./cmd ./internal ./pkg 2>/dev/null | grep -v "cmd/tools/tools.go" || true)
          if [ -n "$FILES" ]; then
            echo "Files not formatted:"
            echo "$FILES"
            exit 1
          fi
          echo "All Go files are properly formatted"
      - name: Run tests
        run: go test -v -short -parallel 2 ./...


  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Set git default branch to main
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false

      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download
        # Go Security: проверка зависимостей на уязвимости (аналог npm audit)
      - name: Install gosec and govulncheck
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      # После запуска gosec
      - name: Run gosec SAST scanner
        run: |
          # Создаём директорию для результатов
          mkdir -p sarif-results
    
          # Запускаем gosec с выводом в SARIF
          gosec -exclude-generated -fmt=sarif -out=sarif-results/gosec.sarif ./... 2>&1 || true
    
          # Если файл пустой — создаём минимальный валидный SARIF
          if [ ! -s sarif-results/gosec.sarif ]; then
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"gosec","informationUri":"https://github.com/securego/gosec"}},"results":[]}]}' > sarif-results/gosec.sarif
          fi

      - name: Upload gosec results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: sarif-results/gosec.sarif
          category: gosec
          # Важно: путь должен быть относительно корня репозитория
          checkout_path: ${{ github.workspace }}

      # Проверка зависимостей на известные уязвимости
      - name: Run govulncheck
        continue-on-error: true
        run: |
          govulncheck ./... 2>&1 | tee vulncheck-results.txt
          echo "=== VULNCHECK SUMMARY ==="
          # Считаем количество найденных уязвимостей
          VULN_COUNT=$(grep -c "vulnerability" vulncheck-results.txt || echo "0")
          echo "Found $VULN_COUNT potential vulnerabilities"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Run Trivy config scan
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --quiet \
            .

      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        run: |
          # Создаём директорию для результатов (если нет)
          mkdir -p sarif-results
    
          trivy fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output sarif-results/trivy-fs.sarif \  # ← ИСПРАВЛЕНО: путь в нужную папку
            --skip-dirs '**/site-packages/**,**/dist-packages/**,**/.venv/**,**/venv/**,datasets/**' \
            --quiet \
            .

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results/trivy-fs.sarif
          category: trivy-fs
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Set git default branch to main
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      # Verify .env is NOT tracked in Git
      - name: Fetch all branches and tags
        run: git fetch --all --tags
      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch .env &>/dev/null; then
            echo "❌ CRITICAL: .env file is tracked in Git!"
            echo "   Run: git rm --cached .env"
            echo "   Add .env to .gitignore"
            exit 1
          fi
          echo ".env is not tracked"

      # TruffleHog: поиск секретов в истории коммитов (основной инструмент)
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  binary_build:  # ← На одном уровне с другими джобами
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan]
    env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        # Retry configuration (can be overridden via GitHub Variables)
        SSH_RETRY_MAX_ATTEMPTS: ${{ vars.SSH_RETRY_MAX_ATTEMPTS || 5 }}
        SSH_RETRY_DELAY_SECONDS: ${{ vars.SSH_RETRY_DELAY_SECONDS || 10 }}
        SSH_RETRY_TIMEOUT: ${{ vars.SSH_RETRY_TIMEOUT || 120 }}
        # Bastion / Jump host (optional)
        BASTION_USER: ${{ secrets.BASTION_USER || '' }}
        BASTION_HOST: ${{ secrets.BASTION_HOST || '' }}
    steps:
      - name: Set git default branch to main
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false
      - uses: actions/checkout@v6.0.2
        with:
            fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Go services
        run: |
          mkdir -p bin
          go build -o bin/user-service ./cmd/user-service
          go build -o bin/biometric-service ./cmd/biometric-service
          go build -o bin/training-service ./cmd/training-service
          go build -o bin/gateway ./cmd/gateway
          go build -o bin/device-emulator ./cmd/device-emulator
      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: binary_build  # ← Исправлено: было build
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    steps:
      - name: Set git default branch to main
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false

      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build Go images
        run: |
          services="user-service biometric-service training-service gateway device-connector device-emulator"
          for svc in $services; do
            echo "Building $svc with tag ${{ steps.sha.outputs.short_sha }}..."
            docker build \
              -t ${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }} \
              -t ${{ env.REGISTRY }}/mamuer/project/$svc:latest \
              -f cmd/$svc/Dockerfile \
              .

            for attempt in 1 2 3; do
              echo "Pushing $svc (attempt $attempt)..."
              if docker push ${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }} && \
                 docker push ${{ env.REGISTRY }}/mamuer/project/$svc:latest; then
                echo "$svc pushed"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "❌ Failed to push $svc after $attempt attempts"
                exit 1
              fi
              echo "Retrying push for $svc in $((5 * attempt)) seconds..."
              sleep $((5 * attempt))
            done
          done

      # Security scan Docker images before pushing
      - id: trivy-scan
        name: Scan Docker images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/mamuer/project/gateway:${{ steps.sha.outputs.short_sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          cache: false
          scanners: 'vuln'

      - name: Upload Docker Trivy results
        if: always() && steps.trivy-scan.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-docker
      - name: Build and push ML images (if models exist)
        run: |
          set -euo pipefail

          # ML classifier — build if scaler exists and at least one model (regular or timestamped) is present
          if [ -f "models/scaler.pkl" ] && { [ -f "models/classifier.keras" ] || ls models/classifier_*.keras >/dev/null 2>&1; }; then
            echo "Building ml-classifier (latest model found)..."
            docker build \
              -t ${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }} \
              -t ${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest \
              -f cmd/ml-classifier/Dockerfile \
              .
            docker push ${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }}
            docker push ${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest
            echo "ml-classifier pushed"
          else
            echo "Skipping ml-classifier — no model found (need models/scaler.pkl + classifier.keras or classifier_*.keras)"
            echo "  Run training locally, commit the models (including timestamped), then push"
          fi

          # ML generator — build if either .h5 or .keras model exists
          if [ -f "models/generator.h5" ] || [ -f "models/generator.keras" ]; then
            echo "Building ml-generator (model found)..."
            docker build \
              -t ${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }} \
              -t ${{ env.REGISTRY }}/mamuer/project/ml-generator:latest \
              -f cmd/ml-generator/Dockerfile \
              .
            docker push ${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}
            docker push ${{ env.REGISTRY }}/mamuer/project/ml-generator:latest
            echo "ml-generator pushed"
          else
            echo "Skipping ml-generator — models/generator not found"
            echo "  Run 'python cmd/ml-generator/train_gan.py' locally and commit the model to build the ML image"
          fi

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Make ssh-retry script executable
        run: chmod +x scripts/ssh-retry.sh
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Install Docker on VPS
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              echo "=== INSTALLING DOCKER ==="
              if ! command -v docker &> /dev/null; then
                curl -fsSL https://get.docker.com -o get-docker.sh
                sh get-docker.sh
                apt-get install -y docker-compose
                systemctl enable docker
                systemctl start docker
                echo "Docker installed"
              else
                echo "Docker already installed"
              fi
              docker --version
              docker-compose --version
            '
      - name: Clean up old Docker data
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              echo "=== CLEANING UP OLD DOCKER DATA ==="
              docker system prune -f --filter "until=72h"
              docker image prune -f --filter "until=168h"
              docker volume prune -f
              echo "Cleanup completed"
            '
      - name: Prepare server directories
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              mkdir -p /opt/techip
              mkdir -p /opt/techip/certs
              mkdir -p /opt/techip/deploy/tls
              mkdir -p /opt/techip/deploy/lb
              mkdir -p /opt/techip/deploy/monitoring
            '
      - name: Create .env file on VPS
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              cat > /opt/techip/.env << "ENVEOF"
              POSTGRES_USER=${{ vars.POSTGRES_USER }}
              POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
              POSTGRES_DB=${{ vars.POSTGRES_DB }}
              DB_HOST=postgres
              DB_PORT=5432
              DB_NAME=${{ vars.POSTGRES_DB }}
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              DB_SSLMODE=disable
              REDIS_ADDR=redis:6379
              REDIS_DB=0
              REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
              JWT_SECRET=${{ secrets.JWT_SECRET }}
              AUTH_PORT=8081
              AUTH_GRPC_PORT=50051
              TASKS_PORT=8082
              AUTH_GRPC_ADDR=auth:50051
              USER_SERVICE_ADDR=user-service:50051
              BIOMETRIC_SERVICE_ADDR=biometric-service:50052
              TRAINING_SERVICE_ADDR=training-service:50053
              GATEWAY_PORT=8080
              ML_CLASSIFIER_URL=http://ml-classifier:8001
              ML_GENERATOR_URL=http://ml-generator:8002
              MODEL_PATH=/app/models/classifier.keras
              SCALER_PATH=/app/models/scaler.pkl
              GENERATOR_PATH=/app/models/generator.h5
              RABBITMQ_DEFAULT_USER=${{ secrets.RABBITMQ_USER }}
              RABBITMQ_DEFAULT_PASS=${{ secrets.RABBITMQ_PASS }}
              SMTP_HOST=smtp.yandex.ru
              SMTP_PORT=465
              SMTP_USER=${{ secrets.SMTP_USER }}
              SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
              EMAIL_DAILY_LIMIT=100
              EMAIL_SKIP_DOMAINS=example.com
              ENVEOF
            '
      - name: Get short SHA for image tag
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Copy docker-compose file
        run: |
          ./scripts/ssh-retry.sh scp \
            deployments/docker-compose.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/docker-compose.yml"

      - name: Copy init SQL
        run: |
          ./scripts/ssh-retry.sh scp \
            scripts/init-db.sql \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/init.sql"
      - name: Update docker-compose with image tags
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
              cd /opt/techip
              SHA_TAG=\"${{ steps.sha.outputs.short_sha }}\"
              for svc in user-service biometric-service training-service gateway; do
                sed -i \"s|ghcr.io/.*/\$svc:latest|ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/\$svc:\$SHA_TAG|g\" docker-compose.yml
              done
            "

      - name: Deploy with Docker Compose
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              cd /opt/techip

              # Скачаем основные сервисы (обязательные)
              docker-compose pull user-service biometric-service training-service gateway

              # Попробуем скачать ML образы — если их нет, пропустим
              ML_SERVICES="user-service biometric-service training-service gateway"
              docker-compose pull ml-classifier 2>/dev/null && ML_SERVICES="$ML_SERVICES ml-classifier" || echo "Skipping ml-classifier — image not in registry"
              docker-compose pull ml-generator 2>/dev/null && ML_SERVICES="$ML_SERVICES ml-generator" || echo "Skipping ml-generator — image not in registry"

              # Остановим старые контейнеры
              docker-compose down 2>/dev/null || true

              # Запустим только доступные сервисы
              docker-compose up -d $ML_SERVICES
              sleep 20
              docker-compose ps
             '

      - name: Wait for services healthy
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              echo "=== Waiting for services to become healthy ==="
              for i in $(seq 1 20); do
                echo "Health check $i/20..."
                if curl -sf --max-time 5 http://localhost:8080/health > /dev/null && \
                   curl -sf --max-time 5 http://localhost:8081/health > /dev/null 2>/dev/null || true; then
                  echo "✅ Main services are responding"
                  exit 0
                fi
                sleep 8
              done
              echo "❌ Services did not become healthy in time"
              exit 1
            '

      - name: Verify deployment
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              echo "=== HEALTH CHECKS ==="
              curl -s --max-time 5 http://localhost:8080/health || echo "Gateway not responding"
              echo ""
              curl -s --max-time 5 http://localhost:8001/health || echo "ML Classifier not responding"
              echo ""
              curl -s --max-time 5 http://localhost:8002/health || echo "ML Generator not responding"
            '
      - name: Configure system for DDoS protection
        run: |
          ./scripts/ssh-retry.sh ssh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              echo "=== Setting sysctl parameters ==="
              cat >> /etc/sysctl.d/99-fitness.conf << "EOF"
              net.ipv4.tcp_syncookies=1
              net.ipv4.tcp_syn_retries=2
              net.ipv4.tcp_synack_retries=2
              net.core.somaxconn=1024
              net.ipv4.ip_local_port_range=1024 65535
              EOF
              sysctl -p /etc/sysctl.d/99-fitness.conf

              echo "=== Creating cleanup script ==="
              mkdir -p /opt/techip
              cat > /opt/techip/cleanup.sh << "EOF"
              #!/bin/bash
              docker image prune -a -f --filter "until=168h"
              docker container prune -f
              docker volume prune -f
              docker builder prune -f
              find /var/log -name "*.log" -type f -mtime +30 -delete
              journalctl --vacuum-time=7d
              docker system prune -f --volumes
              EOF
              chmod +x /opt/techip/cleanup.sh

          echo "=== Setting up cron for weekly cleanup ==="
               (crontab -l 2>/dev/null; echo "0 2 * * 0 /opt/techip/cleanup.sh >> /var/log/cleanup.log 2>&1") | crontab -
             '
      - name: Get deployment status for notification
        id: deployment-status
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "status_emoji=✅" >> $GITHUB_OUTPUT
            echo "status_text=УСПЕШНО ЗАВЕРШЕН" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "status_emoji=❌" >> $GITHUB_OUTPUT
            echo "status_text=ЗАВЕРШИЛСЯ С ОШИБКОЙ" >> $GITHUB_OUTPUT
          fi

  k8s-deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    steps:
      - name: Set git default branch to main
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false

      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Configure kubectl
        id: kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config 2>/dev/null || printf '%s' "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          if ! kubectl version --client > /dev/null 2>&1; then
            echo "kubectl not installed correctly"
            exit 1
          fi
          if [ ! -s $HOME/.kube/config ] || ! grep -q '^apiVersion:' $HOME/.kube/config 2>/dev/null; then
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Create secrets from GitHub Secrets
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          KUBECTL="kubectl apply --validate=false"

          kubectl create namespace fitness-platform --dry-run=client -o yaml | $KUBECTL -f -
          kubectl create secret generic app-secrets \
            --namespace=fitness-platform \
            --from-literal=POSTGRES_USER=${{ vars.POSTGRES_USER || 'fitness_admin' }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=RABBITMQ_USER=${{ secrets.RABBITMQ_USER }} \
            --from-literal=RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --dry-run=client -o yaml | $KUBECTL -f -

      - name: Apply Kubernetes manifests
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          KUBECTL="kubectl apply --validate=false"

          $KUBECTL -f configs/k8s/namespace.yaml
          $KUBECTL -f configs/k8s/configmap.yaml
          $KUBECTL -f configs/k8s/serviceaccount.yaml
          $KUBECTL -f configs/k8s/pvc.yaml
          $KUBECTL -f configs/k8s/init-sql.yaml
          # Infrastructure
          $KUBECTL -f configs/k8s/deployments/postgres.yaml
          $KUBECTL -f configs/k8s/deployments/redis.yaml
          $KUBECTL -f configs/k8s/deployments/rabbitmq.yaml
          kubectl wait --for=condition=ready pod -l app=postgres -n fitness-platform --timeout=120s || true
          kubectl wait --for=condition=ready pod -l app=redis -n fitness-platform --timeout=60s || true
          # Application services
          $KUBECTL -f configs/k8s/deployments/user-service.yaml
          $KUBECTL -f configs/k8s/deployments/biometric-service.yaml
          $KUBECTL -f configs/k8s/deployments/training-service.yaml
          $KUBECTL -f configs/k8s/deployments/device-connector.yaml
          $KUBECTL -f configs/k8s/deployments/ml-classifier.yaml
          $KUBECTL -f configs/k8s/deployments/ml-generator.yaml
          $KUBECTL -f configs/k8s/deployments/gateway.yaml
          $KUBECTL -f configs/k8s/nginx-lb.yaml
          # Services
          $KUBECTL -f configs/k8s/services/
          # Security & scaling
          $KUBECTL -f configs/k8s/network-policies.yaml || true
          $KUBECTL -f configs/k8s/resource-quota.yaml || true
          $KUBECTL -f configs/k8s/hpa.yaml || true
          $KUBECTL -f configs/k8s/pdb.yaml || true

      - name: Verify pods
        if: steps.kubeconfig.outputs.configured == 'true'
        run: kubectl get pods -n fitness-platform

  k8s-staging-deploy:
    name: Deploy to K8s Staging
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, binary_build, docker]  # Используем только проверенные джобы
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    steps:
       - name: Set git default branch to main
         run: |
           git config --global init.defaultBranch main
           git config --global advice.defaultBranchName false
           git config --global advice.detachedHead false

       - uses: actions/checkout@v6.0.2
         with:
           fetch-depth: 0

       - name: Install kubectl
         run: |
           curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
           chmod +x kubectl
           sudo mv kubectl /usr/local/bin/

       - name: Configure kubectl
         id: kubeconfig
         run: |
           mkdir -p $HOME/.kube
           printf '%s' "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config 2>/dev/null || printf '%s' "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
           chmod 600 $HOME/.kube/config
           if ! kubectl version --client > /dev/null 2>&1; then
             echo "kubectl not installed correctly"
             exit 1
           fi
           if [ ! -s $HOME/.kube/config ] || ! grep -q '^apiVersion:' $HOME/.kube/config 2>/dev/null; then
             echo "configured=false" >> $GITHUB_OUTPUT
           else
             echo "configured=true" >> $GITHUB_OUTPUT
           fi

       - name: Create namespace and config
         if: steps.kubeconfig.outputs.configured == 'true'
         run: |
            kubectl apply -f configs/k8s/namespace.yaml || true
            kubectl apply -f configs/k8s/configmap.yaml || true
            kubectl apply -f configs/k8s/serviceaccount.yaml || true
            kubectl apply -f configs/k8s/init-sql.yaml || true

       - name: Deploy infrastructure services
         if: steps.kubeconfig.outputs.configured == 'true'
         run: |
           kubectl apply -f configs/k8s/deployments/postgres.yaml
           kubectl apply -f configs/k8s/deployments/redis.yaml
           kubectl apply -f configs/k8s/deployments/rabbitmq.yaml
           kubectl wait --for=condition=ready pod -l app=postgres -n fitness-platform --timeout=300s || true
           kubectl wait --for=condition=ready pod -l app=redis -n fitness-platform --timeout=120s || true
           kubectl wait --for=condition=ready pod -l app=rabbitmq -n fitness-platform --timeout=120s || true

       - name: Deploy application services
         if: steps.kubeconfig.outputs.configured == 'true'
         run: |
           kubectl apply -f configs/k8s/deployments/user-service.yaml
           kubectl apply -f configs/k8s/deployments/biometric-service.yaml
           kubectl apply -f configs/k8s/deployments/training-service.yaml
           kubectl apply -f configs/k8s/deployments/device-connector.yaml
           kubectl apply -f configs/k8s/deployments/ml-classifier.yaml
           kubectl apply -f configs/k8s/deployments/ml-generator.yaml
           kubectl apply -f configs/k8s/deployments/gateway.yaml

       - name: Deploy services and networking
         if: steps.kubeconfig.outputs.configured == 'true'
         run: |
           kubectl apply -f configs/k8s/services/
           kubectl apply -f configs/k8s/network-policies.yaml || true
           kubectl apply -f configs/k8s/resource-quota.yaml || true
           kubectl apply -f configs/k8s/hpa.yaml || true
           kubectl apply -f configs/k8s/pdb.yaml || true
           kubectl apply -f configs/k8s/nginx-lb.yaml

       - name: Verify deployment
         if: steps.kubeconfig.outputs.configured == 'true'
         run: |
           echo "=== Pods Status ==="
           kubectl get pods -n fitness-platform
           echo ""
           echo "=== Services Status ==="
           kubectl get services -n fitness-platform
           echo ""
           echo "=== Checking Gateway Health ==="
           kubectl wait --for=condition=ready pod -l app=gateway -n fitness-platform --timeout=300s || echo "Gateway not ready"
           echo ""
           echo "=== Checking ML Services ==="
           kubectl wait --for=condition=ready pod -l app=ml-classifier -n fitness-platform --timeout=300s || echo "ML Classifier not ready"
           kubectl wait --for=condition=ready pod -l app=ml-generator -n fitness-platform --timeout=300s || echo "ML Generator not ready"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, binary_build, docker, deploy, k8s-deploy]  # ← Исправлено: build → binary_build
    if: always() && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    steps:
      - name: Set git default branch to main
        run: |
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false
          git config --global advice.detachedHead false
      - uses: actions/checkout@v6.0.2
      - name: Get all job statuses
        id: statuses
        run: |
          TEST_STATUS="${{ needs.deploy_test.result }}"
          SECURITY_STATUS="${{ needs.security-scan.result }}"
          SECRETS_STATUS="${{ needs.secrets-scan.result }}"
          BUILD_STATUS="${{ needs.binary_build.result }}"
          DOCKER_STATUS="${{ needs.docker.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          K8S_STATUS="${{ needs.k8s-deploy.result }}"

          if [ "$K8S_STATUS" = "success" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            OVERALL="success"
            OVERALL_EMOJI="✅"
            OVERALL_TEXT="УСПЕШНО"
          elif [ "$K8S_STATUS" = "failure" ] || [ "$DEPLOY_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА ДЕПЛОЯ"
          elif [ "$DOCKER_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА СБОРКИ DOCKER"
          elif [ "$BUILD_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА СБОРКИ"
          elif [ "$SECURITY_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА SECURITY"
          elif [ "$SECRETS_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОБНАРУЖЕНЫ СЕКРЕТЫ"
          elif [ "$TEST_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА ТЕСТОВ"
          else
            OVERALL="success"
            OVERALL_EMOJI="✅"
            OVERALL_TEXT="УСПЕШНО"
          fi

          echo "overall=$OVERALL" >> $GITHUB_OUTPUT
          echo "overall_emoji=$OVERALL_EMOJI" >> $GITHUB_OUTPUT
          echo "overall_text=$OVERALL_TEXT" >> $GITHUB_OUTPUT

          get_status_emoji() {
            case "$1" in
              "success") echo "✅" ;;
              "failure") echo "❌" ;;
              "cancelled") echo "⏸️" ;;
              "skipped") echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "test_emoji=$(get_status_emoji $TEST_STATUS)" >> $GITHUB_OUTPUT
          echo "security_emoji=$(get_status_emoji $SECURITY_STATUS)" >> $GITHUB_OUTPUT
          echo "secrets_emoji=$(get_status_emoji $SECRETS_STATUS)" >> $GITHUB_OUTPUT
          echo "build_emoji=$(get_status_emoji $BUILD_STATUS)" >> $GITHUB_OUTPUT
          echo "docker_emoji=$(get_status_emoji $DOCKER_STATUS)" >> $GITHUB_OUTPUT
          echo "deploy_emoji=$(get_status_emoji $DEPLOY_STATUS)" >> $GITHUB_OUTPUT
          echo "k8s_emoji=$(get_status_emoji $K8S_STATUS)" >> $GITHUB_OUTPUT

          echo "test_status=$TEST_STATUS" >> $GITHUB_OUTPUT
          echo "security_status=$SECURITY_STATUS" >> $GITHUB_OUTPUT
          echo "secrets_status=$SECRETS_STATUS" >> $GITHUB_OUTPUT
          echo "build_status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "docker_status=$DOCKER_STATUS" >> $GITHUB_OUTPUT
          echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT
          echo "k8s_status=$K8S_STATUS" >> $GITHUB_OUTPUT
      - name: Get commit info
        id: commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "commit_url=$COMMIT_URL" >> $GITHUB_OUTPUT
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html  # ← вместо markdown
          disable_web_page_preview: true
          message: |
            <b>🚀 CI/CD Pipeline — ${{ steps.statuses.outputs.overall_text }}</b>

            <code>${{ github.repository }}</code> @ <code>${{ github.ref_name }}</code>
            Commit: <a href="${{ steps.commit.outputs.commit_url }}">{{ github.sha }}</a>

            <b>Статусы:</b>
            ✅ Build: ${{ steps.statuses.outputs.build_status }}
            ✅ Docker: ${{ steps.statuses.outputs.docker_status }}
            ✅ Deploy: ${{ steps.statuses.outputs.deploy_status }}
            ✅ K8s: ${{ steps.statuses.outputs.k8s_status }}

            <a href="${{ steps.commit.outputs.run_url }}">🔗 Открыть запуск</a>