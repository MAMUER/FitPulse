name: CI/CD Pipeline

on:
  push:
    branches: [main, master, Microservice_arc]
  pull_request:
    branches: [main, master, Microservice_arc]
  schedule:
    # Еженедельный security scan (понедельник 00:00 UTC)
    - cron: '0 0 * * 1'

permissions:
  contents: read
  packages: write
  security-events: write

env:
  GO_VERSION: "1.26.2"
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  code-review:
    name: Code Review Gates
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Set git default branch to main
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check ADR updates
        run: |
            # Determine base branch/commit for comparison
            if [ -n "$GITHUB_BASE_REF" ]; then
              # Pull Request: compare with base branch
              BASE_REF="origin/$GITHUB_BASE_REF"
            elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              # Push to branch with parent: compare all changes in this push
              BASE_REF="HEAD~1..HEAD"
            else
              # First commit ever
              echo "First commit, skipping ADR check."
              exit 0
            fi

            # Get changed files relative to base
            if [ "$BASE_REF" = "HEAD~1..HEAD" ]; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            else
              CHANGED_FILES=$(git diff --name-only $BASE_REF...HEAD)
            fi

            # Check if ADR was updated
            if echo "$CHANGED_FILES" | grep -qE "^docs/adr/.*\.md$"; then
              echo "ADR updated - good!"
            elif echo "$CHANGED_FILES" | grep -qE "\.(go|py|js|ts|proto)$|Dockerfile|Makefile|k8s/|configs/|deployments/|\.yml$|\.yaml$" | \
                 grep -v -E "^tests?/|_test\.go$|_test\.py$|\.github/|\.gitlab/|ci/|cd/|deploy\.|^.dockerignore$|^\.gitignore$"; then
              echo "Warning: Significant architectural changes detected without ADR. Consider documenting in docs/adr/"
              echo "Changed files:"
              echo "$CHANGED_FILES" | grep -E "\.(go|py|js|ts|proto)$|Dockerfile|Makefile|k8s/|configs/|deployments/|\.yml$|\.yaml$" | \
                grep -v -E "^tests?/|_test\.go$|_test\.py$|\.github/|\.gitlab/|ci/|cd/|deploy\.|^.dockerignore$|^\.gitignore$" || true
              exit 1
            else
              echo "No significant architectural changes requiring ADR documentation."
            fi
            else
              # For PRs, compare with base branch
              BASE_COMMIT=origin/$BASE_BRANCH
            fi
            
            CHANGED_FILES=$(git diff --name-only $BASE_COMMIT HEAD)
            
            if echo "$CHANGED_FILES" | grep -q "docs/adr/"; then
              echo "ADR updated - good!"
            elif echo "$CHANGED_FILES" | grep -E "\.(go|py|js|ts|proto)$|Dockerfile|Makefile|\.yml$|\.yaml$" | grep -v "^test/|_test\.go$|\.github/workflows/|^cmd/.*/Dockerfile$"; then
              echo "Warning: Significant architectural changes detected without ADR. Consider documenting in docs/adr/"
              echo "Changed files: $CHANGED_FILES"
            else
              echo "No significant architectural changes requiring ADR documentation."
            fi
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.projectKey=fitness-platform
            -Dsonar.organization=mamuer
            -Dsonar.sources=.
            -Dsonar.exclusions=**/vendor/**,**/node_modules/**,**/*.pb.go,**/*.gen.go
            -Dsonar.plsql.file.suffixes=.sql
            -Dsonar.plsql.analysis.enabled=true
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.python.version=3.11
            -Dsonar.sca.enabled=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
          NODE_OPTIONS: "--no-deprecation"

  ci-build:
    name: CI Build
    runs-on: ubuntu-latest
    needs: code-review
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Set git default branch to main
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
           go-version: ${{ env.GO_VERSION }}
           cache: false
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
           path: |
             ~/go/pkg/mod
             ~/.cache/go-build
           key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
           restore-keys: |
             ${{ runner.os }}-go-
      - name: Install dependencies
        run: go mod download
      - name: Run unit tests (parallel)
        run: |
            PACKAGES=$(go list -f '{{if or (gt (len .TestGoFiles) 0) (gt (len .XTestGoFiles) 0)}}{{.ImportPath}} {{end}}' ./...)
            if [ -z "$PACKAGES" ]; then
              echo "No testable packages found."
              exit 1
            fi
            echo "Testing packages: $PACKAGES"
            go test -v -coverprofile=coverage.out -parallel 4 $PACKAGES
      - name: Check coverage
        run: |
            COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
            echo "Total coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 45" | bc -l) )); then
              echo "Coverage $COVERAGE% is below 45%"
              exit 1
            fi
      - name: Run integration tests
        run: go test -v -tags=integration -parallel 2 ./...
      - name: Run contract tests
        run: |
             # Placeholder for Pact contract tests
             echo "Contract tests would run here"
      - name: Generate coverage for SonarQube
        run: |
             if [ -f "coverage.out" ]; then
               echo "Coverage report exists"
             else
               echo "Generating coverage report..."
               go test -v -coverprofile=coverage.out ./... || echo "Coverage generation failed, but continuing"
             fi
      - name: Hadolint Docker lint
        run: |
             for dockerfile in ./cmd/*/Dockerfile; do
               if [ -f "$dockerfile" ]; then
                 echo "Linting $dockerfile"
                 docker run --rm -i hadolint/hadolint < "$dockerfile"
               fi
             done
      - name: Install Python dependencies for Trivy
        run: |
            python -m pip install --upgrade pip
            pip install -r cmd/ml-classifier/requirements.txt
            pip install -r cmd/ml-generator/requirements.txt
      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
            scan-type: 'fs'
            scan-ref: '.'
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GHCR_TOKEN }}
      - name: Get lowercase repo name
        id: repo-lower
        run: |
             REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
             echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
      - name: Multi-arch build
        run: |
            docker buildx create --use
             for service in gateway user-service biometric-service training-service; do
               echo "Building $service..."
               for i in {1..3}; do
                 if docker buildx build --push --platform linux/amd64,linux/arm64 -t $REGISTRY/${{ steps.repo-lower.outputs.repo_lower }}/$service:latest --file ./cmd/$service/Dockerfile .; then
                   echo "Successfully built $service on attempt $i"
                   break
                 else
                   echo "Build attempt $i failed for $service, retrying in $((5 * i)) seconds..."
                   sleep $((5 * i))
                 fi
               done
            done

  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: ci-build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Smoke tests
        run: |
          echo "Running smoke tests against test environment"
          # Placeholder for smoke tests

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: UAT Tests
        run: |
          echo "Running UAT tests"
      - name: Performance tests (k6)
        uses: k6io/action@v0.1
        with:
          filename: load-test.k6
        continue-on-error: true
      - name: Security scan (OWASP ZAP)
        continue-on-error: true
        run: |
          echo "OWASP ZAP scan skipped - staging environment not available"
          # Uncomment when staging.example.com is available:
          # uses: zaproxy/action-baseline@v0.10.0
          # with:
          #   target: 'https://staging.example.com'
      - name: Chaos engineering
        run: |
          echo "Running chaos tests"

  release-candidate:
    name: Release Candidate
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Create git tag
        run: |
          VERSION=$(date +%Y%m%d.%H%M%S)
          git tag "v$VERSION"
          git push origin "v$VERSION"
      - name: Generate changelog
        run: |
          echo "Generating changelog"
      - name: Create runbook
        run: |
          echo "Generating runbook"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: release-candidate
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Canary deployment (10%)
        run: |
          kubectl set image deployment/gateway gateway=$REGISTRY/${{ github.repository }}/gateway:$(git describe --tags)
          kubectl rollout pause deployment/gateway
          # Wait 1h, monitor metrics
      - name: Rolling deployment (30%→60%→100%)
        run: |
          kubectl rollout resume deployment/gateway
          # Gradual rollout with 30min intervals
      - name: Post-deploy monitoring
        run: |
          # 24h monitoring with alerts

  rollback:
    name: Rollback Triggers
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - name: Check K8s cluster and rollback
        continue-on-error: true
        run: |
          # Graceful K8s rollback (only if KUBECONFIG configured)
          if [ -n "$KUBECONFIG" ] && command -v kubectl &> /dev/null; then
            echo "Attempting K8s rollback..."
            kubectl rollout undo deployment/gateway -n fitness-platform 2>/dev/null || echo "K8s rollback failed or cluster unavailable"
          else
            echo "⚠️  K8s not configured, skipping K8s rollback"
          fi
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install dependencies
        run: go mod download
      - name: Run vet
        run: go vet ./...
      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run --timeout=5m
      - name: Run fmt check
        run: |
          FILES=$(gofmt -l . | grep -v "cmd/tools/tools.go" || true)
          if [ -n "$FILES" ]; then
            echo "Files not formatted:"
            echo "$FILES"
            exit 1
          fi
          echo "All Go files are properly formatted"
      - name: Run tests
        run: go test -v -short -parallel 2 ./...

  security-scan:
    name: Security Scanning (SAST + Dependencies)
    runs-on: ubuntu-latest
    needs: code-review
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install dependencies
        run: go mod download
      # Go Security: проверка зависимостей на уязвимости (аналог npm audit)
      - name: Install gosec and govulncheck
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      # SAST: статический анализ кода на security issues
      - name: Run gosec SAST scanner
        run: |
          gosec -exclude-generated -fmt=sarif -out=gosec-results.sarif ./... || true
          echo "=== GOSEC SUMMARY ==="
          gosec -exclude-generated ./... || true

      # Upload gosec results to GitHub Security tab
      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec-results.sarif
          category: gosec

      # Проверка зависимостей на известные уязвимости
      - name: Run govulncheck
        continue-on-error: true
        run: |
          govulncheck ./... 2>&1 | tee vulncheck-results.txt || true
          echo "=== VULNCHECK SUMMARY ==="
          # Считаем количество найденных уязвимостей
          VULN_COUNT=$(grep -c "vulnerability" vulncheck-results.txt || echo "0")
          echo "Found $VULN_COUNT potential vulnerabilities"

      # Trivy: сканирование filesystem на secrets, misconfigurations
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      # Проверка Dockerfile на best practices
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Set git default branch to main
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Verify .env is NOT tracked in Git
      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch .env &>/dev/null; then
            echo "❌ CRITICAL: .env file is tracked in Git!"
            echo "   Run: git rm --cached .env"
            echo "   Add .env to .gitignore"
            exit 1
          fi
          echo "✅ .env is not tracked"

      # TruffleHog: поиск secrets в истории коммитов
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      # Gitleaks: дополнительный поиск утечек credentials
      - name: Run Gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          gitleaks detect --source . --config .gitleaks.toml --report-format json --report-path gitleaks-results.json || true

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [ci-build, security-scan, secrets-scan]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Go services
        run: |
          mkdir -p bin
          go build -o bin/user-service ./cmd/user-service
          go build -o bin/biometric-service ./cmd/biometric-service
          go build -o bin/training-service ./cmd/training-service
          go build -o bin/gateway ./cmd/gateway
          go build -o bin/device-emulator ./cmd/device-emulator
      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get lowercase repo name
        id: repo-lower
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build Go images
        run: |
          services="user-service biometric-service training-service gateway device-connector device-emulator"
          for svc in $services; do
            echo "Building $svc with tag ${{ steps.sha.outputs.short_sha }}..."
            docker build \
              -t ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/$svc:${{ steps.sha.outputs.short_sha }} \
              -t ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/$svc:latest \
              -f cmd/$svc/Dockerfile \
              .
            docker push ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/$svc:${{ steps.sha.outputs.short_sha }}
            docker push ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/$svc:latest
            echo "✅ $svc pushed"
          done

      # Security scan Docker images before pushing
      - name: Scan Docker images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/gateway:${{ steps.sha.outputs.short_sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Docker Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-docker
      - name: Build and push ML images (if models exist)
        run: |
          # ML classifier — собираем только если модели присутствуют
          if [ -f "models/classifier.keras" ] && [ -f "models/scaler.pkl" ]; then
            echo "Building ml-classifier (models found)..."
            docker build \
              -t ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-classifier:${{ steps.sha.outputs.short_sha }} \
              -t ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-classifier:latest \
              -f cmd/ml-classifier/Dockerfile \
              .
            docker push ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-classifier:${{ steps.sha.outputs.short_sha }}
            docker push ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-classifier:latest
            echo "✅ ml-classifier pushed"
          else
            echo "⚠️  Skipping ml-classifier — models/classifier.keras or models/scaler.pkl not found"
            echo "   Run 'python cmd/ml-classifier/train.py' locally and commit models to build ML image"
          fi

          # ML generator — собираем только если модель присутствует
          if [ -f "models/generator.h5" ] || [ -f "models/generator.keras" ]; then
            echo "Building ml-generator (model found)..."
            docker build \
              -t ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-generator:${{ steps.sha.outputs.short_sha }} \
              -t ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-generator:latest \
              -f cmd/ml-generator/Dockerfile \
              .
            docker push ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-generator:${{ steps.sha.outputs.short_sha }}
            docker push ${{ env.REGISTRY }}/${{ steps.repo-lower.outputs.repo_lower }}/ml-generator:latest
            echo "✅ ml-generator pushed"
          else
            echo "⚠️  Skipping ml-generator — models/generator not found"
            echo "   Run 'python cmd/ml-generator/train_gan.py' locally and commit model to build ML image"
          fi

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Install Docker on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            echo "=== INSTALLING DOCKER ==="
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com -o get-docker.sh
              sh get-docker.sh
              apt-get install -y docker-compose
              systemctl enable docker
              systemctl start docker
              echo "Docker installed"
            else
              echo "Docker already installed"
            fi
            docker --version
            docker-compose --version
          '
      - name: Clean up old Docker data
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            echo "=== CLEANING UP OLD DOCKER DATA ==="
            docker system prune -f --filter "until=72h"
            docker image prune -f --filter "until=168h"
            docker volume prune -f
            echo "Cleanup completed"
          '
      - name: Prepare server directories
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mkdir -p /opt/techip
            mkdir -p /opt/techip/certs
            mkdir -p /opt/techip/deploy/tls
            mkdir -p /opt/techip/deploy/lb
            mkdir -p /opt/techip/deploy/monitoring
          '
      - name: Create .env file on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cat > /opt/techip/.env << EOF
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=${{ vars.POSTGRES_DB }}
            DB_SSLMODE=disable
            REDIS_ADDR=redis:6379
            REDIS_DB=0
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            AUTH_PORT=8081
            AUTH_GRPC_PORT=50051
            TASKS_PORT=8082
            AUTH_GRPC_ADDR=auth:50051
            USER_SERVICE_ADDR=user-service:50051
            BIOMETRIC_SERVICE_ADDR=biometric-service:50052
            TRAINING_SERVICE_ADDR=training-service:50053
            GATEWAY_PORT=8080
            ML_CLASSIFIER_URL=http://ml-classifier:8001
            ML_GENERATOR_URL=http://ml-generator:8002
            MODEL_PATH=/app/models/classifier.keras
            SCALER_PATH=/app/models/scaler.pkl
            GENERATOR_PATH=/app/models/generator.h5
            SMTP_HOST=smtp.yandex.ru
            SMTP_PORT=465
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EMAIL_DAILY_LIMIT=100
            EMAIL_SKIP_DOMAINS=example.com
            EOF
          '
      - name: Get short SHA for image tag
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Copy docker-compose file
        run: |
          scp -o StrictHostKeyChecking=accept-new deployments/docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/docker-compose.yml
      - name: Copy init SQL
        run: |
          scp -o StrictHostKeyChecking=accept-new scripts/init-db.sql ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/init.sql
      - name: Update docker-compose with specific image tags
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            for svc in user-service biometric-service training-service gateway ml-classifier ml-generator; do
              sed -i "s|ghcr.io/.*/$svc:latest|ghcr.io/${{ github.repository_owner }}/technology_2_sem/$svc:${{ steps.sha.outputs.short_sha }}|g" docker-compose.yml
            done
          '
      - name: Deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip

            # Скачаем основные сервисы (обязательные)
            docker-compose pull user-service biometric-service training-service gateway

            # Попробуем скачать ML образы — если их нет, пропустим
            ML_SERVICES="user-service biometric-service training-service gateway"
            docker-compose pull ml-classifier 2>/dev/null && ML_SERVICES="$ML_SERVICES ml-classifier" || echo "Skipping ml-classifier — image not in registry"
            docker-compose pull ml-generator 2>/dev/null && ML_SERVICES="$ML_SERVICES ml-generator" || echo "Skipping ml-generator — image not in registry"

            # Остановим старые контейнеры
            docker-compose down 2>/dev/null || true

            # Запустим только доступные сервисы
            docker-compose up -d $ML_SERVICES
            sleep 20
            docker-compose ps
          '
      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            echo "=== HEALTH CHECKS ==="
            curl -s http://localhost:8080/health || echo "Gateway not responding"
            echo ""
            curl -s http://localhost:8001/health || echo "ML Classifier not responding"
            echo ""
            curl -s http://localhost:8002/health || echo "ML Generator not responding"
          '
      - name: Configure system for DDoS protection
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            echo "=== Setting sysctl parameters ==="
            cat >> /etc/sysctl.d/99-fitness.conf << EOF
            net.ipv4.tcp_syncookies=1
            net.ipv4.tcp_syn_retries=2
            net.ipv4.tcp_synack_retries=2
            net.core.somaxconn=1024
            net.ipv4.ip_local_port_range=1024 65535
            EOF
            sysctl -p /etc/sysctl.d/99-fitness.conf

            echo "=== Creating cleanup script ==="
            mkdir -p /opt/techip
            cat > /opt/techip/cleanup.sh << '"EOF"'
            #!/bin/bash
            docker image prune -a -f --filter "until=168h"
            docker container prune -f
            docker volume prune -f
            docker builder prune -f
            find /var/log -name "*.log" -type f -mtime +30 -delete
            journalctl --vacuum-time=7d
            docker system prune -f --volumes
            EOF
            chmod +x /opt/techip/cleanup.sh

            echo "=== Setting up cron for weekly cleanup ==="
            (crontab -l 2>/dev/null; echo "0 2 * * 0 /opt/techip/cleanup.sh >> /var/log/cleanup.log 2>&1") | crontab -
          '
      - name: Get deployment status for notification
        id: deployment-status
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "status_emoji=✅" >> $GITHUB_OUTPUT
            echo "status_text=УСПЕШНО ЗАВЕРШЕН" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "status_emoji=❌" >> $GITHUB_OUTPUT
            echo "status_text=ЗАВЕРШИЛСЯ С ОШИБКОЙ" >> $GITHUB_OUTPUT
          fi

  k8s-deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - name: Create secrets from GitHub Secrets
        run: |
          kubectl create namespace fitness-platform --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secrets \
            --namespace=fitness-platform \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=RABBITMQ_USER=${{ secrets.RABBITMQ_USER }} \
            --from-literal=RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f configs/k8s/namespace.yaml
          kubectl apply -f configs/k8s/configmap.yaml
          kubectl apply -f configs/k8s/serviceaccount.yaml
          kubectl apply -f configs/k8s/pvc.yaml
          kubectl apply -f configs/k8s/init-sql.yaml
          # Infrastructure
          kubectl apply -f configs/k8s/deployments/postgres.yaml
          kubectl apply -f configs/k8s/deployments/redis.yaml
          kubectl apply -f configs/k8s/deployments/rabbitmq.yaml
          kubectl wait --for=condition=ready pod -l app=postgres -n fitness-platform --timeout=120s || true
          kubectl wait --for=condition=ready pod -l app=redis -n fitness-platform --timeout=60s || true
          # Application services
          kubectl apply -f configs/k8s/deployments/user-service.yaml
          kubectl apply -f configs/k8s/deployments/biometric-service.yaml
          kubectl apply -f configs/k8s/deployments/training-service.yaml
          kubectl apply -f configs/k8s/deployments/device-connector.yaml
          kubectl apply -f configs/k8s/deployments/ml-classifier.yaml
          kubectl apply -f configs/k8s/deployments/ml-generator.yaml
          kubectl apply -f configs/k8s/deployments/gateway.yaml
          kubectl apply -f configs/k8s/nginx-lb.yaml
          # Services
          kubectl apply -f configs/k8s/services/
          # Security & scaling
          kubectl apply -f configs/k8s/network-policies.yaml || true
          kubectl apply -f configs/k8s/resource-quota.yaml || true
          kubectl apply -f configs/k8s/hpa.yaml || true
          kubectl apply -f configs/k8s/pdb.yaml || true
      - name: Verify pods
        run: kubectl get pods -n fitness-platform

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [ci-build, security-scan, secrets-scan, build, docker, deploy, k8s-deploy]
    if: always() && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - name: Get all job statuses
        id: statuses
        run: |
          TEST_STATUS="${{ needs.ci-build.result }}"
          SECURITY_STATUS="${{ needs.security-scan.result }}"
          SECRETS_STATUS="${{ needs.secrets-scan.result }}"
          BUILD_STATUS="${{ needs.build.result }}"
          DOCKER_STATUS="${{ needs.docker.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          K8S_STATUS="${{ needs.k8s-deploy.result }}"

          if [ "$K8S_STATUS" = "success" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            OVERALL="success"
            OVERALL_EMOJI="✅"
            OVERALL_TEXT="УСПЕШНО"
          elif [ "$K8S_STATUS" = "failure" ] || [ "$DEPLOY_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА ДЕПЛОЯ"
          elif [ "$DOCKER_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА СБОРКИ DOCKER"
          elif [ "$BUILD_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА СБОРКИ"
          elif [ "$SECURITY_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА SECURITY"
          elif [ "$SECRETS_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОБНАРУЖЕНЫ СЕКРЕТЫ"
          elif [ "$TEST_STATUS" = "failure" ]; then
            OVERALL="failure"
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="ОШИБКА ТЕСТОВ"
          else
            OVERALL="success"
            OVERALL_EMOJI="✅"
            OVERALL_TEXT="УСПЕШНО"
          fi

          echo "overall=$OVERALL" >> $GITHUB_OUTPUT
          echo "overall_emoji=$OVERALL_EMOJI" >> $GITHUB_OUTPUT
          echo "overall_text=$OVERALL_TEXT" >> $GITHUB_OUTPUT

          get_status_emoji() {
            case "$1" in
              "success") echo "✅" ;;
              "failure") echo "❌" ;;
              "cancelled") echo "⏸️" ;;
              "skipped") echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "test_emoji=$(get_status_emoji $TEST_STATUS)" >> $GITHUB_OUTPUT
          echo "security_emoji=$(get_status_emoji $SECURITY_STATUS)" >> $GITHUB_OUTPUT
          echo "secrets_emoji=$(get_status_emoji $SECRETS_STATUS)" >> $GITHUB_OUTPUT
          echo "build_emoji=$(get_status_emoji $BUILD_STATUS)" >> $GITHUB_OUTPUT
          echo "docker_emoji=$(get_status_emoji $DOCKER_STATUS)" >> $GITHUB_OUTPUT
          echo "deploy_emoji=$(get_status_emoji $DEPLOY_STATUS)" >> $GITHUB_OUTPUT
          echo "k8s_emoji=$(get_status_emoji $K8S_STATUS)" >> $GITHUB_OUTPUT

          echo "test_status=$TEST_STATUS" >> $GITHUB_OUTPUT
          echo "security_status=$SECURITY_STATUS" >> $GITHUB_OUTPUT
          echo "secrets_status=$SECRETS_STATUS" >> $GITHUB_OUTPUT
          echo "build_status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "docker_status=$DOCKER_STATUS" >> $GITHUB_OUTPUT
          echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT
          echo "k8s_status=$K8S_STATUS" >> $GITHUB_OUTPUT
      - name: Get commit info
        id: commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "commit_url=$COMMIT_URL" >> $GITHUB_OUTPUT
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *${{ steps.statuses.outputs.overall_emoji }} CI/CD Pipeline — ${{ steps.statuses.outputs.overall_text }}*

            📦 **Репозиторий:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            🌿 **Ветка:** `${{ github.ref_name }}`
            🔖 **Коммит:** [`${{ github.sha }}`](${{ steps.commit.outputs.commit_url }})
            👤 **Автор:** ${{ steps.commit.outputs.author }}
            📝 **Сообщение:** ${{ steps.commit.outputs.message }}

            ━━━━━━━━━━━━━━━━━━━━━

            *📊 Статусы этапов:*
            | Этап | Статус |
            |------|--------|
            | 🧪 Тесты | ${{ steps.statuses.outputs.test_emoji }} `${{ steps.statuses.outputs.test_status }}` |
            | 🔒 Security | ${{ steps.statuses.outputs.security_emoji }} `${{ steps.statuses.outputs.security_status }}` |
            | 🔑 Secrets | ${{ steps.statuses.outputs.secrets_emoji }} `${{ steps.statuses.outputs.secrets_status }}` |
            | 🔨 Сборка | ${{ steps.statuses.outputs.build_emoji }} `${{ steps.statuses.outputs.build_status }}` |
            | 🐳 Docker | ${{ steps.statuses.outputs.docker_emoji }} `${{ steps.statuses.outputs.docker_status }}` |
            | 🚀 Деплой (VPS) | ${{ steps.statuses.outputs.deploy_emoji }} `${{ steps.statuses.outputs.deploy_status }}` |
            | ☸️ Kubernetes | ${{ steps.statuses.outputs.k8s_emoji }} `${{ steps.statuses.outputs.k8s_status }}` |

            ━━━━━━━━━━━━━━━━━━━━━

            *🖥️ Доступ к сервисам:*
            • 🌐 Gateway: http://${{ secrets.VPS_HOST }}:8080
            • 🤖 ML Classifier: http://${{ secrets.VPS_HOST }}:8001
            • 🎨 ML Generator: http://${{ secrets.VPS_HOST }}:8002
            • 📨 RabbitMQ UI: http://${{ secrets.VPS_HOST }}:15672
            • 📊 Prometheus: http://${{ secrets.VPS_HOST }}:9090
            • 📈 Grafana: http://${{ secrets.VPS_HOST }}:3000

            [🔗 Подробный отчет в Actions](${{ steps.commit.outputs.run_url }})