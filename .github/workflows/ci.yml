name: CI/CD Pipeline

on:
  push:
    branches: [main, master, Microservice_arc]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/dependabot.yml'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'configs/**'
      - 'scripts/**'
      - 'models/**'
      - 'deployments/**'
      - '.dockerignore'
      - 'db/migrations/**'
  pull_request:
    branches: [main, master, Microservice_arc]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/dependabot.yml'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'configs/**'
      - 'scripts/**'
      - 'models/**'
      - 'deployments/**'
      - '.dockerignore'
      - 'db/migrations/**'
  schedule:
    - cron: '0 0 * * 1'
    - cron: '0 9 1 * *'
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select execution mode"
        required: false
        type: choice
        options: [full, maintenance]
      maintenance_type:
        description: "For maintenance mode: update|audit|vulncheck"
        required: false
        type: choice
        options: [update, audit, vulncheck]
        default: "update"

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

env:
  GO_VERSION: "1.26.4"
  REGISTRY: ghcr.io
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  # ═══════════════════════════════════════════════════════════
  # 0. DETECT CHANGES — определяет, какие части пересобирать
  # ═══════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      user: ${{ steps.filter.outputs.user }}
      biometric: ${{ steps.filter.outputs.biometric }}
      training: ${{ steps.filter.outputs.training }}
      device: ${{ steps.filter.outputs.device }}
      ml: ${{ steps.filter.outputs.ml }}
      k8s: ${{ steps.filter.outputs.k8s }}
      workflow: ${{ steps.filter.outputs.workflow }}
      db: ${{ steps.filter.outputs.db }}
      any_code: ${{ steps.filter.outputs.any_code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'cmd/gateway/**'
              - 'internal/gateway/**'
              - 'api/proto/gateway/**'
            user:
              - 'cmd/user-service/**'
              - 'internal/user/**'
            biometric:
              - 'cmd/biometric-service/**'
              - 'internal/biometric/**'
            training:
              - 'cmd/training-service/**'
              - 'internal/training/**'
            device:
              - 'cmd/device-connector/**'
              - 'cmd/device-emulator/**'
              - 'internal/device/**'
            ml:
              - 'cmd/ml-classifier/**'
              - 'cmd/ml-generator/**'
              - 'models/**'
            k8s:
              - 'configs/k8s/**'
            workflow:
              - '.github/workflows/**'
            db:
              - 'db/migrations/**'
              - 'configs/k8s/base/jobs/**'
            any_code:
              - 'cmd/**'
              - 'internal/**'
              - 'pkg/**'
              - 'api/**'
              - 'go.mod'
              - 'go.sum'
  # ─────────────────────────────────────────────────────────────
  # 1. ВАЛИДАЦИЯ И ПРОВЕРКИ (запускаются всегда, параллельно)
  # ─────────────────────────────────────────────────────────────

  validate-workflow:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate workflow syntax
        uses: rhysd/actionlint@v1.7.12

  dockerfile-lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Hadolint on all Dockerfiles
        run: |
          find cmd -maxdepth 2 -type f -name Dockerfile -print0 | sort -z | while IFS= read -r -d '' dockerfile; do
            echo "Linting $dockerfile"
            docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" -w /workspace hadolint/hadolint hadolint -c .hadolint.yaml "$dockerfile"
          done

  # ─────────────────────────────────────────────────────────────
  # 1.1. MONTHLY DEPENDENCY UPDATE (schedule)
  # ─────────────────────────────────────────────────────────────

  monthly-dependency-update:
    name: Monthly Dependency Update
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule == '0 9 1 * *' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: monthly dependency update"
          branch: "security/maintenance/monthly-update"
          title: "chore: monthly dependency update"
          body: |
            This PR updates all Go dependencies to their latest versions.
            Scheduled run on the 1st of each month.

  # ─────────────────────────────────────────────────────────────
  # 1.2. QUARTERLY VULNCHECK (schedule)
  # ─────────────────────────────────────────────────────────────

  quarterly-vulncheck:
    name: Quarterly Vulnerability Check
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule == '0 9 1 1,4,7,10 *' }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./... -show verbose

  # ─────────────────────────────────────────────────────────────
  # 1.3. OSV DEPENDENCY AUDIT (при push go.mod/go.sum или manual)
  # ─────────────────────────────────────────────────────────────

  osv-audit:
    name: OSV Dependency Audit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' 
      && inputs.run_mode == 'maintenance' 
      && inputs.maintenance_type == 'audit'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install osv-scanner
        run: GOBIN="$HOME/go/bin" go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      - name: Run osv-scanner
        run: |
          # shellcheck disable=SC2086
          $HOME/go/bin/osv-scanner -r ./...

  # ─────────────────────────────────────────────────────────────
  # 2. СБОРКА (только при обычных триггерах, не Maintenance)
  # ─────────────────────────────────────────────────────────────

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gosec SAST scanner
        run: |
          mkdir -p sarif-results
          gosec -exclude-generated -fmt=sarif -out=sarif-results/gosec.sarif ./... 2>&1 || true
          if [ ! -s sarif-results/gosec.sarif ]; then
            echo "{\"\\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json\",\"version\":\"2.1.0\",\"runs\":[{\"tool\":{\"driver\":{\"name\":\"gosec\"}},\"results\":[]}]}" > sarif-results/gosec.sarif
          fi
      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: sarif-results/gosec.sarif
          category: gosec
      - name: Run govulncheck
        run: govulncheck ./... 2>&1 | tee vulncheck-results.txt
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          skip-dirs: 'configs/k8s/overlays/production'
      - name: Run Trivy filesystem scan
        id: trivy-fs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'sarif-results/trivy-fs.sarif'
          exit-code: '0'
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results/trivy-fs.sarif
          category: trivy-fs

  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch .env &>/dev/null; then
            echo "CRITICAL: .env file is tracked in Git!"; exit 1
          fi
          echo ".env is not tracked"
      - name: TruffleHog scan
        id: trufflehog_scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - name: Alert on secrets found
        if: steps.trufflehog_scan.outcome == 'failure'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TG_CHAT_ID}\", \"text\": \"<b>Secrets detected!</b>\nRepo: ${{ github.repository }}\nRun: <a href='${RUN_URL}'>Details</a>\", \"parse_mode\": \"HTML\"}"

  check:
    name: Make Check (Lint + Test)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run make check
        run: make check
        env:
          DOCKER_HOST: ""

  # ─────────────────────────────────────────────────────────────
  # 2. СБОРКА (после успешных проверок)
  # ─────────────────────────────────────────────────────────────

  binary_build:
    name: Build Binaries
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [security-scan, secrets-scan, check, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Go services (parallel)
        run: |
          mkdir -p bin
          GOMAXPROCS=$(nproc)
          export GOMAXPROCS
          for svc in user-service biometric-service training-service gateway device-connector device-emulator; do
            go build -ldflags="-s -w" -o "bin/$svc" ./cmd/"$svc" &
          done
          wait
      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/
          retention-days: 1

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [binary_build]
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance')
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push Go services
        run: |
          services="user-service biometric-service training-service gateway device-connector device-emulator"
          for svc in $services; do
            echo "Building $svc..."
            docker buildx build \
              --build-arg GOPROXY=https://proxy.golang.org,direct \
              --cache-from=type=gha \
              --cache-to=type=gha,mode=max \
              -t "${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/$svc:latest" \
              -f "cmd/$svc/Dockerfile" . \
              --push
          done
      - name: Build and push ML images (if models exist)
        run: |
          if [ -f "models/scaler.pkl" ] && { [ -f "models/classifier.keras" ] || ls models/classifier_*.keras >/dev/null 2>&1; }; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest" \
              -f cmd/ml-classifier/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest"
          fi
          if [ -f "models/generator.h5" ] || [ -f "models/generator.keras" ]; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest" \
              -f cmd/ml-generator/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest"
          fi
      - name: Scan gateway image with Trivy
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/mamuer/project/gateway:${{ steps.sha.outputs.short_sha }}'
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          scanners: vuln
      - name: Upload Trivy image results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker

  # ─────────────────────────────────────────────────────────────
  # 4. K8S INFRASTRUCTURE: Provision k3s on VPS
  # ─────────────────────────────────────────────────────────────
  provision-k8s-vps:
    name: Provision k3s Cluster on VPS (Step-by-Step, Safe)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance')
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    outputs:
      kubeconfig_available: ${{ steps.kubeconfig.outputs.available }}
    steps:
      - uses: actions/checkout@v6
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Make retry script executable
        run: chmod +x scripts/ssh-retry.sh
      - name: Clean up old k3s (safe)
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          set -x
          echo "-> Stopping k3s..."
          systemctl stop k3s 2>/dev/null || true
          pkill -9 -f "k3s server" 2>/dev/null || true
          echo "-> Removing k3s files..."
          rm -rf /var/lib/rancher/k3s /etc/rancher/k3s
          rm -f /usr/local/bin/k3s /etc/systemd/system/k3s.service /etc/systemd/system/k3s*.timer
          systemctl daemon-reload
          echo "Cleanup done"
          '
      - name: Fix DNS resolv.conf
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          echo "-> Fixing /etc/resolv.conf (remove duplicate nameservers)..."
          if [ -f /etc/resolv.conf ]; then
            cp /etc/resolv.conf /etc/resolv.conf.bak 2>/dev/null || true
            {
              grep -v "^nameserver" /etc/resolv.conf || true
              echo "nameserver 8.8.8.8"
              echo "nameserver 1.1.1.1"
            } > /tmp/resolv.conf.new
            mv /tmp/resolv.conf.new /etc/resolv.conf
            echo "New /etc/resolv.conf:"
            cat /etc/resolv.conf
          fi
          '
      - name: Prepare k3s config on VPS
        run: |
          VPS_HOST="${{ secrets.VPS_HOST }}"
          printf "bind-address: 0.0.0.0\ntls-san:\n  - %s\ndisable:\n  - metrics-server\n  - traefik\nflannel-backend: wireguard-native\nwrite-kubeconfig-mode: 644\ndocker: true\n" "$VPS_HOST" > /tmp/k3s-config-remote.yaml
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          mkdir -p /etc/rancher/k3s
          echo "Directory /etc/rancher/k3s created"
          '
          ./scripts/ssh-retry.sh scp /tmp/k3s-config-remote.yaml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/config.yaml"
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          echo "Config written:"
          cat /etc/rancher/k3s/config.yaml
          '
      - name: Download k3s binary and install script on runner
        run: |
          echo "-> Downloading k3s binary and install script on GitHub runner..."
          curl -sfL -o /tmp/k3s https://github.com/k3s-io/k3s/releases/download/v1.31.6%2Bk3s1/k3s
          chmod +x /tmp/k3s
          curl -sfL -o /tmp/install.sh https://get.k3s.io
          chmod +x /tmp/install.sh
          echo "Download complete."
      - name: Upload k3s files to VPS
        run: |
          ./scripts/ssh-retry.sh scp /tmp/k3s "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/k3s"
          ./scripts/ssh-retry.sh scp /tmp/install.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/install.sh"
      - name: Install k3s on VPS (with Docker runtime)
        env:
          SSH_RETRY_TIMEOUT: 600
          SSH_RETRY_MAX_ATTEMPTS: 5
          SSH_RETRY_DELAY_SECONDS: 15
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          set -euo pipefail
          echo "-> Moving k3s binary to /usr/local/bin..."
          mv /tmp/k3s /usr/local/bin/k3s
          chmod +x /usr/local/bin/k3s
          
          echo "-> Running k3s install script with Docker runtime..."
          export INSTALL_K3S_SKIP_DOWNLOAD=true
          chmod +x /tmp/install.sh
          /tmp/install.sh server --write-kubeconfig-mode 644 --docker
          echo "k3s installed successfully"
          '
      - name: Pre-pull system images via Docker
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          echo "-> Pre-pulling system images via Docker..."
          docker pull rancher/mirrored-pause:3.6 || echo "pause image pull failed, continuing"
          docker pull rancher/mirrored-coredns-coredns:1.10.1 || echo "coredns pull failed"
          docker pull rancher/mirrored-library-traefik:2.9.10 || echo "traefik pull failed"
          docker pull rancher/local-path-provisioner:v0.0.26 || echo "local-path pull failed"
          echo "Docker images:"
          docker images | head -10
          '
      - name: Start and verify k3s
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          echo "-> Starting k3s..."
          systemctl daemon-reload
          systemctl enable --now k3s
          echo "-> Waiting for readiness..."
          for i in $(seq 1 120); do
            if k3s kubectl cluster-info &> /dev/null; then
              echo "k3s ready after ${i}s"
              break
            fi
            [ $i -eq 120 ] && { echo "Timeout"; journalctl -u k3s -n 20 --no-pager; exit 1; }
            sleep 2
          done
          echo "=== Cluster status ==="
          k3s kubectl get nodes -o wide
          k3s kubectl get pods -A
          '
      - name: Setup Nginx reverse proxy
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "-> Installing Nginx and Certbot..."
            sudo apt update
            sudo apt install -y nginx certbot python3-certbot-nginx
            
            echo "-> Configuring firewall for HTTP/HTTPS..."
            sudo ufw allow "Nginx Full" || true
            sudo ufw reload || true
            
            echo "-> Stopping Nginx for certbot..."
            sudo systemctl stop nginx
            
            echo "-> Obtaining SSL certificate..."
            sudo certbot certonly --standalone -d fittpulse.duckdns.org --non-interactive --agree-tos --email admin@fittpulse.duckdns.org || {
              echo "⚠️ Certificate already exists or failed, continuing..."
            }
            
            echo "-> Starting Nginx..."
            sudo systemctl start nginx
            sudo systemctl enable nginx
            
            echo "✅ Nginx and SSL configured"
          '

      - name: Upload Nginx configuration
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            sudo mkdir -p /etc/nginx/sites-available
          '
          ./scripts/ssh-retry.sh scp deploy/lb/production.conf "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/production.conf"
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            sudo mv /tmp/production.conf /etc/nginx/sites-available/fitpulse
            sudo ln -sf /etc/nginx/sites-available/fitpulse /etc/nginx/sites-enabled/fitpulse
            sudo rm -f /etc/nginx/sites-enabled/default
            
            echo "-> Testing Nginx configuration..."
            sudo nginx -t || { echo "❌ Nginx config test failed"; exit 1; }
            
            echo "-> Reloading Nginx..."
            sudo systemctl reload nginx
            
            echo "✅ Nginx configuration applied"
          '

      - name: Setup auto-renewal for SSL certificates
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "-> Setting up certificate auto-renewal..."
            (sudo crontab -l 2>/dev/null | grep -v certbot; echo "0 3 * * * certbot renew --quiet --deploy-hook '\''systemctl reload nginx'\''") | sudo crontab -
            echo "✅ Auto-renewal configured"
          '
      - name: Setup ML infrastructure directories on VPS
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "-> Creating directories for ML storage..."
            sudo mkdir -p /opt/fitpulse/{dvc-storage,mlflow-data}
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /opt/fitpulse
            echo "✅ Directories created: /opt/fitpulse/{dvc-storage,mlflow-data}"
          '

      - name: Deploy MLflow service on VPS
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "-> Deploying MLflow via Docker Compose..."
            
            # Копируем docker-compose файл на VPS
            mkdir -p ~/fitpulse/deployments
            cd ~/fitpulse
            
            # Создаём docker-compose.mlflow.yml на лету (локальное хранилище, без S3)
            cat > deployments/docker-compose.mlflow.yml << '\''EOFMLFLOW'\''
          version: '3.8'

          services:
            mlflow:
              image: ghcr.io/mlflow/mlflow:v2.20.2
              container_name: fitpulse-mlflow
              ports:
                - "5000:5000"
              command: >
                mlflow server
                --host 0.0.0.0
                --port 5000
                --backend-store-uri sqlite:////mlflow/mlflow.db
                --default-artifact-root /mlflow/artifacts
              volumes:
                - /opt/fitpulse/mlflow-data:/mlflow
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
              networks:
                - fitness-network

          networks:
            fitness-network:
              external: true
            EOFMLFLOW

            # Запускаем (или перезапускаем) MLflow
            docker compose -f deployments/docker-compose.mlflow.yml up -d
            
            # Ждём готовности
            for _ in {1..30}; do
              if curl -sf http://localhost:5000/health &>/dev/null; then
                echo "✅ MLflow is healthy"
                break
              fi
              sleep 2
            done
            
            echo "✅ MLflow deployed: http://${{ secrets.VPS_HOST }}:5000"
          '

      - name: Configure DVC local remote on VPS
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "-> Configuring DVC for local storage..."
            
            cd ~/fitpulse
            
            # Создаём/обновляем .dvc/config
            mkdir -p .dvc
            cat > .dvc/config << '\''EOFDVC'\''
          [core]
          remote = local

          ['\''remote "local"'\'']
          url = /opt/fitpulse/dvc-storage
          EOFDVC
            
            echo "✅ DVC configured with local remote: /opt/fitpulse/dvc-storage"
          '
      - name: Download and fix kubeconfig
        id: kubeconfig
        run: |
          ./scripts/ssh-retry.sh scp \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/k3s.yaml" \
            ./k3s-config.yaml
          sed -i "s|127.0.0.1|${{ secrets.VPS_HOST }}|g; s|localhost|${{ secrets.VPS_HOST }}|g; s|0.0.0.0|${{ secrets.VPS_HOST }}|g" ./k3s-config.yaml
          echo "=== Fixed kubeconfig ==="
          grep "server:" ./k3s-config.yaml
          if grep -q "server: https://${{ secrets.VPS_HOST }}:6443" ./k3s-config.yaml; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
          if timeout 10 bash -c "</dev/tcp/${{ secrets.VPS_HOST }}/6443" 2>/dev/null; then
            echo "cluster_connectivity=true" >> "$GITHUB_OUTPUT"
          else
            echo "cluster_connectivity=false" >> "$GITHUB_OUTPUT"
            echo "K8s API not reachable from runner"
          fi
      - name: Upload TLS certificates to VPS
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            mkdir -p /etc/rancher/k3s/tls
          '
          
          if [ -f "deploy/tls/certs/server.crt" ] && [ -f "deploy/tls/certs/server.key" ]; then
            echo "Uploading TLS certificates..."
            ./scripts/ssh-retry.sh scp deploy/tls/certs/server.crt "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/tls/server.crt"
            ./scripts/ssh-retry.sh scp deploy/tls/certs/server.key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/tls/server.key"
            echo "TLS certificates uploaded"
          else
            echo "⚠️ TLS certificates not found, generating self-signed..."
            ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout /etc/rancher/k3s/tls/server.key \
                -out /etc/rancher/k3s/tls/server.crt \
                -subj "/C=RU/ST=Moscow/L=Moscow/O=FitPulse/CN=2.27.32.242" \
                -addext "subjectAltName=IP:2.27.32.242"
            '
            echo "Self-signed certificates generated"
          fi

      - name: Download TLS certificates from VPS
        run: |
          mkdir -p /tmp/tls
          ./scripts/ssh-retry.sh scp "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/tls/server.crt" /tmp/tls/server.crt
          ./scripts/ssh-retry.sh scp "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/tls/server.key" /tmp/tls/server.key
          chmod 600 /tmp/tls/server.key

      - name: Create TLS Secret in Kubernetes
        run: |
          # Настраиваем kubectl для подключения к VPS
          mkdir -p "$HOME/.kube"
          cp ./k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          
          # Проверяем подключение
          kubectl cluster-info
          
          # Создаём namespace (если не существует)
          kubectl create namespace fitness-platform-production --dry-run=client -o yaml | kubectl apply --validate=false -f -
          
          # Ждём пока кластер будет готов
          sleep 10
          
          # Создаём TLS Secret для Gateway
          kubectl create secret tls gateway-tls \
            --cert=/tmp/tls/server.crt \
            --key=/tmp/tls/server.key \
            -n fitness-platform-production \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -
          
          echo "✅ TLS Secret created in fitness-platform-production"
      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v7
        with:
          name: kubeconfig
          path: ./k3s-config.yaml
          retention-days: 1
  # ─────────────────────────────────────────────────────────────
  # 3. ТЕСТОВОЕ ОКРУЖЕНИЕ (Docker Compose на runner)
  # ─────────────────────────────────────────────────────────────

  deploy-test:
    name: Deploy to Test (Docker Compose)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [binary_build, provision-k8s-vps]
    steps:
      - uses: actions/checkout@v6
      - name: Start test environment
        run: docker compose -f docker-compose.test.yml up -d
      - name: Wait for services
        run: |
          docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 180 || true
          docker compose -f docker-compose.test.yml ps
      - name: Smoke tests
        run: |
          set -euo pipefail
          GATEWAY_URL="http://localhost:8081"
          for _ in {1..15}; do
            RESPONSE=$(curl -s --max-time 3 "$GATEWAY_URL/health" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              break
            fi
            sleep 5
          done
          RESPONSE=$(curl -s --max-time 5 "$GATEWAY_URL/health")
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || {
            echo "Health check failed or degraded"
            docker compose -f docker-compose.test.yml logs --tail=150 user-service-test || true
            docker compose -f docker-compose.test.yml logs --tail=150 gateway-test || true
            exit 1
          }
          echo "$RESPONSE" | grep -q '"user":"up"' || {
            echo "User service not healthy"
            docker compose -f docker-compose.test.yml logs --tail=150 user-service-test || true
            exit 1
          }
          TIMESTAMP=$(date +%s)
          REGISTER_RESPONSE=$(curl -s -w "%{http_code}" -X POST "$GATEWAY_URL/api/v1/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke'"$TIMESTAMP"'@test.com","password":"Test123!","full_name":"Smoke","role":"client"}')
          HTTP_CODE="${REGISTER_RESPONSE: -3}"
          [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]] || exit 1
          echo "Smoke tests passed"

  # ─────────────────────────────────────────────────────────────
  # 5. PRODUCTION DEPLOY (K8s namespace: fitness-platform-production)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to K8s Production
    runs-on: ubuntu-latest
    needs: [docker, provision-k8s-vps]
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance')
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    outputs:
      reachable: ${{ steps.connectivity.outputs.reachable }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl config set-context --current --namespace=fitness-platform-production
      - name: Wait for k3s API to be fully ready
        run: |
          echo "Waiting for k3s API server to be fully initialized..."
          for i in {1..30}; do
            if kubectl get --raw=/healthz &>/dev/null; then
              echo "✅ k3s API server is ready after ${i}0 seconds"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ k3s API server not ready after 5 minutes"
              kubectl cluster-info dump || true
              exit 1
            fi
            echo "Attempt $i/30: API not ready, waiting 10s..."
            sleep 10
          done
          
          echo "Verifying API endpoints..."
          kubectl api-resources --api-group=apps &>/dev/null || {
            echo "API resources not available, waiting 30s more..."
            sleep 30
          }
      - name: Check cluster connectivity
        id: connectivity
        run: |
          echo "Testing connectivity to ${{ secrets.VPS_HOST }}:6443..."
          if timeout 10 bash -c "</dev/tcp/${{ secrets.VPS_HOST }}/6443" 2>/dev/null; then
            echo "Cluster reachable"
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "Cluster NOT reachable (timeout 10s)"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Create image pull secret for GHCR
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Creating imagePullSecret for ghcr.io..."
          kubectl create namespace fitness-platform-production --dry-run=client -o yaml | kubectl apply --validate=false -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            -n fitness-platform-production \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -
          echo "imagePullSecret created/updated"
      - name: Ensure service account exists
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Checking service account app-service-account..."
          kubectl create serviceaccount app-service-account \
            -n fitness-platform-production \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create clusterrolebinding app-service-account-binding \
            --clusterrole=edit \
            --serviceaccount=fitness-platform-production:app-service-account \
            --dry-run=client -o yaml | kubectl apply -f - || true
          echo "ServiceAccount ready"
      - name: Create production secrets
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Creating app-secrets..."
          RABBITMQ_URL="amqp://${{ secrets.RABBITMQ_USER }}:${{ secrets.RABBITMQ_PASS }}@rabbitmq:5672/"
          kubectl create secret generic app-secrets -n fitness-platform-production \
            --from-literal=POSTGRES_USER=postgres \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=fitness \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=RABBITMQ_USER=${{ secrets.RABBITMQ_USER }} \
            --from-literal=RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --from-literal=RABBITMQ_URL="$RABBITMQ_URL" \
            --from-literal=SMTP_HOST=${{ vars.SMTP_HOST }} \
            --from-literal=SMTP_PORT=${{ vars.SMTP_PORT }} \
            --from-literal=SMTP_USER=${{ secrets.SMTP_USER }} \
            --from-literal=SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }} \
            --from-literal=SMTP_FROM=${{ secrets.SMTP_FROM }} \
            --from-literal=APP_BASE_URL=${{ vars.APP_BASE_URL }} \
            --from-literal=SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }} \
            --from-literal=SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }} \
            --from-literal=FITBIT_CLIENT_ID=${{ secrets.FITBIT_CLIENT_ID }} \
            --from-literal=FITBIT_CLIENT_SECRET=${{ secrets.FITBIT_CLIENT_SECRET }} \
            --from-literal=FITBIT_REDIRECT_URI=${{ vars.FITBIT_REDIRECT_URI }} \
            --from-literal=FITBIT_VERIFIER_SECRET=${{ secrets.FITBIT_VERIFIER_SECRET }} \
            --from-literal=WITHINGS_CLIENT_ID=${{ secrets.WITHINGS_CLIENT_ID }} \
            --from-literal=WITHINGS_CLIENT_SECRET=${{ secrets.WITHINGS_CLIENT_SECRET }} \
            --from-literal=WITHINGS_REDIRECT_URI=${{ vars.WITHINGS_REDIRECT_URI }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ app-secrets created"
      - name: Update image tags to SHA
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Updating image tags to :$SHA"
          cd configs/k8s/overlays/production
          for svc in user-service biometric-service training-service gateway ml-classifier ml-generator; do
            kustomize edit set image "ghcr.io/mamuer/project/$svc=ghcr.io/mamuer/project/$svc:$SHA"
          done
      - name: Cleanup old and failed pods before deploy
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "-> Cleaning up failed, evicted, and succeeded pods..."
          kubectl delete pods -n fitness-platform-production \
            --field-selector=status.phase=Failed,status.phase=Succeeded,status.phase=Unknown \
            --ignore-not-found=true || true
          echo "-> Cleaning up old ReplicaSets..."
          kubectl get rs -n fitness-platform-production -o json | \
            jq -r '.items[] | select(.status.replicas == 0) | .metadata.name' | \
            xargs -r -n1 kubectl delete rs -n fitness-platform-production || true
          echo "-> Cleanup complete"
          kubectl get pods -n fitness-platform-production -o wide
      - name: Apply production overlay with Kustomize
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Applying production overlay with Kustomize..."
          cd configs/k8s/overlays/production
          if kustomize build . | kubectl apply --validate=false -f -; then
            echo "Production overlay applied successfully"
          else
            echo "Failed to apply production overlay"
            exit 1
          fi
      - name: Wait for Postgres to be ready
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Waiting for Postgres pod to be scheduled and running..."
          for i in {1..36}; do
            STATUS=$(kubectl get pod postgres-0 -n fitness-platform-production -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Running" ]; then
              echo "✅ Postgres pod is Running after ${i}x5 seconds"
              break
            fi
            if [ "$i" -eq 36 ]; then
              echo "❌ Timeout waiting for Postgres pod"
              kubectl get pods -n fitness-platform-production -o wide
              kubectl describe pod postgres-0 -n fitness-platform-production || true
              exit 1
            fi
            echo "Attempt $i/36: Postgres status=$STATUS, waiting 5s..."
            sleep 5
          done
          echo "Verifying Postgres accepts connections..."
          for i in {1..30}; do
            if kubectl exec -n fitness-platform-production postgres-0 -- pg_isready -U postgres &>/dev/null; then
              echo "✅ Postgres is ready to accept connections"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Postgres not accepting connections"
              kubectl logs postgres-0 -n fitness-platform-production --tail=50 || true
              exit 1
            fi
            echo "Attempt $i/30: pg_isready failed, waiting 3s..."
            sleep 3
          done

      - name: Run database migrations
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Running database migrations via kubectl exec..."
          
          SQL_FILE="configs/k8s/base/jobs/init-db.sql"
          if [ ! -f "$SQL_FILE" ]; then
            echo "❌ Migration file not found: $SQL_FILE"
            exit 1
          fi
          
          echo "Migration file size: $(wc -c < "$SQL_FILE") bytes"
          echo "Copying SQL file to postgres-0 pod..."
          kubectl cp "$SQL_FILE" fitness-platform-production/postgres-0:/tmp/init-db.sql
          
          echo "Executing migrations inside Postgres pod..."
          if kubectl exec -n fitness-platform-production postgres-0 -- \
              psql -U postgres -d fitness -f /tmp/init-db.sql -v ON_ERROR_STOP=1; then
            echo "✅ Database migrations completed successfully"
          else
            echo "❌ Database migrations failed"
            exit 1
          fi
          
          echo "Verifying tables were created..."
          kubectl exec -n fitness-platform-production postgres-0 -- \
            psql -U postgres -d fitness -c "SELECT table_name FROM information_schema.tables WHERE table_schema='public' ORDER BY table_name;"
          
      - name: Run seed-admin job (create admin user)
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Running seed-admin job..."
          # Удаляем старый job если есть
          kubectl delete job seed-admin-run -n fitness-platform-production --ignore-not-found=true
          
          # Создаём новый job из шаблона
          kubectl get job seed-admin -n fitness-platform-production -o json | \
            jq 'del(.metadata.uid, .metadata.resourceVersion, .metadata.creationTimestamp, .status, .spec.selector, .spec.template.metadata.labels."controller-uid", .spec.template.metadata.labels."batch.kubernetes.io/controller-uid") | .metadata.name="seed-admin-run" | .spec.template.metadata.labels["job-name"]="seed-admin-run"' | \
            kubectl apply --validate=false -f -
          
          echo "Waiting for seed-admin to complete..."
          if kubectl wait --for=condition=complete job/seed-admin-run -n fitness-platform-production --timeout=120s; then
            echo "✅ Admin user seeded successfully"
            kubectl logs job/seed-admin-run -n fitness-platform-production
          else
            echo "❌ seed-admin job failed"
            kubectl logs job/seed-admin-run -n fitness-platform-production || true
            exit 1
          fi
      - name: Cleanup unused images on VPS (Docker + Containerd)
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "-> Pruning unused Docker images and containers..."
          docker system prune -f --volumes || true
          echo "-> Pruning unused k3s (containerd) images..."
          k3s crictl rmi --prune || true
          echo "-> Current disk usage:"
          df -h /
      - name: Debug pod status after deploy
        if: always() && steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Checking pod status..."
          kubectl get pods -n fitness-platform-production -o wide || true
          echo "Events for failing pods (if any):"
          kubectl get pods -n fitness-platform-production --field-selector=status.phase!=Running -o jsonpath='{.items[*].metadata.name}' | xargs -r -n1 kubectl describe pod -n fitness-platform-production 2>/dev/null | grep -A10 "Events:" || echo "No failing pods or no events"
      - name: Bypass DNS staleness after redeploy
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "-> Clearing DNS caches and rolling restarts..."
          kubectl rollout restart deployment -n fitness-platform-production || true
          kubectl rollout status deployment -n fitness-platform-production --timeout=300s || true
          kubectl get pods -n fitness-platform-production -o wide
          sleep 10
      - name: Verify production deployment
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
           echo "Verifying deployment..."
           echo "Waiting for gateway to be ready (up to 300s)..."
           kubectl get pods -n fitness-platform-production
           kubectl wait --for=condition=ready pod -l app=gateway -n fitness-platform-production --timeout=300s || echo "Gateway not ready yet"
           sleep 30

      - name: Canary Health Check & Auto-Rollback
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
           echo "⏳ Monitoring production deployment for 5 minutes..."
           ROLLBACK_TRIGGERED=false

           for i in {1..30}; do
             ERRORS=$(kubectl logs -n fitness-platform-production -l app=gateway --since=2m 2>/dev/null | grep -c '"statusCode":5[0-9][0-9]' || true)

             if [ "$ERRORS" -gt 50 ]; then
               echo " High error rate detected ($ERRORS 5xx errors). Triggering auto-rollback..."
               kubectl rollout undo deployment/gateway -n fitness-platform-production || true
               kubectl rollout undo deployment/gateway-canary -n fitness-platform-production || true
               ROLLBACK_TRIGGERED=true
               break
             fi
             sleep 10
           done

           if [ "$ROLLBACK_TRIGGERED" = true ]; then
             echo " Deployment failed health check. Rollback executed."
             exit 1
           fi

           echo " Production metrics stable. Deployment proceeding."

  # ─────────────────────────────────────────────────────────────
  # 6. E2E TESTS ON PRODUCTION
  # ─────────────────────────────────────────────────────────────
  test-production:
    name: Test Production (E2E)
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: needs.deploy-production.outputs.reachable == 'true'
    env:
      PRODUCTION_URL: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v6
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Prepare target URL
        id: target
        run: |
          URL="https://fittpulse.duckdns.org"
          echo "target=$URL" >> "$GITHUB_OUTPUT"
      - name: Health check
        run: |
          echo "🔍 Checking production health via HTTPS..."
           for _ in {1..42}; do
            RESPONSE=$(curl -skf --max-time 5 "https://fittpulse.duckdns.org/health" 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ]; then
              echo "Health response: $RESPONSE"
              break
            fi
            echo "Attempt $i/42: waiting..."
            sleep 10
          done
          if [ -z "$RESPONSE" ]; then
            echo "❌ Health endpoint unreachable"
            kubectl --kubeconfig="$HOME/.kube/config" get pods -n fitness-platform-production -o wide || true
            kubectl --kubeconfig="$HOME/.kube/config" get svc -n fitness-platform-production || true
            exit 1
          fi
          echo "$RESPONSE" | grep -q '"status":"ok"' || { echo "❌ Status not ok"; echo "$RESPONSE"; exit 1; }
          echo "$RESPONSE" | grep -q '"user":"up"' || { echo "❌ User service not healthy"; exit 1; }
          echo "✅ Production is healthy"
      - name: Run UAT tests
        run: |
          python scripts/api-test.py --base-url "${{ steps.target.outputs.target }}"
      - name: Performance test (k6) — optional
        uses: k6io/action@v0.3.1
        with:
          filename: load-test.k6
        env:
          BASE_URL: ${{ steps.target.outputs.target }}

  # ─────────────────────────────────────────────────────────────
  # 9. NOTIFICATIONS (всегда, в конце)
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, binary_build, docker, deploy-test, deploy-production, test-production]
    if: always() && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      - name: Collect job statuses
        id: statuses
        run: |
          get_emoji() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "❓";; esac; }

          TEST="$(get_emoji '${{ needs.deploy-test.result }}')"
          SEC="$(get_emoji '${{ needs.security-scan.result }}')"
          SECRET="$(get_emoji '${{ needs.secrets-scan.result }}')"
          BUILD="$(get_emoji '${{ needs.binary_build.result }}')"
          DOCKER="$(get_emoji '${{ needs.docker.result }}')"
          PRODUCTION="$(get_emoji '${{ needs.deploy-production.result }}')"
          E2E="$(get_emoji '${{ needs.test-production.result }}')"

          if [[ "$E2E" == "✅" && "$PRODUCTION" == "✅" ]]; then
          OVERALL="УСПЕШНО"; STATUS="success"
          elif [[ "$PRODUCTION" == "❌" ]]; then
            OVERALL="ОШИБКА ДЕПЛОЯ"; STATUS="failure"
          elif [[ "$DOCKER" == "❌" ]]; then
            OVERALL="ОШИБКА СБОРКИ"; STATUS="failure"
          elif [[ "$E2E" == "❌" ]]; then
            OVERALL="ОШИБКА ТЕСТОВ"; STATUS="failure"
          else
            OVERALL="УСПЕШНО"; STATUS="success"
          fi

          {
            echo "overall=$OVERALL"
            echo "status=$STATUS"
            echo "test=$TEST"
            echo "sec=$SEC"
            echo "secret=$SECRET"
            echo "build=$BUILD"
            echo "docker=$DOCKER"
            echo "production=$PRODUCTION"
            echo "e2e=$E2E"
          } >> "$GITHUB_OUTPUT"
      - name: Send to Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>CI/CD — ${{ steps.statuses.outputs.overall }}</b>
            <code>${{ github.repository }}</code> @ <code>${{ github.ref_name }}</code>
            Commit: <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">{{ github.sha }}</a>

            <b>Статусы:</b>
            ${{ steps.statuses.outputs.test }} Test (Compose)
            ${{ steps.statuses.outputs.sec }} Security
            ${{ steps.statuses.outputs.secret }} Secrets
            ${{ steps.statuses.outputs.build }} Build
            ${{ steps.statuses.outputs.docker }} Docker
            ${{ steps.statuses.outputs.production }} Deploy Production
            ${{ steps.statuses.outputs.e2e }} E2E Tests

            🌐 <b>Сайт:</b> https://fittpulse.duckdns.org

            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Открыть запуск</a>

  dependabot-auto-merge:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto-approve minor/patch updates
        if: contains(github.event.pull_request.title, 'minor') || contains(github.event.pull_request.title, 'patch')
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}