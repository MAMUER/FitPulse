name: CI/CD Pipeline

on:
  push:
    branches: [main, master, Microservice_arc]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/dependabot.yml'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'configs/**'
      - 'scripts/**'
      - 'models/**'
      - 'deployments/**'
      - '.dockerignore'
      - 'db/migrations/**'
  pull_request:
    branches: [main, master, Microservice_arc]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/dependabot.yml'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'configs/**'
      - 'scripts/**'
      - 'models/**'
      - 'deployments/**'
      - '.dockerignore'
      - 'db/migrations/**'
  schedule:
    - cron: '0 0 * * 1'
    - cron: '0 9 1 * *'
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select execution mode"
        required: false
        type: choice
        options: [full, maintenance]
      maintenance_type:
        description: "For maintenance mode: update|audit|vulncheck"
        required: false
        type: choice
        options: [update, audit, vulncheck]
        default: "update"

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

env:
  GO_VERSION: "1.26.4"
  REGISTRY: ghcr.io
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. ВАЛИДАЦИЯ И ПРОВЕРКИ (запускаются всегда, параллельно)
  # ─────────────────────────────────────────────────────────────

  validate-workflow:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate workflow syntax
        uses: rhysd/actionlint@v1.7.12

  dockerfile-lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Hadolint on all Dockerfiles
        run: |
          find cmd -maxdepth 2 -type f -name Dockerfile -print0 | sort -z | while IFS= read -r -d '' dockerfile; do
            echo "Linting $dockerfile"
            docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" -w /workspace hadolint/hadolint hadolint -c .hadolint.yaml "$dockerfile"
          done

  # ─────────────────────────────────────────────────────────────
  # 1.1. MONTHLY DEPENDENCY UPDATE (schedule)
  # ─────────────────────────────────────────────────────────────

  monthly-dependency-update:
    name: Monthly Dependency Update
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule == '0 9 1 * *' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: monthly dependency update"
          branch: "security/maintenance/monthly-update"
          title: "chore: monthly dependency update"
          body: |
            This PR updates all Go dependencies to their latest versions.
            Scheduled run on the 1st of each month.

  # ─────────────────────────────────────────────────────────────
  # 1.2. QUARTERLY VULNCHECK (schedule)
  # ─────────────────────────────────────────────────────────────

  quarterly-vulncheck:
    name: Quarterly Vulnerability Check
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule == '0 9 1 1,4,7,10 *' }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./... -show verbose

  # ─────────────────────────────────────────────────────────────
  # 1.3. OSV DEPENDENCY AUDIT (при push go.mod/go.sum или manual)
  # ─────────────────────────────────────────────────────────────

  osv-audit:
    name: OSV Dependency Audit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' 
      && inputs.run_mode == 'maintenance' 
      && inputs.maintenance_type == 'audit'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install osv-scanner
        run: GOBIN="$HOME/go/bin" go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      - name: Run osv-scanner
        run: |
          # shellcheck disable=SC2086
          $HOME/go/bin/osv-scanner -r ./...

  # ─────────────────────────────────────────────────────────────
  # 2. СБОРКА (только при обычных триггерах, не Maintenance)
  # ─────────────────────────────────────────────────────────────

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gosec SAST scanner
        run: |
          mkdir -p sarif-results
          gosec -exclude-generated -fmt=sarif -out=sarif-results/gosec.sarif ./... 2>&1 || true
          if [ ! -s sarif-results/gosec.sarif ]; then
            echo "{\"\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json\",\"version\":\"2.1.0\",\"runs\":[{\"tool\":{\"driver\":{\"name\":\"gosec\"}},\"results\":[]}]}" > sarif-results/gosec.sarif
          fi
      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: sarif-results/gosec.sarif
          category: gosec
      - name: Run govulncheck
        run: govulncheck ./... 2>&1 | tee vulncheck-results.txt
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          skip-dirs: 'configs/k8s/overlays/staging'

      - name: Run Trivy filesystem scan
        id: trivy-fs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'sarif-results/trivy-fs.sarif'
          exit-code: '0'
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results/trivy-fs.sarif
          category: trivy-fs

  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch .env &>/dev/null; then
            echo "CRITICAL: .env file is tracked in Git!"; exit 1
          fi
          echo ".env is not tracked"
      - name: TruffleHog scan
        id: trufflehog_scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - name: Alert on secrets found
        if: steps.trufflehog_scan.outcome == 'failure'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TG_CHAT_ID}\", \"text\": \"<b>Secrets detected!</b>\nRepo: ${{ github.repository }}\nRun: <a href='${RUN_URL}'>Details</a>\", \"parse_mode\": \"HTML\"}"

  check:
    name: Make Check (Lint + Test)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run make check
        run: make check
        env:
          DOCKER_HOST: ""

  # ─────────────────────────────────────────────────────────────
  # 2. СБОРКА (после успешных проверок)
  # ─────────────────────────────────────────────────────────────

  binary_build:
    name: Build Binaries
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [security-scan, secrets-scan, check, dockerfile-lint]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Go services (parallel)
        run: |
          mkdir -p bin
          GOMAXPROCS=$(nproc)
          export GOMAXPROCS
          for svc in user-service biometric-service training-service gateway device-connector device-emulator; do
            go build -ldflags="-s -w" -o "bin/$svc" ./cmd/"$svc" &
          done
          wait
      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/
          retention-days: 1

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [binary_build]
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance'
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push Go services
        run: |
          services="user-service biometric-service training-service gateway device-connector device-emulator"
          for svc in $services; do
            echo "Building $svc..."
            docker buildx build \
              --build-arg GOPROXY=https://proxy.golang.org,direct \
              --cache-from=type=gha \
              --cache-to=type=gha,mode=max \
              -t "${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/$svc:latest" \
              -f "cmd/$svc/Dockerfile" . \
              --push
          done
      - name: Build and push ML images (if models exist)
        run: |
          if [ -f "models/scaler.pkl" ] && { [ -f "models/classifier.keras" ] || ls models/classifier_*.keras >/dev/null 2>&1; }; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest" \
              -f cmd/ml-classifier/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest"
          fi
          if [ -f "models/generator.h5" ] || [ -f "models/generator.keras" ]; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest" \
              -f cmd/ml-generator/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest"
          fi
      - name: Scan gateway image with Trivy
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/mamuer/project/gateway:${{ steps.sha.outputs.short_sha }}'
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          scanners: vuln
      - name: Upload Trivy image results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker

  # ─────────────────────────────────────────────────────────────
  # 3. ТЕСТОВОЕ ОКРУЖЕНИЕ (Docker Compose на runner)
  # ─────────────────────────────────────────────────────────────

  deploy-test:
    name: Deploy to Test (Docker Compose)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance' }}
    needs: [binary_build, provision-k8s-vps]
    steps:
      - uses: actions/checkout@v6
      - name: Start test environment
        run: docker compose -f docker-compose.test.yml up -d
      - name: Wait for services
        run: |
          docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 180 || true
          docker compose -f docker-compose.test.yml ps
      - name: Smoke tests
        run: |
          set -euo pipefail
          GATEWAY_URL="http://localhost:8081"
          for _ in {1..36}; do
            RESPONSE=$(curl -s --max-time 3 "$GATEWAY_URL/health" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              break
            fi
            sleep 5
          done
          RESPONSE=$(curl -s --max-time 5 "$GATEWAY_URL/health")
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || {
            echo "Health check failed or degraded"
            docker compose -f docker-compose.test.yml logs --tail=150 user-service-test || true
            docker compose -f docker-compose.test.yml logs --tail=150 gateway-test || true
            exit 1
          }
          echo "$RESPONSE" | grep -q '"user":"up"' || {
            echo "User service not healthy"
            docker compose -f docker-compose.test.yml logs --tail=150 user-service-test || true
            exit 1
          }
          TIMESTAMP=$(date +%s)
          REGISTER_RESPONSE=$(curl -s -w "%{http_code}" -X POST "$GATEWAY_URL/api/v1/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke'"$TIMESTAMP"'@test.com","password":"Test123!","full_name":"Smoke","role":"client"}')
          HTTP_CODE="${REGISTER_RESPONSE: -3}"
          [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]] || exit 1
          echo "Smoke tests passed"

  # 4. K8S INFRASTRUCTURE: Provision k3s on VPS
  # ─────────────────────────────────────────────────────────────

  provision-k8s-vps:
    name: Provision k3s Cluster on VPS (Step-by-Step, Safe)
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance'
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    outputs:
      kubeconfig_available: ${{ steps.kubeconfig.outputs.available }}
    steps:
      - uses: actions/checkout@v6

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Make retry script executable
        run: chmod +x scripts/ssh-retry.sh

      - name: Clean up old k3s (safe)
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -x
            echo "-> Stopping k3s..."
            systemctl stop k3s 2>/dev/null || true
            pkill -9 -f "k3s server" 2>/dev/null || true
            echo "-> Removing k3s files..."
            rm -rf /var/lib/rancher/k3s /etc/rancher/k3s
            rm -f /usr/local/bin/k3s /etc/systemd/system/k3s.service /etc/systemd/system/k3s*.timer
            systemctl daemon-reload
            echo "Cleanup done"
          '
      - name: Prepare k3s config on VPS
        run: |
          VPS_HOST="${{ secrets.VPS_HOST }}"
          printf 'bind-address: 0.0.0.0\ntls-san:\n  - %s\ndisable:\n  - metrics-server\nflannel-backend: wireguard-native\nkubelet-arg:\n  - "cloud-provider=external"\nwrite-kubeconfig-mode: 644\ndocker: true\n' "$VPS_HOST" > /tmp/k3s-config-remote.yaml
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            mkdir -p /etc/rancher/k3s
            echo "Directory /etc/rancher/k3s created"
          '
          ./scripts/ssh-retry.sh scp /tmp/k3s-config-remote.yaml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/config.yaml"
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "Config written:"
            cat /etc/rancher/k3s/config.yaml
          '
      - name: Install k3s with Docker runtime
        env:
          SSH_RETRY_TIMEOUT: 600
          SSH_RETRY_MAX_ATTEMPTS: 5
          SSH_RETRY_DELAY_SECONDS: 15
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "-> Installing k3s..."
            curl --retry 5 --retry-delay 5 --connect-timeout 20 --max-time 600 -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--docker" sh -s - server --write-kubeconfig-mode 644
            echo "k3s installed"
          '

      - name: Start and verify k3s
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "-> Starting k3s..."
            systemctl daemon-reload
            systemctl enable --now k3s

            echo "-> Waiting for readiness..."
            for i in $(seq 1 120); do
              if k3s kubectl cluster-info &> /dev/null; then
                echo "k3s ready after ${i}s"
                break
              fi
              [ $i -eq 120 ] && { echo "Timeout"; journalctl -u k3s -n 20 --no-pager; exit 1; }
              sleep 2
            done

            echo "=== Cluster status ==="
            k3s kubectl get nodes -o wide
            k3s kubectl get pods -A
            echo "=== Docker check ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | head -5 || true
          '
      - name: Download and fix kubeconfig
        id: kubeconfig
        run: |
          ./scripts/ssh-retry.sh scp \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/k3s.yaml" \
            ./k3s-config.yaml

          sed -i "s|127.0.0.1|${{ secrets.VPS_HOST }}|g; s|localhost|${{ secrets.VPS_HOST }}|g; s|0.0.0.0|${{ secrets.VPS_HOST }}|g" ./k3s-config.yaml

          echo "=== Fixed kubeconfig ==="
          grep "server:" ./k3s-config.yaml

          if grep -q "server: https://${{ secrets.VPS_HOST }}:6443" ./k3s-config.yaml; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

          if timeout 10 bash -c "</dev/tcp/${{ secrets.VPS_HOST }}/6443" 2>/dev/null; then
            echo "cluster_connectivity=true" >> "$GITHUB_OUTPUT"
          else
            echo "cluster_connectivity=false" >> "$GITHUB_OUTPUT"
            echo "K8s API not reachable from runner"
          fi

      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v7
        with:
          name: kubeconfig
          path: ./k3s-config.yaml
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # 5. STAGING DEPLOY (K8s namespace: fitness-platform-staging)
  # ─────────────────────────────────────────────────────────────

  deploy-staging:
    name: Deploy to K8s Staging
    runs-on: ubuntu-latest
    needs: [docker, provision-k8s-vps]
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance'
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    outputs:
      reachable: ${{ steps.connectivity.outputs.reachable }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig

      - name: Configure kubectl
        id: kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl config set-context --current --namespace=fitness-platform-staging

      - name: Check cluster connectivity
        id: connectivity
        run: |
          echo "Testing connectivity to ${{ secrets.VPS_HOST }}:6443..."
          if timeout 10 bash -c "</dev/tcp/${{ secrets.VPS_HOST }}/6443" 2>/dev/null; then
            echo "Cluster reachable"
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "Cluster NOT reachable (timeout 10s)"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create image pull secret for GHCR
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Creating imagePullSecret for ghcr.io..."
          kubectl create namespace fitness-platform-staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            -n fitness-platform-staging \
            --dry-run=client -o yaml | kubectl apply -f -
    
          echo "imagePullSecret created/updated"

      - name: Ensure service account exists
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Checking service account app-service-account..."
          kubectl create serviceaccount app-service-account \
            -n fitness-platform-staging \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create clusterrolebinding app-service-account-binding \
            --clusterrole=edit \
            --serviceaccount=fitness-platform-staging:app-service-account \
            --dry-run=client -o yaml | kubectl apply -f - || true
          echo "ServiceAccount ready"

      - name: Create staging secrets
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Creating app-secrets..."
          kubectl create secret generic app-secrets -n fitness-platform-staging \
            --from-literal=POSTGRES_USER=postgres \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=fitness \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=RABBITMQ_USER=${{ secrets.RABBITMQ_USER }} \
            --from-literal=RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "app-secrets created"

      - name: Update image tags to SHA
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
           SHA=$(git rev-parse --short HEAD)
           echo "Updating image tags to :$SHA"
           cd configs/k8s/overlays/staging
           for svc in user-service biometric-service training-service gateway ml-classifier ml-generator; do
             kustomize edit set image "ghcr.io/mamuer/project/$svc=ghcr.io/mamuer/project/$svc:$SHA"
           done

      - name: Cleanup old and failed pods before deploy
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
           echo "-> Cleaning up failed, evicted, and succeeded pods..."
           kubectl delete pods -n fitness-platform-staging \
             --field-selector=status.phase=Failed,status.phase=Succeeded,status.phase=Unknown \
             --ignore-not-found=true || true

           echo "-> Cleaning up old ReplicaSets..."
           kubectl get rs -n fitness-platform-staging -o json | \
             jq -r '.items[] | select(.status.replicas == 0) | .metadata.name' | \
             xargs -r -n1 kubectl delete rs -n fitness-platform-staging || true

           echo "-> Cleanup complete"
           kubectl get pods -n fitness-platform-staging -o wide

      - name: Apply staging overlay with Kustomize
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
           echo "Applying staging overlay with Kustomize..."
           cd configs/k8s/overlays/staging
           
           if kustomize build . | kubectl apply --validate=false -f -; then
             echo "Staging overlay applied successfully"
           else
             echo "Failed to apply staging overlay"
             exit 1
           fi

      - name: Cleanup unused Docker images on VPS
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
           echo "-> Pruning unused Docker images and containers..."
           docker system prune -f --volumes || true
           echo "-> Current disk usage:"
           df -h /

      - name: Debug pod status after deploy
        if: always() && steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Checking pod status..."
          kubectl get pods -n fitness-platform-staging -o wide || true
          echo "Events for failing pods (if any):"
          kubectl get pods -n fitness-platform-staging --field-selector=status.phase!=Running -o jsonpath='{.items[*].metadata.name}' | xargs -r -n1 kubectl describe pod -n fitness-platform-staging 2>/dev/null | grep -A10 "Events:" || echo "No failing pods or no events"

      - name: Bypass DNS staleness after redeploy
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "-> Clearing DNS caches and rolling restarts..."
          kubectl rollout restart deployment -n fitness-platform-staging || true
          kubectl rollout status deployment -n fitness-platform-staging --timeout=180s || true
          kubectl get pods -n fitness-platform-staging -o wide
          sleep 10

      - name: Verify staging deployment
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Verifying deployment..."
          echo "Waiting for gateway to be ready (up to 300s)..."
          kubectl get pods -n fitness-platform-staging
          kubectl wait --for=condition=ready pod -l app=gateway -n fitness-platform-staging --timeout=300s || echo "Gateway not ready yet"
          sleep 30

  # ─────────────────────────────────────────────────────────────
  # 6. E2E TESTS ON STAGING
  # ─────────────────────────────────────────────────────────────

  test-staging:
    name: Test Staging (E2E)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: needs.deploy-staging.outputs.reachable == 'true'
    env:
      STAGING_URL: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v6
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Prepare target URL
        id: target
        run: |
          URL="${{ secrets.VPS_HOST }}"
          [[ "$URL" == http* ]] || URL="http://$URL"
          echo "target=$URL" >> "$GITHUB_OUTPUT"
      - name: Health check
        run: |
          echo "🔍 Checking staging health via NodePort..."
          NODE_PORT=30080
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 5 "http://${{ secrets.VPS_HOST }}:${NODE_PORT}/health" 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ]; then
              echo "Health response: $RESPONSE"
              break
            fi
            echo "Attempt $i/36: waiting..."
            sleep 5
          done
          if [ -z "$RESPONSE" ]; then
            echo "❌ Health endpoint unreachable"
            kubectl --kubeconfig="$HOME/.kube/config" get pods -n fitness-platform-staging -o wide || true
            kubectl --kubeconfig="$HOME/.kube/config" get svc -n fitness-platform-staging || true
            exit 1
          fi
          echo "$RESPONSE" | grep -q '"status":"ok"' || { echo "❌ Status not ok"; echo "$RESPONSE"; exit 1; }
          echo "$RESPONSE" | grep -q '"user":"up"' || { echo "❌ User service not healthy"; exit 1; }
          echo "✅ Staging is healthy"
      - name: Run UAT tests
        run: |
          python scripts/api-test.py --base-url "${{ steps.target.outputs.target }}"
      - name: Performance test (k6) — optional
        uses: k6io/action@v0.3.1
        with:
          filename: load-test.k6
        env:
          BASE_URL: ${{ steps.target.outputs.target }}

  # ─────────────────────────────────────────────────────────────
  # 7. PRODUCTION DEPLOY (только после успешных тестов)
  # ─────────────────────────────────────────────────────────────

  deploy-production:
    name: Deploy to K8s Production
    runs-on: ubuntu-latest
    needs: [test-staging]
    if: >-
      needs.test-staging.result == 'success'
      && github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance'
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Configure kubectl
        id: kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          if ! kubectl cluster-info &> /dev/null; then
            echo "Cannot connect to cluster"; exit 1
          fi
          kubectl config set-context --current --namespace=fitness-platform-production
      - name: Verify staging is fully healthy
        run: |
          for i in {1..30}; do
            RESPONSE=$(curl -sf http://2.27.32.242/health || echo "")
            if echo "$RESPONSE" | grep -q '"status":"ok"' && \
               echo "$RESPONSE" | grep -q '"user":"up"' && \
               echo "$RESPONSE" | grep -q '"biometric":"up"' && \
               echo "$RESPONSE" | grep -q '"training":"up"'; then
              echo "✅ All services are healthy"
              exit 0
            fi
            echo "⏳ Waiting for all services... ($i/30)"
            sleep 10
          done
          echo "❌ Timeout waiting for healthy staging"
          exit 1
      - name: Create production secrets
        run: |
          kubectl create namespace fitness-platform-production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secrets -n fitness-platform-production \
            --from-literal=POSTGRES_USER=${{ vars.POSTGRES_USER || 'fitness_admin' }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=${{ vars.POSTGRES_DB || 'fitness' }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=RABBITMQ_USER=${{ secrets.RABBITMQ_USER }} \
            --from-literal=RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy production with Kustomize
        run: |
          echo "Applying production overlay with Kustomize..."
          cd configs/k8s/overlays/production
          kustomize build . | kubectl apply --validate=false -f -
      - name: Verify production deployment
        run: |
          kubectl get pods -n fitness-platform-production
          kubectl wait --for=condition=ready pod -l app=gateway -n fitness-platform-production --timeout=120s || echo "Gateway not ready yet"

  # ─────────────────────────────────────────────────────────────
  # 8. RELEASE CANDIDATE CHECKS (после всех деплоев)
  # ─────────────────────────────────────────────────────────────

  release-candidate:
    name: Release Candidate Checks
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.run_mode != 'maintenance'
      && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Final code quality checks
        run: |
          go vet ./...
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          GO_BIN="$(go env GOPATH)"
          PATH="${GO_BIN}/bin:${PATH}"
          export PATH
          golangci-lint run --timeout=5m
          FILES="$(gofmt -l ./cmd ./internal ./pkg 2>/dev/null | grep -v "cmd/tools/tools.go" || true)"
          [ -z "$FILES" ] || { echo "Unformatted files: $FILES"; exit 1; }
      - name: Run short tests
        run: go test -v -short -parallel 2 ./...

  # ─────────────────────────────────────────────────────────────
  # 9. NOTIFICATIONS (всегда, в конце)
  # ─────────────────────────────────────────────────────────────

  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, binary_build, docker, deploy-test, deploy-staging, test-staging, deploy-production]
    if: always() && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      - name: Collect job statuses
        id: statuses
        run: |
          get_emoji() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "❓";; esac; }

          TEST="$(get_emoji '${{ needs.deploy-test.result }}')"
          SEC="$(get_emoji '${{ needs.security-scan.result }}')"
          SECRET="$(get_emoji '${{ needs.secrets-scan.result }}')"
          BUILD="$(get_emoji '${{ needs.binary_build.result }}')"
          DOCKER="$(get_emoji '${{ needs.docker.result }}')"
          STAGING="$(get_emoji '${{ needs.deploy-staging.result }}')"
          E2E="$(get_emoji '${{ needs.test-staging.result }}')"
          PROD="$(get_emoji '${{ needs.deploy-production.result }}')"

          if [[ "$PROD" == "✅" ]]; then
            OVERALL="УСПЕШНО"; STATUS="success"
          elif [[ "$PROD" == "❌" || "$STAGING" == "❌" ]]; then
            OVERALL="ОШИБКА ДЕПЛОЯ"; STATUS="failure"
          elif [[ "$DOCKER" == "❌" ]]; then
            OVERALL="ОШИБКА СБОРКИ"; STATUS="failure"
          elif [[ "$E2E" == "❌" ]]; then
            OVERALL="ОШИБКА ТЕСТОВ"; STATUS="failure"
          else
            OVERALL="УСПЕШНО"; STATUS="success"
          fi

          {
            echo "overall=$OVERALL"
            echo "status=$STATUS"
            echo "test=$TEST"
            echo "sec=$SEC"
            echo "secret=$SECRET"
            echo "build=$BUILD"
            echo "docker=$DOCKER"
            echo "staging=$STAGING"
            echo "e2e=$E2E"
            echo "prod=$PROD"
          } >> "$GITHUB_OUTPUT"
      - name: Send to Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>CI/CD — ${{ steps.statuses.outputs.overall }}</b>
            <code>${{ github.repository }}</code> @ <code>${{ github.ref_name }}</code>
            Commit: <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">{{ github.sha }}</a>

            <b>Статусы:</b>
            ${{ steps.statuses.outputs.test }} Test (Compose)
            ${{ steps.statuses.outputs.sec }} Security
            ${{ steps.statuses.outputs.secret }} Secrets
            ${{ steps.statuses.outputs.build }} Build
            ${{ steps.statuses.outputs.docker }} Docker
            ${{ steps.statuses.outputs.staging }} Deploy Staging
            ${{ steps.statuses.outputs.e2e }} E2E Tests
            ${{ steps.statuses.outputs.prod }} Deploy Production

            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Открыть запуск</a>

  dependabot-auto-merge:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
       - name: Enable auto-merge for Dependabot PRs
         run: gh pr merge --auto --squash "$PR_URL"
         env:
           PR_URL: ${{ github.event.pull_request.html_url }}
           GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
       
       - name: Auto-approve minor/patch updates
         if: contains(github.event.pull_request.title, 'minor') || contains(github.event.pull_request.title, 'patch')
         run: gh pr review --approve "$PR_URL"
         env:
           PR_URL: ${{ github.event.pull_request.html_url }}
           GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
