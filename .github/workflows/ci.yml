name: CI/CD Pipeline
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/dependabot.yml"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "configs/**"
      - "scripts/**"
      - "models/**"
      - "deployments/**"
      - ".dockerignore"
      - "db/migrations/**"
      - "datasets/**"
      - "*.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/dependabot.yml"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "configs/**"
      - "scripts/**"
      - "models/**"
      - "deployments/**"
      - ".dockerignore"
      - "db/migrations/**"
      - "datasets/**"
      - "*.py"
  schedule:
    - cron: "0 0 * * 1" # Weekly Monday midnight
    - cron: "0 9 1 * *" # Monthly dependency update
    - cron: "0 9 1 1,4,7,10 *" # Quarterly vulncheck
    - cron: "34 9 * * 3" # CodeQL weekly
    - cron: "16 11 * * 3" # OSV weekly
    - cron: "25 13 * * 1" # Semgrep weekly
    - cron: "0 0 * * 0" # Fuzz tests weekly
    - cron: "0 2 * * 1" # ML retrain weekly Monday 2AM
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select execution mode"
        required: false
        type: choice
        options: [full, maintenance, ml-retrain, recreate-cluster]
      maintenance_type:
        description: "For maintenance mode: update|audit|vulncheck"
        required: false
        type: choice
        options: [update, audit, vulncheck]
        default: "update"
      force_retrain:
        description: "Force ML retrain even if no data changes"
        required: false
        type: boolean
        default: false
  release:
    types: [created]
  issues:
    types: [opened, labeled, unlabeled]

permissions:
  contents: read
  packages: write
  actions: read
  security-events: write
  pull-requests: write
  issues: write

env:
  GO_VERSION: "1.26.4"
  REGISTRY: ghcr.io
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  # ============================================================================
  # DETECT CHANGES
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'release' && github.event_name != 'issues'
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      user: ${{ steps.filter.outputs.user }}
      biometric: ${{ steps.filter.outputs.biometric }}
      training: ${{ steps.filter.outputs.training }}
      device: ${{ steps.filter.outputs.device }}
      ml: ${{ steps.filter.outputs.ml }}
      k8s: ${{ steps.filter.outputs.k8s }}
      workflow: ${{ steps.filter.outputs.workflow }}
      db: ${{ steps.filter.outputs.db }}
      infra: ${{ steps.filter.outputs.infra }}
      any_code: ${{ steps.filter.outputs.any_code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'cmd/gateway/**'
              - 'internal/gateway/**'
              - 'api/proto/gateway/**'
            user:
              - 'cmd/user-service/**'
              - 'internal/user/**'
            biometric:
              - 'cmd/biometric-service/**'
              - 'internal/biometric/**'
            training:
              - 'cmd/training-service/**'
              - 'internal/training/**'
            device:
              - 'cmd/device-connector/**'
              - 'internal/device/**'
            classifier:
              - 'cmd/classifier/**'
              - 'cmd/ml_generator/**'
              - 'models/**'
              - 'datasets/**'
            k8s:
              - 'configs/k8s/**'
            workflow:
              - '.github/workflows/**'
            db:
              - 'db/migrations/**'
              - 'configs/k8s/base/jobs/**'
            infra:
              - 'scripts/**'
              - 'deploy/**'
              - 'Makefile'
            any_code:
              - 'cmd/**'
              - 'internal/**'
              - 'pkg/**'
              - 'api/**'
              - 'go.mod'
              - 'go.sum'
              - '*.py'

  # ============================================================================
  # ISSUE AUTOMATION
  # ============================================================================
  issue-automation:
    name: Issue Automation
    runs-on: ubuntu-latest
    steps:
      - name: Add triage label
        if: github.event.action == 'opened'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            });
      - name: Add component labels
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              console.log('No issue payload, skipping component labels');
              return;
            }
            const body = issue.body || '';
            const labels = [];
            if (body.toLowerCase().includes('fitbit') || body.includes('withings')) {
              labels.push('device-integration');
            }
            if (body.toLowerCase().includes('oauth') || body.includes('auth')) {
              labels.push('authentication');
            }
            if (body.toLowerCase().includes('webhook')) {
              labels.push('webhook');
            }
            if (body.toLowerCase().includes('smtp') || body.includes('email')) {
              labels.push('email-service');
            }
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
      - name: Assign based on component
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              console.log('No issue payload, skipping assignment');
              return;
            }
            const body = issue.body || '';
            const title = issue.title.toLowerCase();
            const assignments = {
              'gateway': ['@MAMUER'],
              'user service': ['@MAMUER'],
              'biometric': ['@MAMUER'],
              'training': ['@MAMUER'],
              'device': ['@MAMUER'],
              'ml ': ['@MAMUER'],
              'frontend': ['@MAMUER'],
              'k8s': ['@MAMUER'],
              'docker': ['@MAMUER'],
              'ci/cd': ['@MAMUER'],
            };
            for (const [keyword, assignees] of Object.entries(assignments)) {
              if (body.toLowerCase().includes(keyword) || title.includes(keyword)) {
                for (const assignee of assignees) {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    assignees: [assignee.replace('@', '')]
                  });
                }
                break;
              }
            }
      - name: Welcome new contributors
        if: github.event.action == 'opened'
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              console.log('No issue payload, skipping welcome comment');
              return;
            }
            const author = issue.user.login;
            const isFirst = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              per_page: 1
            }).then(res => res.data.length === 1);
            if (isFirst) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `👋 Привет, @${author}! Спасибо за первое сообщение об ошибке/идею.\nМы проверим ваш репорт в ближайшее время. Если у вас есть дополнительные детали — добавляйте в комментарии.`
              });
            }
      - name: Security issue handling
        uses: actions/github-script@v9
        with:
          script: |
            console.log('Security issue detected:', context.issue.number);
      - name: Notify Telegram on critical
        if: github.event_name == 'issues' && github.event.action == 'opened'
        env:
          ISSUE_TITLE: "${{ github.event.issue.title }}"
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"🔴 Critical issue: #${{ github.event.issue.number }}\n$ISSUE_TITLE\n${{ github.event.issue.html_url }}\"}"

  # ============================================================================
  # VALIDATE WORKFLOW
  # ============================================================================
  validate-workflow:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate workflow syntax
        uses: rhysd/actionlint@v1.7.12

  # ============================================================================
  # DOCKERFILE LINT
  # ============================================================================
  dockerfile-lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Hadolint on all Dockerfiles
        run: |
          find cmd -maxdepth 2 -type f -name Dockerfile -print0 | sort -z | while IFS= read -r -d '' dockerfile; do
            echo "Linting $dockerfile"
            docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" -w /workspace hadolint/hadolint hadolint -c .hadolint.yaml "$dockerfile"
          done

  # ============================================================================
  # SUPER LINTER
  # ============================================================================
  super-linter:
    name: Super Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    needs: [validate-workflow]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Lint Code Base
        uses: super-linter/super-linter@v8
        env:
          PYTHON_BLACK_VERSION: "26.5.1"
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMIT_STATUS_ENABLED: false
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: false
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true
          SAVE_SUPER_LINTER_SUMMARY: true
          FILTER_REGEX_EXCLUDE: '(\.github/workflows/.*|.*\.ya?ml$|vendor/.*|bin/.*)'
          VALIDATE_PYTHON_BLACK: true
          VALIDATE_PYTHON_FLAKE8: true
          VALIDATE_PYTHON_ISORT: true
          VALIDATE_PYTHON_MYPY: true
          VALIDATE_YAML: true
          VALIDATE_BASH: true
          VALIDATE_BASH_EXEC: true
          VALIDATE_SHELL_SHFMT: true
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          PYTHON_FLAKE8_CONFIG_FILE: .flake8
          PYTHON_BLACK_CONFIG_FILE: pyproject.toml
          PYTHON_ISORT_CONFIG_FILE: pyproject.toml
          PYTHON_MYPY_CONFIG_FILE: pyproject.toml
          PYTHON_MYPY_ARGS: "--namespace-packages --explicit-package-bases --exclude cmd/ml_generator/"

  # ============================================================================
  # CODEQL ANALYSIS
  # ============================================================================
  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    needs: [validate-workflow]
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: python
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql-config.yml
          queries: security-extended,security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
          output: sarif-results
          upload: failure-only
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          category: codeql-${{ matrix.language }}
          wait-for-processing: true
      - name: Cache CodeQL databases
        uses: actions/cache@v6
        with:
          path: ~/.codeql
          key: ${{ runner.os }}-codeql-${{ matrix.language }}-${{ hashFiles('**/*.go', '**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-codeql-${{ matrix.language }}-
            ${{ runner.os }}-codeql-

  # ============================================================================
  # DEPENDENCY REVIEW
  # ============================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: always
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}

  # ============================================================================
  # KUBESCAPE
  # ============================================================================
  kubescape:
    name: Kubescape K8s Scan
    runs-on: ubuntu-latest
    needs: [validate-workflow]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install Kubescape
        run: |
          echo "Installing Kubescape via official installer..."
          curl -sL https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | sudo bash -s -- --binary-folder /usr/local/bin
          echo "Verifying installation..."
          kubescape version
      - name: Run Kubescape scan
        run: |
          kubescape scan configs/k8s/base/ \
            --format sarif \
            --output kubescape-results.sarif \
            --verbose || true
          if [ -f kubescape-results.sarif ] && command -v jq &> /dev/null; then
            jq '.runs |= map(
              .results |= map(
                select(
                  .locations != null and
                  (.locations | length) > 0 and
                  .locations[0].physicalLocation != null and
                  .locations[0].physicalLocation.artifactLocation != null and
                  .locations[0].physicalLocation.artifactLocation.uri != null and
                  .locations[0].physicalLocation.artifactLocation.uri != "" and
                  (.ruleId // "") != "C-0012" and
                  (.ruleId // "") != "C-0013" and
                  (.ruleId // "") != "C-0017" and
                  (.ruleId // "") != "C-0055" and
                  (.ruleId // "") != "C-0034" and
                  (.ruleId // "") != "C-0045" and
                  (.ruleId // "") != "C-0048" and
                  (.ruleId // "") != "C-0056" and
                  (.ruleId // "") != "C-0018" and
                  (.ruleId // "") != "C-0016"
                )
              )
            )' kubescape-results.sarif > kubescape-results-fixed.sarif
            mv kubescape-results-fixed.sarif kubescape-results.sarif
          fi
      - name: Upload Kubescape results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('kubescape-results.sarif') != ''
        with:
          sarif_file: kubescape-results.sarif
          category: kubescape

  # ============================================================================
  # OSV SCANNER
  # ============================================================================
  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    needs: [validate-workflow]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Run OSV Scanner (Go dependencies)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            -r
            ./
      - name: Run OSV Scanner (Python requirements)
        continue-on-error: true
        run: |
          echo "Scanning Python requirements..."
          find . -name "requirements.txt" -not -path "./.git/*" -print0 | while IFS= read -r -d '' req_file; do
            echo "=== Scanning $req_file ==="
            docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo \
              ghcr.io/google/osv-scanner:v2.3.8 \
              scan "$req_file" || echo "⚠️ Could not fully resolve $req_file (no lock file)"
          done
          echo "✅ Python requirements scan completed (some packages may not be fully resolved)"

  # ============================================================================
  # FUZZ TESTS
  # ============================================================================
  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: [validate-workflow]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Run fuzz tests
        run: |
          go test -fuzz=FuzzString -fuzztime=60s ./internal/sanitize/

  # ============================================================================
  # MONTHLY DEPENDENCY UPDATE
  # ============================================================================
  monthly-dependency-update:
    name: Monthly Dependency Update
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule == '0 9 1 * *' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: monthly dependency update"
          branch: "security/maintenance/monthly-update"
          title: "chore: monthly dependency update"
          body: |
            This PR updates all Go dependencies to their latest versions.
            Scheduled run on the 1st of each month.

  # ============================================================================
  # QUARTERLY VULNCHECK
  # ============================================================================
  quarterly-vulncheck:
    name: Quarterly Vulnerability Check
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule == '0 9 1 1,4,7,10 *' }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - name: Run govulncheck
        run: govulncheck ./... -show verbose

  # ============================================================================
  # OSV AUDIT (manual)
  # ============================================================================
  osv-audit:
    name: OSV Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install osv-scanner
        run: |
          GOBIN="$HOME/go/bin" go install github.com/google/osv-scanner/cmd/osv-scanner@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Run osv-scanner
        run: |
          osv-scanner scan . 2>&1 || true

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gosec SAST scanner
        run: |
          mkdir -p sarif-results
          gosec -exclude=G710 -exclude=G703 -exclude=G304 -exclude=G101 -exclude-generated -fmt=sarif -out=sarif-results/gosec.sarif ./... 2>&1 || true
          if [ ! -s sarif-results/gosec.sarif ]; then
            echo "{\"\\$schema\":\"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json\",\"version\":\"2.1.0\",\"runs\":[{\"tool\":{\"driver\":{\"name\":\"gosec\"}},\"results\":[]}]}" > sarif-results/gosec.sarif
          fi
      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: sarif-results/gosec.sarif
          category: gosec
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run govulncheck
        run: govulncheck ./... 2>&1 | tee vulncheck-results.txt
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          skip-dirs: "configs/k8s/overlays/production"
      - name: Run Trivy filesystem scan
        id: trivy-fs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scanners: "vuln"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "sarif-results/trivy-fs.sarif"
          exit-code: "0"
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results/trivy-fs.sarif
          category: trivy-fs
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM with syft
        run: |
          mkdir -p sbom
          syft . -o spdx-json=sbom/sbom.spdx.json -o cyclone-json=sbom/sbom.cyclonedx.json
          ls -la sbom/
      - name: Security Gate — enforce quality thresholds
        run: |
          echo "============================================"
          echo "  Security Gate — Checking scan results"
          echo "============================================"
          FAIL=0
          if [ -f sarif-results/gosec.sarif ]; then
            GOSEC_CRITICAL=$(jq '[.runs[].results[] | select(.level == "error")] | length' sarif-results/gosec.sarif 2>/dev/null || echo 0)
            GOSEC_HIGH=$(jq '[.runs[].results[] | select(.level == "warning")] | length' sarif-results/gosec.sarif 2>/dev/null || echo 0)
            echo "gosec: $GOSEC_CRITICAL critical, $GOSEC_HIGH high"
            if [ "$GOSEC_CRITICAL" -gt 0 ]; then
              echo "❌ FAIL: gosec found $GOSEC_CRITICAL critical issues"
              jq -r '.runs[].results[] | select(.level == "error") | "  - \(.ruleId): \(.message.text) at \(.locations[0].physicalLocation.artifactLocation.uri // "unknown"):\(.locations[0].physicalLocation.region.startLine // 0)"' sarif-results/gosec.sarif 2>/dev/null || true
              FAIL=1
            fi
          fi
          if [ -f vulncheck-results.txt ]; then
            VULN_COUNT=$(grep -c "^GO-" vulncheck-results.txt 2>/dev/null || echo 0)
            echo "govulncheck: $VULN_COUNT vulnerabilities found"
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "❌ FAIL: govulncheck found $VULN_COUNT known vulnerabilities"
              grep "^GO-" vulncheck-results.txt | head -10
              FAIL=1
            fi
          fi
          if [ -f sarif-results/trivy-fs.sarif ]; then
            TRIVY_CRITICAL=$(jq '[.runs[].results[] | select(.level == "error")] | length' sarif-results/trivy-fs.sarif 2>/dev/null || echo 0)
            echo "trivy-fs: $TRIVY_CRITICAL critical CVEs"
            if [ "$TRIVY_CRITICAL" -gt 0 ]; then
              echo "❌ FAIL: Trivy found $TRIVY_CRITICAL critical vulnerabilities in dependencies"
              jq -r '.runs[].results[] | select(.level == "error") | "  - \(.ruleId): \(.message.text)"' sarif-results/trivy-fs.sarif 2>/dev/null | head -10 || true
              FAIL=1
            fi
          fi
          echo "============================================"
          if [ "$FAIL" -eq 1 ]; then
            echo "❌ Security Gate FAILED — pipeline blocked"
            echo "   Fix the issues above before merging."
            exit 1
          else
            echo "✅ Security Gate PASSED — no critical issues found"
          fi

  # ============================================================================
  # SECRETS SCAN
  # ============================================================================
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        id: trufflehog_scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - name: Alert on secrets found
        if: steps.trufflehog_scan.outcome == 'failure'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TG_CHAT_ID}\", \"text\": \"<b>Secrets detected!</b>\nRepo: ${{ github.repository }}\nRun: <a href='${RUN_URL}'>Details</a>\", \"parse_mode\": \"HTML\"}"

  # ============================================================================
  # MAKE CHECK
  # ============================================================================
  check:
    name: Make Check (Lint + Test)
    runs-on: ubuntu-latest
    needs: [validate-workflow, dockerfile-lint]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run make check
        run: make check
        env:
           DOCKER_HOST: ""
      - name: Coverage Check (80% threshold)
        run: |
           echo "Running coverage check..."
           go test -v -coverprofile=coverage.out ./...
           COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
           echo "Total coverage: $COVERAGE%"
           if (( $(echo "$COVERAGE < 80" | bc -l) )); then
             echo "::error::Coverage $COVERAGE% is below 80% threshold"
             exit 1
           fi
           echo "✅ Coverage check passed"

  # ============================================================================
  # BUILD BINARIES
  # ============================================================================
  binary_build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs:
      [
        detect-changes,
        security-scan,
        secrets-scan,
        check,
        dockerfile-lint,
        super-linter,
      ]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Go services (parallel)
        run: |
          set -euo pipefail
          mkdir -p bin
          echo "-> Downloading Go modules sequentially to avoid race conditions..."
          go mod download
          echo "-> Building Go services in parallel..."
          GOMAXPROCS=$(nproc)
          export GOMAXPROCS
          pids=()
          for svc in user-service biometric-service training-service gateway device-connector; do
            echo "  Building $svc..."
            go build -ldflags="-s -w" -o "bin/$svc" ./cmd/"$svc" &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do
            wait "$pid" || { echo "❌ Build failed for PID $pid"; exit 1; }
          done
          echo "✅ All binaries built successfully"
          ls -lh bin/
      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/
          retention-days: 1

  # ============================================================================
  # DOCKER BUILD & PUSH
  # ============================================================================
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [detect-changes, binary_build]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push Go services
        run: |
          services="user-service biometric-service training-service gateway device-connector"
          for svc in $services; do
            echo "Building $svc..."
            docker buildx build \
              --build-arg GOPROXY=https://proxy.golang.org,direct \
              --cache-from=type=gha \
              --cache-to=type=gha,mode=max \
              -t "${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/$svc:latest" \
              -f "cmd/$svc/Dockerfile" . \
              --push
          done
      - name: Build and push ML images (if models exist)
        run: |
          if [ -f "models/scaler.pkl" ] && { [ -f "models/classifier.keras" ] || ls models/classifier_*.keras >/dev/null 2>&1; }; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/classifier:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/classifier:latest" \
              -f cmd/classifier/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/classifier:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/classifier:latest"
          fi
          if [ -f "models/generator.h5" ] || [ -f "models/generator.keras" ]; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest" \
              -f cmd/ml_generator/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest"
          fi
      - name: Scan gateway image with Trivy
        id: trivy-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/mamuer/project/gateway:${{ steps.sha.outputs.short_sha }}"
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          scanners: vuln
      - name: Upload Trivy image results
        if: always() && hashFiles('trivy-image.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker
      - name: Install cosign
        run: |
          go install github.com/sigstore/cosign/v2/cmd/cosign@latest
      - name: Sign Docker images with cosign
        if: github.event_name != 'pull_request'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_EXPERIMENTAL: 1
        run: |
          services="user-service biometric-service training-service gateway device-connector"
          for svc in $services; do
            echo "Signing $svc..."
            echo "$COSIGN_PRIVATE_KEY" > /tmp/cosign.key
            cosign sign --yes --key /tmp/cosign.key \
              "${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }}"
            rm -f /tmp/cosign.key
          done

  # ============================================================================
  # SLSA PROVENANCE
  # ============================================================================
  slsa-provenance:
    name: SLSA Provenance
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'
    permissions:
      contents: read
    outputs:
      digests: ${{ steps.hash.outputs.digests }}
    steps:
      - uses: actions/checkout@v7
      - name: Build artifacts
        run: |
          mkdir -p bin
          GOMAXPROCS=$(nproc)
          export GOMAXPROCS
          for svc in user-service biometric-service training-service gateway device-connector; do
            go build -ldflags="-s -w" -o "bin/$svc" ./cmd/"$svc" &
          done
          wait
      - name: Generate subject for provenance
        id: hash
        run: |
          set -euo pipefail
          files=(bin/*)
          echo "hashes=$(sha256sum "${files[@]}" | base64 -w0)" >> "${GITHUB_OUTPUT}"
  slsa-publish:
    name: SLSA Publish
    needs: [slsa-provenance]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.slsa-provenance.outputs.digests }}"
      upload-assets: true

  # ============================================================================
  # ML RETRAIN
  # ============================================================================
  ml-retrain-classifier:
    name: ML Retrain Classifier
    runs-on: ubuntu-latest
    if: >-
      (github.event.schedule == '0 2 * * 1' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_mode == 'ml-retrain')) &&
      github.event_name != 'issues'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install DVC
        run: |
          pip install dvc==3.58.0
          dvc version
      - name: Pull data via DVC
        run: |
          echo "Using cached data from GitHub Actions cache..."
          dvc pull datasets/processed/training_data_real.csv.dvc || echo "No DVC remote configured, using local cache"
      - name: Install dependencies (generator)
        run: |
          pip install -r cmd/ml_generator/requirements.txt
      - name: Train generator with MLflow tracking
        run: |
          cd cmd/ml_generator
          python train_gan.py
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
      - name: Validate model quality
        run: |
          python -c "
          import json
          with open('models/training_history.json') as f:
              h = json.load(f)
          assert h['metrics']['test_accuracy'] > 0.7, 'Model accuracy too low!'
          print('✅ Model quality check passed')
          "
      - name: Save model as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ml-models-classifier
          path: models/
          retention-days: 7
      - name: Notify on completion
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🔄 ML Classifier Retraining: ${{ job.status }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  ml-retrain-generator:
    name: ML Retrain Generator
    runs-on: ubuntu-latest
    needs: ml-retrain-classifier
    if: >-
      (github.event.schedule == '0 2 * * 1' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_mode == 'ml-retrain')) &&
      github.event_name != 'issues'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install DVC
        run: pip install dvc==3.58.0
      - name: Pull training plans data
        run: dvc pull datasets/processed/training_plans_exercises.csv.dvc || echo "Using local cache"
      - name: Train GAN
        run: |
          pip install -r cmd/ml_generator/requirements.txt
          cd cmd/ml_generator
          python train_gan.py
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
      - name: Save generator model as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ml-models-generator
          path: models/
          retention-days: 7

  # ============================================================================
  # PROVISION K8S
  # ============================================================================
  provision-k8s-vps:
    name: Provision k3s Cluster on VPS
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))
    steps:
      - uses: actions/checkout@v7
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Make retry script executable
        run: chmod +x scripts/ssh-retry.sh
      - name: Check disk space on VPS
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          DISK_USAGE=\$(df / | tail -1 | awk '{print \$5}' | sed 's/%//')
          echo \"Current disk usage: \${DISK_USAGE}%\"
          if [ \"\$DISK_USAGE\" -gt 90 ]; then
            echo \"⚠️ WARNING: Disk usage is over 90%!\"
            curl -s -X POST \"https://api.telegram.org/bot\${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage\" \
              -H \"Content-Type: application/json\" \
              -d \"{\\\"chat_id\\\": \\\"\${{ secrets.TELEGRAM_CHAT_ID }}\\\", \\\"text\\\": \\\"⚠️ VPS Disk usage is \${DISK_USAGE}%!\\\"}\" || true
          fi
          "
      - name: Configure swap on VPS
        run: |
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/configure-swap.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/configure-swap.sh"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo chmod +x /tmp/configure-swap.sh && sudo /tmp/configure-swap.sh"
      - name: Configure Docker and System log rotation
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          echo "-> Setting up Docker log rotation..."
          sudo mkdir -p /etc/docker
          cat <<EOT | sudo tee /etc/docker/daemon.json
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
          EOT
          echo "-> Setting up journald size limit..."
          sudo mkdir -p /etc/systemd/journald.conf.d
          cat <<EOT | sudo tee /etc/systemd/journald.conf.d/99-size-limit.conf
          [Journal]
          SystemMaxUse=500M
          SystemMaxFileSize=50M
          MaxRetentionSec=1week
          EOT
          sudo systemctl daemon-reload
          sudo systemctl restart systemd-journald
          echo "-> Logs rotation configured"
          EOF
      - name: Clean up old k3s
        if: github.event_name == 'workflow_dispatch' && inputs.run_mode == 'recreate-cluster'
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          set -x
          echo \"-> Stopping k3s...\"
          systemctl stop k3s 2>/dev/null || true
          pkill -9 -f \"k3s server\" 2>/dev/null || true
          echo \"-> Removing k3s files...\"
          rm -rf /var/lib/rancher/k3s /etc/rancher/k3s
          rm -f /usr/local/bin/k3s /etc/systemd/system/k3s.service /etc/systemd/system/k3s*.timer
          systemctl daemon-reload
          echo \"Cleanup done\"
          "
      - name: Fix DNS resolv.conf permanently
        run: |
          echo "-> Uploading DNS fix script to VPS..."
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/fix-dns.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/fix-dns.sh"
          echo "-> Running DNS fix script on VPS..."
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          sudo chmod +x /tmp/fix-dns.sh
          sudo /tmp/fix-dns.sh
          rm -f /tmp/fix-dns.sh
          "
      - name: Prepare k3s config on VPS
        run: |
          ./configs/k8s/scripts/generate-k3s-config.sh "${{ secrets.VPS_HOST }}" /tmp/k3s-config-remote.yaml
          if command -v python3 &>/dev/null; then
            python3 -c "import yaml; yaml.safe_load(open('/tmp/k3s-config-remote.yaml'))" || {
              echo "❌ Generated config is invalid YAML"
              cat /tmp/k3s-config-remote.yaml
              exit 1
            }
            echo "✅ Config YAML is valid"
          fi
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          mkdir -p /etc/rancher/k3s
          echo 'Directory /etc/rancher/k3s created'
          "
          ./scripts/ssh-retry.sh scp /tmp/k3s-config-remote.yaml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/config.yaml"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo '=== Config written to /etc/rancher/k3s/config.yaml ==='
          cat /etc/rancher/k3s/config.yaml
          "
      - name: Restart k3s if config changed
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          set -euo pipefail
          if [ ! -f /etc/systemd/system/k3s.service ] && [ ! -f /usr/local/bin/k3s ]; then
            echo '✅ k3s is not installed yet, skipping restart (will be installed in next steps)'
            exit 0
          fi
          LOCAL_HASH=\$(sudo sha256sum /etc/rancher/k3s/config.yaml 2>/dev/null | awk '{print \$1}' || echo 'none')
          SAVED_HASH=\$(sudo cat /etc/rancher/k3s/.config-hash 2>/dev/null || echo 'none')
          if [ \"\$LOCAL_HASH\" != \"\$SAVED_HASH\" ]; then
            echo '-> Config changed (or first run), restarting k3s to apply kubelet-arg...'
            sudo systemctl restart k3s
            for i in \$(seq 1 90); do
              if k3s kubectl cluster-info &>/dev/null; then
                echo \"✅ k3s ready after \${i}s\"
                break
              fi
              if [ \"\$i\" -eq 90 ]; then
                echo '❌ Timeout waiting for k3s restart'
                journalctl -u k3s -n 30 --no-pager
                exit 1
              fi
              sleep 2
            done
            echo '-> Saving config hash for future comparisons...'
            echo \"\$LOCAL_HASH\" | sudo tee /etc/rancher/k3s/.config-hash > /dev/null
            echo '✅ k3s restarted with new config'
            k3s kubectl get nodes -o wide
          else
            echo '✅ Config unchanged, skipping k3s restart'
          fi
          "
      - name: Download k3s binary and install script
        run: |
          echo "-> Downloading k3s binary and install script..."
          curl -sfL -o /tmp/k3s https://github.com/k3s-io/k3s/releases/download/v1.31.6%2Bk3s1/k3s
          chmod +x /tmp/k3s
          curl -sfL -o /tmp/install.sh https://get.k3s.io
          chmod +x /tmp/install.sh
          echo "Download complete."
      - name: Upload k3s files to VPS
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p /tmp/k3s-install"
          ./scripts/ssh-retry.sh scp /tmp/k3s "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/k3s-install/k3s"
          ./scripts/ssh-retry.sh scp /tmp/install.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/k3s-install/install.sh"
      - name: Install k3s on VPS
        env:
          SSH_RETRY_TIMEOUT: 600
          SSH_RETRY_MAX_ATTEMPTS: 5
          SSH_RETRY_DELAY_SECONDS: 15
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          set -euo pipefail
          echo \"-> Moving k3s binary to /usr/local/bin...\"
          sudo mv /tmp/k3s-install/k3s /usr/local/bin/k3s || mv /tmp/k3s-install/k3s /usr/local/bin/k3s
          sudo chmod +x /usr/local/bin/k3s || chmod +x /usr/local/bin/k3s
          echo \"-> Running k3s install script with Docker runtime...\"
          export INSTALL_K3S_SKIP_DOWNLOAD=true
          chmod +x /tmp/k3s-install/install.sh
          sudo /tmp/k3s-install/install.sh server --write-kubeconfig-mode 644 --docker || /tmp/k3s-install/install.sh server --write-kubeconfig-mode 644 --docker
          echo \"k3s installed successfully\"
          rm -rf /tmp/k3s-install
          "
      - name: Cleanup disk space on VPS
        run: |
          echo "-> Cleaning up disk space on VPS..."
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo '=== Disk usage before cleanup ==='
          df -h /
          echo ''
          echo '=== Docker disk usage ==='
          docker system df || true
          echo ''
          echo '-> Removing dangling Docker images...'
          docker image prune -f
          echo '-> Removing unused Docker volumes...'
          docker volume prune -f || true
          echo '-> Removing unused Docker networks...'
          docker network prune -f || true
          echo '-> Removing stopped containers...'
          docker container prune -f || true
          echo '-> Cleaning Docker build cache...'
          docker builder prune -f --filter 'until=24h' || true
          echo ''
          echo '-> Cleaning containerd cache (k3s internal)...'
          k3s crictl rmi --prune 2>/dev/null || crictl rmi --prune 2>/dev/null || true
          echo ''
          echo '-> Removing old application images (keep only last 3 versions)...'
          for svc in user-service biometric-service training-service gateway device-connector classifier ml-generator; do
            echo \"Cleaning \$svc...\"
            docker images \"ghcr.io/mamuer/project/\$svc\" --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' | \
              sort -k2 -r | \
              tail -n +4 | \
              awk '{print \$1}' | \
              xargs -r docker rmi || true
          done
          echo ''
          echo '-> Cleaning system logs older than 7 days...'
          sudo journalctl --vacuum-time=7d || true
          echo ''
          echo '-> Cleaning /tmp files older than 1 day...'
          sudo find /tmp -type f -mtime +1 -delete || true
          echo ''
          echo '=== Disk usage after cleanup ==='
          df -h /
          echo ''
          echo '=== Docker disk usage after cleanup ==='
          docker system df || true
          echo ''
          echo '✅ Disk cleanup completed'
          "
      - name: Pre-pull system images via Docker
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo \"-> Pre-pulling system images via Docker...\"
          docker pull rancher/mirrored-pause:3.6 || echo \"pause image pull failed, continuing\"
          docker pull rancher/mirrored-coredns-coredns:1.10.1 || echo \"coredns pull failed\"
          docker pull rancher/mirrored-library-traefik:2.9.10 || echo \"traefik pull failed\"
          docker pull rancher/local-path-provisioner:v0.0.26 || echo \"local-path pull failed\"
          docker pull busybox:latest || echo \"busybox pull failed\"
          echo \"Docker images:\"
          docker images | head -10
          "
      - name: Start and verify k3s
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo \"-> Starting k3s...\"
          systemctl daemon-reload
          systemctl enable --now k3s
          echo \"-> Waiting for readiness...\"
          for i in \$(seq 1 120); do
            if k3s kubectl cluster-info &> /dev/null; then
              echo \"k3s ready after \${i}s\"
              break
            fi
            [ \$i -eq 120 ] && { echo \"Timeout\"; journalctl -u k3s -n 20 --no-pager; exit 1; }
            sleep 2
          done
          echo \"=== Cluster status ===\"
          k3s kubectl get nodes -o wide
          k3s kubectl get pods -A
          "
      - name: Limit k3s memory usage
        run: |
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/k3s-memory-watchdog.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/k3s-memory-watchdog.sh"
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/setup-k3s-memory.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/setup-k3s-memory.sh"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo chmod +x /tmp/setup-k3s-memory.sh && sudo /tmp/setup-k3s-memory.sh"
      - name: Fix local-path-provisioner RBAC and ensure WaitForFirstConsumer binding mode
        run: |
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/fix-local-path.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/fix-local-path.sh"
          ./scripts/ssh-retry.sh scp configs/k8s/base/local-path-provisioner.yaml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/local-path-provisioner.yaml"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo chmod +x /tmp/fix-local-path.sh && sudo /tmp/fix-local-path.sh"
      - name: Ensure k3s certificates include domain and external IP
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          set -euo pipefail
          if ! k3s kubectl get --raw /livez &>/dev/null; then
            echo \"API не отвечает\"; exit 1
          fi
          CERT_FILE=\"/var/lib/rancher/k3s/server/tls/dynamic-cert.json\"
          NEED_RESTART=false
          if [ -f \"\$CERT_FILE\" ]; then
            CURRENT_SAN=\$(kubectl get --raw /apis | jq -r '.')
            if ! grep -q 'fittpulse.duckdns.org' /etc/rancher/k3s/config.yaml; then
              echo \"⚠️ Конфиг не содержит домен, обновляем...\"
              NEED_RESTART=true
            else
              echo \"✅ Домен уже в конфиге.\"
            fi
          else
            echo \"Сертификат ещё не сгенерирован, перезапуск не требуется.\"
          fi
          if [ \"\$NEED_RESTART\" = true ]; then
            echo \"Перезапуск k3s для применения новых SAN...\"
            sudo systemctl stop k3s
            sudo rm -f /var/lib/rancher/k3s/server/tls/dynamic-cert.json
            sudo systemctl start k3s
            for i in \$(seq 1 60); do
              if k3s kubectl cluster-info &>/dev/null; then
                echo \"k3s снова готов после \${i}s\"
                break
              fi
              sleep 2
            done
          fi
          "
      - name: Upload Traefik NodePort config to VPS
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo mkdir -p /var/lib/rancher/k3s/server/manifests"
          ./scripts/ssh-retry.sh scp configs/k8s/base/traefik-config.yaml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/traefik-config.yaml"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo mv /tmp/traefik-config.yaml /var/lib/rancher/k3s/server/manifests/traefik-config.yaml && sudo chmod 644 /var/lib/rancher/k3s/server/manifests/traefik-config.yaml"
      - name: Ensure Let's Encrypt certificate exists
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo '-> Checking for Let'\''s Encrypt certificate...'
          if [ ! -f /etc/letsencrypt/live/fittpulse.duckdns.org/fullchain.pem ]; then
            echo '⚠️ Certificate not found. Installing Certbot and issuing certificate (webroot)...'
            sudo apt-get update -qq
            sudo apt-get install -y -qq certbot
            sudo mkdir -p /var/www/certbot
            sudo systemctl is-active --quiet nginx || sudo systemctl start nginx
            sudo certbot certonly --webroot --webroot-path /var/www/certbot \
              --non-interactive --agree-tos \
              --email admin@fittpulse.duckdns.org \
              -d fittpulse.duckdns.org \
              --keep-until-expiring
            if [ \$? -eq 0 ]; then
              echo '✅ Certificate issued successfully'
            else
              echo '❌ Certificate issuance failed. Check logs.'
              exit 1
            fi
          else
            echo '✅ Let'\''s Encrypt certificate already exists'
          fi
          sudo openssl x509 -in /etc/letsencrypt/live/fittpulse.duckdns.org/fullchain.pem -noout -dates -issuer || true
          "
      - name: Deploy Nginx configuration to VPS
        run: |
          ./scripts/ssh-retry.sh scp deploy/lb/production.conf "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/production.conf"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo '-> Deploying Nginx configuration...'
          sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled /var/www/certbot
          sudo rm -f /etc/nginx/sites-enabled/*
          sudo rm -f /etc/nginx/conf.d/*.conf
          sudo cp /tmp/production.conf /etc/nginx/sites-available/fittpulse.conf
          sudo ln -sf /etc/nginx/sites-available/fittpulse.conf /etc/nginx/sites-enabled/fittpulse.conf
          if sudo nginx -t; then
            sudo systemctl reload nginx
            echo '✅ Nginx configuration deployed and reloaded'
          else
            echo '❌ Nginx configuration test failed!'
            sudo nginx -t
            exit 1
          fi
          "
      - name: Setup auto-renewal for SSL
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo \"-> Setting up certificate auto-renewal...\"
          (sudo crontab -l 2>/dev/null | grep -v certbot; echo \"0 3 * * * certbot renew --quiet --deploy-hook 'systemctl reload nginx'\") | sudo crontab -
          echo \"✅ Auto-renewal configured\"
          "
      - name: Setup DuckDNS auto-updater
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo '-> Setting up DuckDNS auto-updater...'
          echo '${{ secrets.DUCKDNS_TOKEN }}' | sudo tee /etc/duckdns/token > /dev/null
          sudo chmod 600 /etc/duckdns/token
          sudo mkdir -p /etc/duckdns
          "
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/duckdns-update.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/usr/local/bin/duckdns-update.sh"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          sudo chmod +x /usr/local/bin/duckdns-update.sh
          (sudo crontab -l 2>/dev/null | grep -v duckdns-update; echo '*/5 * * * * /usr/local/bin/duckdns-update.sh >> /var/log/duckdns.log 2>&1') | sudo crontab -
          sudo /usr/local/bin/duckdns-update.sh
          echo '✅ DuckDNS auto-updater configured (every 5 minutes)'
          "
      - name: Setup ML infrastructure directories
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo \"-> Creating directories for ML storage...\"
          sudo mkdir -p /opt/fitpulse/{dvc-storage,mlflow-data}
          sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /opt/fitpulse
          echo \"✅ Directories created: /opt/fitpulse/{dvc-storage,mlflow-data}\"
          "
      - name: Deploy MLflow service
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          mkdir -p ~/fitpulse/deployments
          docker rm -f fitpulse-mlflow 2>/dev/null || true
          docker run -d \
            --name fitpulse-mlflow \
            --restart unless-stopped \
            -p 5000:5000 \
            -v /opt/fitpulse/mlflow-data:/mlflow \
            ghcr.io/mlflow/mlflow:v2.20.2 \
            mlflow server \
            --host 0.0.0.0 \
            --port 5000 \
            --backend-store-uri sqlite:////mlflow/mlflow.db \
            --default-artifact-root /mlflow/artifacts
          for _ in {1..30}; do
            if curl -sf http://localhost:5000/health &>/dev/null; then
              echo '✅ MLflow is healthy'
              break
            fi
            sleep 2
          done
          echo \"✅ MLflow deployed: http://${{ secrets.VPS_HOST }}:5000\"
          "
      - name: Configure DVC local remote
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cd ~/fitpulse && mkdir -p .dvc"
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/dvc-config "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/fitpulse/.dvc/config"
          echo "✅ DVC configured with local remote: /opt/fitpulse/dvc-storage"
      - name: Setup Postgres automated backups
        run: |
          if [ -n "${{ secrets.BACKUP_KEY }}" ]; then
            echo -n "${{ secrets.BACKUP_KEY }}" > /tmp/backup.key
            chmod 600 /tmp/backup.key
            ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo mkdir -p /etc/fitpulse"
            ./scripts/ssh-retry.sh scp /tmp/backup.key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/backup.key"
            ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            sudo mv /tmp/backup.key /etc/fitpulse/backup.key
            sudo chmod 600 /etc/fitpulse/backup.key
            sudo chown root:root /etc/fitpulse/backup.key
            echo '✅ Backup key saved securely to /etc/fitpulse/backup.key'
            "
            rm -f /tmp/backup.key
          else
            echo "⚠️ BACKUP_KEY secret is not set in GitHub. Backups will NOT be encrypted."
            ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo rm -f /etc/fitpulse/backup.key || true"
          fi
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          sudo mkdir -p /opt/fitpulse/backups
          cat <<'BACKUP_EOF' | sudo tee /usr/local/bin/backup-postgres.sh > /dev/null
          #!/bin/bash
          set -euo pipefail
          BACKUP_DIR='/opt/fitpulse/backups'
          KEY_FILE='/etc/fitpulse/backup.key'
          mkdir -p \"\$BACKUP_DIR\"
          DATE=\$(date +%Y%m%d_%H%M%S)
          FILENAME=\"\$BACKUP_DIR/fitness_\$DATE.dump\"
          ENCRYPTED=\"\$FILENAME.enc\"
          /usr/local/bin/k3s kubectl exec -n fitness-platform-production postgres-0 -- \
            pg_dump -U postgres -d fitness -F c > \"\$FILENAME\"
          if [ -f \"\$KEY_FILE\" ] && [ -s \"\$KEY_FILE\" ]; then
            openssl enc -aes-256-cbc -salt -pbkdf2 -pass file:\"\$KEY_FILE\" -in \"\$FILENAME\" -out \"\$ENCRYPTED\"
            rm -f \"\$FILENAME\"
            echo \"Encrypted backup created: \$ENCRYPTED\"
          else
            echo \"Backup created (unencrypted): \$FILENAME\"
          fi
          find \"\$BACKUP_DIR\" -type f -mtime +7 -delete
          BACKUP_EOF
          sudo chmod +x /usr/local/bin/backup-postgres.sh
          (sudo crontab -l 2>/dev/null | grep -v backup-postgres; echo '0 2 * * * /usr/local/bin/backup-postgres.sh >> /var/log/backup-postgres.log 2>&1') | sudo crontab -
          echo '✅ Postgres backups configured (daily at 2 AM)'
          "
      - name: Deploy health check script
        run: |
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/check-server-health.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/usr/local/bin/check-server-health.sh"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          sudo chmod +x /usr/local/bin/check-server-health.sh
          (sudo crontab -l 2>/dev/null | grep -v check-server-health) | sudo crontab -
          (sudo crontab -l 2>/dev/null; echo '0 9 * * * TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }} /usr/local/bin/check-server-health.sh --silent >> /var/log/server-health.log 2>&1') | sudo crontab -
          echo '✅ Health check script deployed and cron configured'
          "
      - name: Generate kubeconfig with external domain
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          set -euo pipefail
          sudo cp /etc/rancher/k3s/k3s.yaml /tmp/k3s-domain.yaml
          sudo sed -i 's|0.0.0.0|fittpulse.duckdns.org|g' /tmp/k3s-domain.yaml
          sudo sed -i 's|127.0.0.1|fittpulse.duckdns.org|g' /tmp/k3s-domain.yaml
          sudo sed -i '/insecure-skip-tls-verify/d' /tmp/k3s-domain.yaml
          sudo chmod 644 /tmp/k3s-domain.yaml
          cp /tmp/k3s-domain.yaml ~/k3s-config.yaml
          echo \"✅ Kubeconfig saved to ~/k3s-config.yaml\"
          "
      - name: Download kubeconfig artifact
        run: |
          ./scripts/ssh-retry.sh scp \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/k3s-config.yaml" \
            ./k3s-config.yaml
      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v7
        with:
          name: kubeconfig
          path: ./k3s-config.yaml
          retention-days: 1

  # ============================================================================
  # HEALTH CHECK
  # ============================================================================
  health-check:
    name: Server Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'
    steps:
      - uses: actions/checkout@v7
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Deploy health check script
        run: |
          ./scripts/ssh-retry.sh scp configs/k8s/scripts/check-server-health.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/usr/local/bin/check-server-health.sh"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          sudo chmod +x /usr/local/bin/check-server-health.sh
          echo '✅ Health check script deployed'
          "
      - name: Run immediate health check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          export TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
          export TELEGRAM_CHAT_ID='${{ secrets.TELEGRAM_CHAT_ID }}'
          /usr/local/bin/check-server-health.sh || true
          "
      - name: Setup daily health check cron
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          (sudo crontab -l 2>/dev/null | grep -v check-server-health) | sudo crontab -
          (sudo crontab -l 2>/dev/null; echo '0 9 * * * TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }} /usr/local/bin/check-server-health.sh --silent >> /var/log/server-health.log 2>&1') | sudo crontab -
          echo '✅ Daily health check cron configured (9 AM UTC)'
          "

  # ============================================================================
  # DEPLOY TEST
  # ============================================================================
  deploy-test:
    name: Deploy to Test (Docker Compose)
    runs-on: ubuntu-latest
    needs: [detect-changes, binary_build, provision-k8s-vps]
    steps:
      - uses: actions/checkout@v7
      - name: Start test environment
        run: docker compose -f docker-compose.test.yml down -v && docker compose -f docker-compose.test.yml up -d --build
      - name: Wait for services
        run: |
          docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 180
          docker compose -f docker-compose.test.yml ps
      - name: Smoke tests
        run: |
          set -euo pipefail
          GATEWAY_URL="http://localhost:8081"
          for _ in {1..15}; do
            RESPONSE=$(curl -s --max-time 3 "$GATEWAY_URL/health" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              break
            fi
            sleep 5
          done
          RESPONSE=$(curl -s --max-time 5 "$GATEWAY_URL/health")
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || {
            echo "Health check failed or degraded"
            docker compose -f docker-compose.test.yml logs --tail=150 user-service-test || true
            docker compose -f docker-compose.test.yml logs --tail=150 gateway-test || true
            exit 1
          }
          echo "$RESPONSE" | grep -q '"user":"up"' || {
            echo "User service not healthy"
            docker compose -f docker-compose.test.yml logs --tail=150 user-service-test || true
            exit 1
          }
          TIMESTAMP=$(date +%s)
          REGISTER_RESPONSE=$(curl -s -w "%{http_code}" -X POST "$GATEWAY_URL/api/v1/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke'"$TIMESTAMP"'@test.com","password":"Test123!","full_name":"Smoke","role":"client"}')
          HTTP_CODE="${REGISTER_RESPONSE: -3}"
          [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]] || exit 1
          echo "Smoke tests passed"

  # ============================================================================
  # DEPLOY PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to K8s Production
    runs-on: ubuntu-latest
    needs: [detect-changes, docker, provision-k8s-vps]
    outputs:
      reachable: ${{ steps.connectivity.outputs.reachable }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Make retry script executable
        run: chmod +x scripts/ssh-retry.sh
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Resolve VPS hostname and add to /etc/hosts
        run: |
          VPS_IP=$(dig +short "${{ secrets.VPS_HOST }}" | head -1)
          if [ -z "$VPS_IP" ]; then
            echo "dig failed, trying nslookup..."
            VPS_IP=$(nslookup "${{ secrets.VPS_HOST }}" | grep -A1 "Name:" | tail -1 | awk '{print $2}')
          fi
          if [ -z "$VPS_IP" ]; then
            echo "Failed to resolve VPS_HOST, using VPS_HOST as IP (assuming it's an IP address)"
            VPS_IP="${{ secrets.VPS_HOST }}"
          fi
          echo "Resolved VPS_IP: $VPS_IP"
          echo "$VPS_IP fittpulse.duckdns.org" | sudo tee -a /etc/hosts
          echo "Added /etc/hosts entry"
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl config set-context --current --namespace=fitness-platform-production
      - name: Wait for k3s API to be fully ready
        run: |
          echo "Waiting for k3s API server to be fully initialized..."
          for i in {1..30}; do
            if kubectl get --raw=/healthz &>/dev/null; then
              echo "✅ k3s API server is ready after ${i}0 seconds"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ k3s API server not ready after 5 minutes"
              kubectl cluster-info dump || true
              exit 1
            fi
            echo "Attempt $i/30: API not ready, waiting 10s..."
            sleep 10
          done
          echo "Verifying API endpoints..."
          kubectl api-resources --api-group=apps &>/dev/null || {
            echo "API resources not available, waiting 30s more..."
            sleep 30
          }
      - name: Check cluster connectivity
        id: connectivity
        run: |
          echo "Testing connectivity to ${{ secrets.VPS_HOST }}:6443..."
          if timeout 10 bash -c "</dev/tcp/${{ secrets.VPS_HOST }}/6443" 2>/dev/null; then
            echo "Cluster reachable"
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "Cluster NOT reachable (timeout 10s)"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Create image pull secret for GHCR
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Creating imagePullSecret for ghcr.io..."
          kubectl create namespace fitness-platform-production --dry-run=client -o yaml | kubectl apply --validate=false -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            -n fitness-platform-production \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -
          echo "imagePullSecret created/updated"
      - name: Ensure service account exists
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Checking service account app-service-account..."
          kubectl create serviceaccount app-service-account \
            -n fitness-platform-production \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create clusterrolebinding app-service-account-binding \
            --clusterrole=edit \
            --serviceaccount=fitness-platform-production:app-service-account \
            --dry-run=client -o yaml | kubectl apply -f - || true
          echo "ServiceAccount ready"
      - name: Create production secrets
        if: steps.connectivity.outputs.reachable == 'true'
        env:
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
        run: |
          echo "Creating app-secrets..."
          RABBITMQ_URL="amqp://${{ secrets.RABBITMQ_USER }}:${{ secrets.RABBITMQ_PASS }}@rabbitmq:5672/"
          kubectl create secret generic app-secrets -n fitness-platform-production \
            --from-literal=POSTGRES_USER=postgres \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=fitness \
            --from-literal=JWT_PRIVATE_KEY_PEM=${{ secrets.JWT_PRIVATE_KEY_PEM }} \
            --from-literal=JWT_PUBLIC_KEY_PEM=${{ secrets.JWT_PUBLIC_KEY_PEM }} \
            --from-literal=RABBITMQ_USER=${{ secrets.RABBITMQ_USER }} \
            --from-literal=RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --from-literal=RABBITMQ_URL="$RABBITMQ_URL" \
            --from-literal=SMTP_HOST=${{ vars.SMTP_HOST }} \
            --from-literal=SMTP_PORT=${{ vars.SMTP_PORT }} \
            --from-literal=SMTP_USER=${{ secrets.SMTP_USER }} \
            --from-literal=SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }} \
            --from-literal=SMTP_FROM=${{ secrets.SMTP_FROM }} \
            --from-literal=APP_BASE_URL=${{ vars.APP_BASE_URL }} \
            --from-literal=SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }} \
            --from-literal=SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }} \
            --from-literal=FITBIT_CLIENT_ID=${{ secrets.FITBIT_CLIENT_ID }} \
            --from-literal=FITBIT_CLIENT_SECRET=${{ secrets.FITBIT_CLIENT_SECRET }} \
            --from-literal=FITBIT_REDIRECT_URI=${{ vars.FITBIT_REDIRECT_URI }} \
            --from-literal=FITBIT_VERIFIER_SECRET=${{ secrets.FITBIT_VERIFIER_SECRET }} \
            --from-literal=WITHINGS_CLIENT_ID=${{ secrets.WITHINGS_CLIENT_ID }} \
            --from-literal=WITHINGS_CLIENT_SECRET=${{ secrets.WITHINGS_CLIENT_SECRET }} \
            --from-literal=WITHINGS_REDIRECT_URI=${{ vars.WITHINGS_REDIRECT_URI }} \
            --from-literal=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            --from-literal=GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --from-literal=GOOGLE_REDIRECT_URL=${{ vars.GOOGLE_REDIRECT_URL }} \
            --from-literal=TOTP_ENCRYPTION_KEY=${{ secrets.TOTP_ENCRYPTION_KEY }} \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -
          echo "✅ app-secrets created"
          echo "Waiting for secrets to propagate..."
          sleep 10
          echo "Creating rabbitmq-secret with rabbitmq.conf..."
          kubectl apply -f configs/k8s/base/secrets/rabbitmq-secret.yaml
          echo "✅ rabbitmq-secret created"
          echo "Waiting for secrets to propagate..."
          sleep 10
          echo "Creating monitoring-secrets..."
          kubectl create secret generic monitoring-secrets -n fitness-platform-production \
            --from-literal=grafana-admin-password=${{ secrets.GRAFANA_ADMIN_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -
          echo "✅ monitoring-secrets created"
      - name: Update image tags to SHA
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "Updating image tags to :$SHA"
          cd configs/k8s/overlays/production
          for svc in user-service biometric-service training-service gateway classifier ml-generator; do
            kustomize edit set image "ghcr.io/mamuer/project/$svc=ghcr.io/mamuer/project/$svc:$SHA"
          done
      - name: Cleanup disk space on VPS
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "-> Cleaning up disk space on VPS..."
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo '=== Disk usage before cleanup ==='
          df -h /
          echo ''
          echo '=== Docker disk usage ==='
          docker system df || true
          echo ''
          echo '-> Removing dangling Docker images...'
          docker image prune -f
          echo '-> Removing unused Docker volumes...'
          docker volume prune -f || true
          echo '-> Removing unused Docker networks...'
          docker network prune -f || true
          echo '-> Removing stopped containers...'
          docker container prune -f || true
          echo '-> Cleaning Docker build cache...'
          docker builder prune -f --filter 'until=24h' || true
          echo ''
          echo '-> Removing old application images (keep only last 3 versions)...'
          for svc in user-service biometric-service training-service gateway device-connector classifier ml-generator; do
            echo \"Cleaning \$svc...\"
            docker images \"ghcr.io/mamuer/project/\$svc\" --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' | \
              sort -k2 -r | \
              tail -n +4 | \
              awk '{print \$1}' | \
              xargs -r docker rmi || true
          done
          echo ''
          echo '-> Cleaning system logs older than 7 days...'
          sudo journalctl --vacuum-time=7d || true
          echo ''
          echo '-> Cleaning /tmp files older than 1 day...'
          sudo find /tmp -type f -mtime +1 -delete || true
          echo ''
          echo '=== Disk usage after cleanup ==='
          df -h /
          echo ''
          echo '=== Docker disk usage after cleanup ==='
          docker system df || true
          echo ''
          echo '✅ Disk cleanup completed'
          "
      - name: Pre-pull application images on VPS
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "-> Pre-pulling application images with tag $SHA on VPS..."
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
          echo 'Logging in to GHCR on VPS...'
          echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin || true
          for svc in user-service biometric-service training-service gateway device-connector classifier ml-generator; do
            echo \"Pulling ghcr.io/mamuer/project/\$svc:$SHA...\"
            docker pull ghcr.io/mamuer/project/\$svc:$SHA || echo \"Failed to pull \$svc, continuing...\"
          done
          echo 'Docker images after pre-pull:'
          docker images | grep mamuer || true
          echo '-> Waiting 60s to let node recover from disk I/O...'
          sleep 60
          "
      - name: Ensure local-path-provisioner is running and StorageClass is ready
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          set -euo pipefail
          echo "Applying local-path-provisioner manifest..."
          kubectl apply -f configs/k8s/base/local-path-provisioner.yaml
          echo "Restarting local-path-provisioner to clear any stuck state..."
          kubectl rollout restart deployment/local-path-provisioner -n local-path-storage
          kubectl rollout status deployment/local-path-provisioner -n local-path-storage --timeout=60s
          echo "Waiting for local-path-provisioner pod to be ready..."
          kubectl -n local-path-storage rollout status deploy/local-path-provisioner --timeout=3m
          echo "Verifying StorageClass local-path exists and is ready..."
          for i in {1..30}; do
            if kubectl get storageclass local-path &>/dev/null; then
              echo "✅ StorageClass found"
              break
            fi
            echo "Attempt $i/30: waiting for StorageClass..."
            sleep 2
          done
          if ! kubectl get storageclass local-path -o jsonpath='{.metadata.annotations.storageclass\.kubernetes\.io/is-default-class}' | grep -q true; then
            echo "⚠️ StorageClass local-path is not default, patching..."
            kubectl patch storageclass local-path -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
          fi
          echo "✅ local-path-provisioner and StorageClass are ready"
      - name: Apply production overlay with Kustomize
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          set -euo pipefail
          echo "Waiting for k8s API internal availability..."
          for i in {1..30}; do
            if kubectl get --raw /healthz &>/dev/null; then
              echo "✅ API internal health OK"
              break
            fi
            echo "Attempt $i/30: waiting for internal API..."
            sleep 5
          done
          echo "Waiting for k8s API nodes..."
          kubectl wait --for=condition=Ready --timeout=5m nodes --all || { kubectl cluster-info; kubectl get nodes -o wide; exit 1; }
          echo "Deleting immutable Jobs to allow updates..."
          kubectl delete job migrate-db seed-admin -n fitness-platform-production --ignore-not-found=true || true
          echo "Deleting existing PVCs and PVs to force recreation with fixed provisioner..."
          kubectl delete pvc -n fitness-platform-production --all --ignore-not-found=true || true
          kubectl get pv -o json | jq -r '.items[] | select(.spec.claimRef.namespace == "fitness-platform-production") | .metadata.name' | xargs -r kubectl delete pv || true
          cd configs/k8s/overlays/production
          kustomize build . > /tmp/manifests.yaml
          kubectl delete pod rabbitmq-0 -n fitness-platform-production --ignore-not-found=true || true
          kubectl delete pod -l app=user-service -n fitness-platform-production --ignore-not-found=true || true
          kubectl delete pod -l app=training-service -n fitness-platform-production --ignore-not-found=true || true
          echo "Applying manifests with retries..."
          MAX_RETRIES=5
          for i in $(seq 1 "$MAX_RETRIES"); do
            if kubectl apply --validate=false -f /tmp/manifests.yaml; then
              echo "Production overlay applied successfully"
              break
            else
              echo "Attempt $i/$MAX_RETRIES failed."
              if [ "$i" -lt "$MAX_RETRIES" ]; then
                echo "Waiting 20s before retry..."
                sleep 20
                if ! kubectl get nodes >/dev/null 2>&1; then
                  echo "API server is unresponsive. Restarting k3s via SSH..."
                  ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo systemctl restart k3s" || true
                  echo "Waiting 40s for k3s to restart..."
                  sleep 40
                  for _j in {1..30}; do
                    if kubectl get nodes >/dev/null 2>&1; then
                      echo "k3s API is back online."
                      break
                    fi
                    sleep 5
                  done
                fi
              else
                echo "Failed to apply manifests after $MAX_RETRIES attempts."
                kubectl get pods -A -o wide || true
                exit 1
              fi
            fi
          done
          echo "Waiting for ConfigMaps to propagate..."
          sleep 15
      - name: Wait for RabbitMQ to be ready
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Waiting for RabbitMQ pod to be scheduled..."
          for i in {1..60}; do
            POD_NAME=$(kubectl get pods -l app=rabbitmq -n fitness-platform-production -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$POD_NAME" ]; then
              echo "✅ RabbitMQ pod found: $POD_NAME"
              break
            fi
            echo "Attempt $i/60: waiting for RabbitMQ pod..."
            sleep 2
          done
          if [ -z "$POD_NAME" ]; then
            echo "❌ RabbitMQ pod not scheduled. Checking events..."
            kubectl get events -n fitness-platform-production --sort-by='.lastTimestamp' | grep -i rabbitmq || true
            kubectl describe statefulset rabbitmq -n fitness-platform-production || true
            exit 1
          fi
          echo "Waiting for RabbitMQ StatefulSet to be ready..."
          kubectl rollout status statefulset/rabbitmq -n fitness-platform-production --timeout=180s || {
            echo "❌ RabbitMQ not ready. Logs:"
            kubectl logs statefulset/rabbitmq -n fitness-platform-production --tail=100 || true
            exit 1
          }
          echo "✅ RabbitMQ is ready"
      - name: Verify Postgres StatefulSet
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "=== Checking resources in namespace ==="
          kubectl get all -n fitness-platform-production
          echo "=== Checking StatefulSet specifically ==="
          if ! kubectl get statefulset postgres -n fitness-platform-production >/dev/null 2>&1; then
            echo "❌ StatefulSet 'postgres' not found. Re-applying manifests..."
            cd configs/k8s/overlays/production
            kustomize build . | kubectl apply --validate=false -f -
            echo "Waiting 30s for StatefulSet to appear..."
            sleep 30
          fi
          kubectl get statefulset postgres -n fitness-platform-production -o wide || true
          kubectl describe statefulset postgres -n fitness-platform-production || true
          echo "=== Checking pods ==="
          kubectl get pods -n fitness-platform-production -o wide
      - name: Wait for Postgres PVC to be created and bound
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Waiting for Postgres PVC to be created..."
          for i in {1..30}; do
            if kubectl get pvc postgres-storage-postgres-0 -n fitness-platform-production &>/dev/null; then
              echo "✅ PVC created"
              break
            fi
            echo "Attempt $i/30: PVC not found yet, waiting 5s..."
            sleep 5
          done
          echo "Waiting for PVC to be bound..."
          for i in {1..30}; do
            PHASE=$(kubectl get pvc postgres-storage-postgres-0 -n fitness-platform-production -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            if [ "$PHASE" = "Bound" ]; then
              echo "✅ PVC is bound"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Timeout waiting for Postgres PVC to bind"
              kubectl get nodes -o wide || true
              kubectl get pvc -n fitness-platform-production || true
              kubectl describe pvc postgres-storage-postgres-0 -n fitness-platform-production || true
              kubectl get storageclass || true
              exit 1
            fi
            echo "Attempt $i/30: PVC phase is $PHASE, waiting 5s..."
            sleep 5
          done
          echo "✅ Postgres PVC is bound"
      - name: Wait for Postgres to be ready
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Waiting for Postgres pod to be scheduled and running..."
          for i in {1..120}; do
            STATUS=$(kubectl get pod postgres-0 -n fitness-platform-production -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Running" ]; then
              echo "✅ Postgres pod is Running after ${i}x5 seconds"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "❌ Timeout waiting for Postgres pod"
              echo "-> PVC Status:"
              kubectl get pvc -n fitness-platform-production || true
              kubectl describe pvc postgres-storage-postgres-0 -n fitness-platform-production || true
              echo "-> Pod Status:"
              kubectl get pods -n fitness-platform-production -o wide
              kubectl describe pod postgres-0 -n fitness-platform-production || true
              exit 1
            fi
            echo "Attempt $i/120: Postgres status=$STATUS, waiting 5s..."
            sleep 5
          done
          echo "Verifying Postgres accepts connections..."
          for i in {1..30}; do
            if kubectl exec -n fitness-platform-production postgres-0 -- pg_isready -U postgres &>/dev/null; then
              echo "✅ Postgres is ready to accept connections"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Postgres not accepting connections"
              kubectl logs postgres-0 -n fitness-platform-production --tail=50 || true
              exit 1
            fi
            echo "Attempt $i/30: pg_isready failed, waiting 3s..."
            sleep 3
          done
      - name: Run database migrations
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Running database migrations via kubectl exec..."
          SQL_FILE="configs/k8s/base/jobs/init-db.sql"
          if [ ! -f "$SQL_FILE" ]; then
            echo "❌ Migration file not found: $SQL_FILE"
            exit 1
          fi
          echo "Migration file size: $(wc -c < "$SQL_FILE") bytes"
          echo "Copying SQL file to postgres-0 pod..."
          kubectl cp "$SQL_FILE" fitness-platform-production/postgres-0:/tmp/init-db.sql
          echo "Executing migrations inside Postgres pod..."
          if kubectl exec -n fitness-platform-production postgres-0 -- \
            psql -U postgres -d fitness -f /tmp/init-db.sql -v ON_ERROR_STOP=1; then
            echo "✅ Database migrations completed successfully"
          else
            echo "❌ Database migrations failed"
            exit 1
          fi
          echo "Verifying tables were created..."
          kubectl exec -n fitness-platform-production postgres-0 -- \
            psql -U postgres -d fitness -c "SELECT table_name FROM information_schema.tables WHERE table_schema='public' ORDER BY table_name;"
      - name: Wait for postgres-service to be fully ready
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Waiting for postgres-service endpoint..."
          for i in {1..20}; do
            if kubectl get endpoints postgres-service -n fitness-platform-production -o jsonpath='{.subsets[*].addresses[*].ip}' | grep -q .; then
              echo "✅ postgres-service has endpoints"
              break
            fi
            echo "Attempt $i/20: waiting for postgres-service endpoints..."
            sleep 5
          done
      - name: Run seed-admin job
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "=== Running seed-admin job ==="
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "-> Checking required secrets..."
          if [ -z "${{ secrets.SEED_ADMIN_EMAIL }}" ]; then
            echo "❌ SEED_ADMIN_EMAIL is empty!"
            exit 1
          fi
          if [ -z "${{ secrets.SEED_ADMIN_PASSWORD }}" ]; then
            echo "❌ SEED_ADMIN_PASSWORD is empty!"
            exit 1
          fi
          echo "✅ Secrets present (values hidden)"
          echo "-> Cleaning up existing seed-admin job..."
          kubectl delete job seed-admin -n fitness-platform-production --ignore-not-found=true --wait=true 2>&1 || true
          sleep 5
          echo "-> Applying seed-admin Job from YAML..."
          kubectl apply -f configs/k8s/base/jobs/seed-admin.yaml -n fitness-platform-production 2>&1
          echo "-> Waiting for seed-admin pod to be scheduled..."
          POD_NAME=""
          for i in {1..30}; do
            POD_NAME=$(kubectl get pods -n fitness-platform-production -l app=seed-admin -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$POD_NAME" ]; then
              echo "✅ Pod found: $POD_NAME"
              echo "-> Pod status: $(kubectl get pod "$POD_NAME" -n fitness-platform-production -o jsonpath='{.status.phase}' 2>/dev/null || echo 'unknown')"
              break
            fi
            echo "  Attempt $i/30: waiting for pod... (5s)"
            sleep 5
          done
          if [ -z "$POD_NAME" ]; then
            echo "❌ Failed to find seed-admin pod after 150s"
            echo "-> Checking all pods in namespace:"
            kubectl get pods -n fitness-platform-production -o wide 2>&1 || true
            exit 1
          fi
          echo "-> Starting background log streaming for pod $POD_NAME..."
          kubectl logs -f -n fitness-platform-production "$POD_NAME" --tail=100 2>&1 &
          LOG_STREAM_PID=$!
          echo "-> Monitoring pod status..."
          MONITOR_START=$(date +%s)
          while true; do
            CURRENT_PHASE=$(kubectl get pod "$POD_NAME" -n fitness-platform-production -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
            RESTART_COUNT=$(kubectl get pod "$POD_NAME" -n fitness-platform-production -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo "0")
            echo "  [$(date +%H:%M:%S)] Phase: $CURRENT_PHASE, Restarts: $RESTART_COUNT"
            if [[ "$CURRENT_PHASE" == "Failed" || "$CURRENT_PHASE" == "CrashLoopBackOff" || "$RESTART_COUNT" -gt 2 ]]; then
              echo "⚠️ Pod is in error state, fetching diagnostics..."
              echo "→ Pod describe:"
              kubectl describe pod "$POD_NAME" -n fitness-platform-production 2>&1 || true
              echo "→ Last 200 log lines:"
              kubectl logs "$POD_NAME" -n fitness-platform-production --tail=200 2>&1 || true
              echo "→ Pod events:"
              kubectl get events -n fitness-platform-production --field-selector involvedObject.name="$POD_NAME" --sort-by='.lastTimestamp' 2>&1 | tail -20 || true
              break
            fi
            if kubectl wait --for=condition=complete job/seed-admin -n fitness-platform-production --timeout=10s 2>/dev/null; then
              echo "✅ Job completed successfully"
              break
            fi
            ELAPSED=$(($(date +%s) - MONITOR_START))
            if [ "$ELAPSED" -ge 300 ]; then
              echo "⏱️  Monitoring timeout reached (300s)"
              break
            fi
            sleep 10
          done
          if [ -n "$LOG_STREAM_PID" ]; then
            kill $LOG_STREAM_PID 2>/dev/null || true
            wait $LOG_STREAM_PID 2>/dev/null || true
          fi
          echo "-> Final job status check..."
          if kubectl wait --for=condition=complete job/seed-admin -n fitness-platform-production --timeout=30s 2>/dev/null; then
            echo "✅ Admin user seeded successfully"
            echo "-> Final logs:"
            kubectl logs job/seed-admin -n fitness-platform-production --tail=100 2>&1 || true
          else
            echo "⚠️ Job did not complete successfully, detailed diagnostics..."
            POD_NAME=$(kubectl get pods -n fitness-platform-production -l app=seed-admin -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "unknown")
            echo "Current pod name: $POD_NAME"
            if [ "$POD_NAME" != "unknown" ] && [ -n "$POD_NAME" ]; then
              echo "→ Pod describe:"
              kubectl describe pod "$POD_NAME" -n fitness-platform-production 2>&1 || true
              echo "→ Pod logs (last 300 lines):"
              kubectl logs "$POD_NAME" -n fitness-platform-production --tail=300 2>&1 || true
              echo "→ Previous container logs (if any):"
              kubectl logs "$POD_NAME" -n fitness-platform-production --previous --tail=100 2>&1 || true
              echo "→ Pod events:"
              kubectl get events -n fitness-platform-production --field-selector involvedObject.name="$POD_NAME" --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
            else
              echo "→ No active seed-admin pod found"
              echo "→ Checking recent events in namespace:"
              kubectl get events -n fitness-platform-production --sort-by='.lastTimestamp' 2>&1 | grep -E "(seed-admin|Error|Failed|BackOff)" | tail -30 || true
            fi
            echo "→ Job describe:"
            kubectl describe job seed-admin -n fitness-platform-production 2>&1 || true
            echo "→ Checking if admin exists in database (idempotent check)..."
            DB_CHECK=$(kubectl exec -n fitness-platform-production postgres-0 -- \
              psql -U postgres -d fitness -tAc \
              "SELECT COUNT(*) FROM users WHERE email='${{ secrets.SEED_ADMIN_EMAIL }}'" 2>/dev/null || echo "0")
            if [ "$DB_CHECK" = "1" ]; then
              echo "✅ Admin user already exists in database (idempotent check passed)"
            else
              echo "❌ seed-admin job failed AND admin user not found in database"
              echo "Database check result: $DB_CHECK"
              exit 1
            fi
          fi
          echo "-> Cleaning up completed job..."
          kubectl delete job seed-admin -n fitness-platform-production --ignore-not-found=true 2>&1 || true
          echo "✅ seed-admin step completed"
      - name: Check service logs for errors
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          echo "Waiting for pods to stabilize..."
          sleep 30
          echo "Checking pod status..."
          kubectl get pods -n fitness-platform-production
          echo "Checking logs for critical errors..."
          ERROR_FOUND=0
          for dep in user-service training-service rabbitmq; do
            echo "=== Logs for $dep ==="
            if [[ "$dep" == "rabbitmq" ]]; then
              LOGS=$(kubectl logs statefulset/rabbitmq -n fitness-platform-production --tail=50 2>&1 || echo "Failed to get logs")
            else
              LOGS=$(kubectl logs deployment/$dep -n fitness-platform-production --tail=50 2>&1 || echo "Failed to get logs")
            fi
            echo "$LOGS"
            if echo "$LOGS" | grep -qE "too many colons|deprecated environment variables|RABBITMQ_DEFAULT_PASS_FILE|RABBITMQ_DEFAULT_USER_FILE|RABBITMQ_VM_MEMORY_HIGH_WATERMARK|Failed to listen"; then
              echo "❌ Found critical error in $dep logs"
              ERROR_FOUND=1
            fi
          done
          for app in user-service training-service biometric-service gateway device-connector classifier ml-generator valkey; do
            if ! kubectl get pods -l app=$app -n fitness-platform-production | grep -q Running; then
              echo "❌ Pod(s) for $app are not Running"
              ERROR_FOUND=1
            fi
          done
          if [ $ERROR_FOUND -eq 1 ]; then
            echo "❌ Critical errors detected, failing the deployment"
            exit 1
          else
            echo "✅ No critical errors found, all services are healthy"
          fi
      - name: Debug pod status after deploy
        if: always() && steps.connectivity.outputs.reachable == 'true'
        run: |
          for i in {1..30}; do
            if kubectl get --raw=/healthz &>/dev/null; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API not available, restarting k3s..."
              ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo systemctl restart k3s"
              sleep 30
            fi
            sleep 5
          done
          echo "=== Checking pod status ==="
          kubectl get pods -n fitness-platform-production -o wide || true
          echo ""
          echo "=== Logs for gateway deployment ==="
          kubectl logs deployment/gateway -n fitness-platform-production --tail=100 || echo "No logs for gateway"
          echo ""
          echo "=== Logs for user-service deployment ==="
          kubectl logs deployment/user-service -n fitness-platform-production --tail=100 || echo "No logs for user-service"
          echo ""
          echo "=== Logs for RabbitMQ (if exists) ==="
          kubectl logs statefulset/rabbitmq -n fitness-platform-production --tail=50 || echo "RabbitMQ not running"
          echo ""
          echo "=== Recent events ==="
          kubectl get events -n fitness-platform-production --sort-by='.lastTimestamp' | tail -20 || true
      - name: Verify production deployment
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          for i in {1..30}; do
            if kubectl get --raw=/healthz &>/dev/null; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API not available, restarting k3s..."
              ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo systemctl restart k3s"
              sleep 30
            fi
            sleep 5
          done
          echo "Verifying deployment..."
          echo "Waiting for gateway to be ready (up to 50s)..."
          kubectl get pods -n fitness-platform-production
          kubectl wait --for=condition=ready pod -l app=gateway -n fitness-platform-production --timeout=50s || echo "Gateway not ready yet"
          sleep 30

  # ============================================================================
  # TEST PRODUCTION
  # ============================================================================
  test-production:
    name: Test Production (E2E)
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-production]
    env:
      PRODUCTION_URL: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v7
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Prepare target URL
        id: target
        run: |
          URL="https://fittpulse.duckdns.org"
          echo "target=$URL" >> "$GITHUB_OUTPUT"
      - name: Verify SSL Certificate
        run: |
          echo "🔍 Checking SSL certificate validity..."
          echo | openssl s_client -servername fittpulse.duckdns.org -connect fittpulse.duckdns.org:443 2>/dev/null | openssl x509 -noout -dates -issuer
          curl -k -sSf -o /dev/null --max-time 10 "https://fittpulse.duckdns.org/health" || exit 1
          echo "✅ SSL certificate is valid and trusted"
      - name: Health check
        run: |
          echo "🔍 Checking production health via HTTPS..."
          for _ in {1..42}; do
            RESPONSE=$(curl -skf --max-time 5 "https://fittpulse.duckdns.org/health" 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ]; then
              echo "Health response: $RESPONSE"
              break
            fi
            echo "Attempt $i/42: waiting..."
            sleep 10
          done
          if [ -z "$RESPONSE" ]; then
            echo "❌ Health endpoint unreachable"
            kubectl --kubeconfig="$HOME/.kube/config" get pods -n fitness-platform-production -o wide || true
            kubectl --kubeconfig="$HOME/.kube/config" get svc -n fitness-platform-production || true
            exit 1
          fi
          echo "$RESPONSE" | grep -q '"status":"ok"' || { echo "❌ Status not ok"; echo "$RESPONSE"; exit 1; }
          echo "$RESPONSE" | grep -q '"user":"up"' || { echo "❌ User service not healthy"; exit 1; }
          echo "✅ Production is healthy"
      - name: Run UAT tests
        run: |
          python scripts/api-test.py --base-url "${{ steps.target.outputs.target }}"
      - name: Performance test (k6)
        uses: k6io/action@v0.3.1
        with:
          filename: load-test.k6
        env:
          BASE_URL: ${{ steps.target.outputs.target }}

  # ============================================================================
  # NOTIFY
  # ============================================================================
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        binary_build,
        docker,
        codeql,
        kubescape,
        deploy-production,
        test-production,
      ]
    steps:
      - uses: actions/checkout@v7
      - name: Collect job statuses
        id: statuses
        run: |
          get_emoji() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "❓";; esac; }
          BUILD="$(get_emoji '${{ needs.binary_build.result }}')"
          DOCKER="$(get_emoji '${{ needs.docker.result }}')"
          CODEQL="$(get_emoji '${{ needs.codeql.result }}')"
          KUBESCAPE="$(get_emoji '${{ needs.kubescape.result }}')"
          DEPLOY_PROD="$(get_emoji '${{ needs['deploy-production'].result }}')"
          TEST_PROD="$(get_emoji '${{ needs['test-production'].result }}')"
          FAILED_JOBS=""
          if [[ "${{ needs.binary_build.result }}" == "failure" ]]; then FAILED_JOBS="${FAILED_JOBS}Build "; fi
          if [[ "${{ needs.docker.result }}" == "failure" ]]; then FAILED_JOBS="${FAILED_JOBS}Docker "; fi
          if [[ "${{ needs['deploy-production'].result }}" == "failure" ]]; then FAILED_JOBS="${FAILED_JOBS}Deploy "; fi
          if [[ "${{ needs['test-production'].result }}" == "failure" ]]; then FAILED_JOBS="${FAILED_JOBS}Test "; fi
          if [[ -n "$FAILED_JOBS" ]]; then
            OVERALL="ОШИБКА"; STATUS="failure"
          else
            OVERALL="УСПЕШНО"; STATUS="success"
          fi
          {
            echo "overall=$OVERALL"
            echo "status=$STATUS"
            echo "build=$BUILD"
            echo "docker=$DOCKER"
            echo "codeql=$CODEQL"
            echo "kubescape=$KUBESCAPE"
            echo "deploy_prod=$DEPLOY_PROD"
            echo "test_prod=$TEST_PROD"
          } >> "$GITHUB_OUTPUT"
      - name: Send to Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>CI/CD — ${{ steps.statuses.outputs.overall }}</b>
            <code>${{ github.repository }}</code> @ <code>${{ github.ref_name }}</code>
            Commit: <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">{{ github.sha }}</a>
            <b>Основные этапы:</b>
            ${{ steps.statuses.outputs.build }} Build
            ${{ steps.statuses.outputs.docker }} Docker
            ${{ steps.statuses.outputs.deploy_prod }} Deploy Production
            ${{ steps.statuses.outputs.test_prod }} Test Production
            <b>Безопасность:</b>
            ${{ steps.statuses.outputs.codeql }} CodeQL
            ${{ steps.statuses.outputs.kubescape }} Kubescape
            🌐 <b>Сайт:</b> https://fittpulse.duckdns.org
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Открыть запуск</a>

  # ============================================================================
  # DEPENDABOT AUTO-MERGE
  # ============================================================================
  dependabot-auto-merge:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto-approve minor/patch updates
        if: contains(github.event.pull_request.title, 'minor') || contains(github.event.pull_request.title, 'patch')
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
