# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, Microservice_arc]
  pull_request:
    branches: [main, master, Microservice_arc]
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

env:
  GO_VERSION: "1.26.3"
  REGISTRY: ghcr.io
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. ВАЛИДАЦИЯ И ПРОВЕРКИ (запускаются всегда, параллельно)
  # ─────────────────────────────────────────────────────────────

  validate-workflow:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate workflow syntax
        uses: rhysd/actionlint@v1.7.12
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [validate-workflow]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gosec SAST scanner
        run: |
          mkdir -p sarif-results
          gosec -exclude-generated -fmt=sarif -out=sarif-results/gosec.sarif ./... 2>&1 || true
          if [ ! -s sarif-results/gosec.sarif ]; then
            # shellcheck disable=SC2016
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"gosec"}},"results":[]}]}' > sarif-results/gosec.sarif
          fi
      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: sarif-results/gosec.sarif
          category: gosec
      - name: Run govulncheck
        continue-on-error: true
        run: govulncheck ./... 2>&1 | tee vulncheck-results.txt
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
      - name: Run Trivy config scan
        run: trivy config --severity CRITICAL,HIGH --exit-code 1 --quiet .
      - name: Run Trivy filesystem scan
        id: trivy-fs
        run: |
          mkdir -p sarif-results
          trivy fs --scanners vuln --severity CRITICAL,HIGH --format sarif \
            --output sarif-results/trivy-fs.sarif \
            --skip-dirs '**/site-packages/**,**/.venv/**,**/venv/**' --quiet .
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results/trivy-fs.sarif
          category: trivy-fs

  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    needs: [validate-workflow]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch .env &>/dev/null; then
            echo "❌ CRITICAL: .env file is tracked in Git!"; exit 1
          fi
          echo ".env is not tracked"
      - name: TruffleHog scan
        id: trufflehog_scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - name: Alert on secrets found
        if: steps.trufflehog_scan.outcome == 'failure'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TG_CHAT_ID}\", \"text\": \"🚨 <b>Secrets detected!</b>\nRepo: ${{ github.repository }}\nRun: <a href='${RUN_URL}'>Details</a>\", \"parse_mode\": \"HTML\"}"

  check:
    name: Make Check (Lint + Test)
    runs-on: ubuntu-latest
    needs: [validate-workflow]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run make check
        run: make check
        env:
          DOCKER_HOST: ""  # Skip docker-lint if Docker unavailable in CI

  # ─────────────────────────────────────────────────────────────
  # 2. СБОРКА (после успешных проверок)
  # ─────────────────────────────────────────────────────────────

  binary_build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, check]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Go services (parallel)
        run: |
          mkdir -p bin
          GOMAXPROCS=$(nproc)
          export GOMAXPROCS
          for svc in user-service biometric-service training-service gateway device-emulator; do
            go build -ldflags="-s -w" -o "bin/$svc" ./cmd/"$svc" &
          done
          wait
      - uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: bin/
          retention-days: 1

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [binary_build]
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and push Go services
        run: |
          services="user-service biometric-service training-service gateway device-connector device-emulator"
          for svc in $services; do
            echo "Building $svc..."
            docker build -t "${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/$svc:latest" \
              -f "cmd/$svc/Dockerfile" .
            docker push "${{ env.REGISTRY }}/mamuer/project/$svc:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/$svc:latest"
          done
      - name: Build and push ML images (if models exist)
        run: |
          if [ -f "models/scaler.pkl" ] && { [ -f "models/classifier.keras" ] || ls models/classifier_*.keras >/dev/null 2>&1; }; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest" \
              -f cmd/ml-classifier/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-classifier:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-classifier:latest"
          fi
          if [ -f "models/generator.h5" ] || [ -f "models/generator.keras" ]; then
            docker build -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}" \
              -t "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest" \
              -f cmd/ml-generator/Dockerfile .
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:${{ steps.sha.outputs.short_sha }}"
            docker push "${{ env.REGISTRY }}/mamuer/project/ml-generator:latest"
          fi
      - name: Scan gateway image with Trivy
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/mamuer/project/gateway:${{ steps.sha.outputs.short_sha }}'
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          scanners: vuln
      - name: Upload Trivy image results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker

  # ─────────────────────────────────────────────────────────────
  # 3. ТЕСТОВОЕ ОКРУЖЕНИЕ (Docker Compose на runner)
  # ─────────────────────────────────────────────────────────────

  deploy-test:
    name: Deploy to Test (Docker Compose)
    runs-on: ubuntu-latest
    needs: [binary_build, provision-k8s-vps]
    steps:
      - uses: actions/checkout@v6
      - name: Start test environment
        run: docker compose -f docker-compose.test.yml up -d
      - name: Wait for services
        run: |
          docker compose -f docker-compose.test.yml up -d --wait --wait-timeout 180 || true
          docker compose -f docker-compose.test.yml ps
      - name: Smoke tests
        run: |
          set -euo pipefail
          GATEWAY_URL="http://localhost:8081"
          for _ in {1..36}; do
            curl -f --silent --max-time 3 "$GATEWAY_URL/health" > /dev/null && break
            sleep 5
          done
          curl -f --silent --max-time 5 "$GATEWAY_URL/health" || {
            docker compose -f docker-compose.test.yml logs --tail=150 gateway-test; exit 1
          }
          TIMESTAMP=$(date +%s)
          REGISTER_RESPONSE=$(curl -s -w "%{http_code}" -X POST "$GATEWAY_URL/api/v1/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke'"$TIMESTAMP"'@test.com","password":"Test123!","full_name":"Smoke","role":"client"}')
          HTTP_CODE="${REGISTER_RESPONSE: -3}"
          [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]] || exit 1
          echo "✅ Smoke tests passed"

  # ─────────────────────────────────────────────────────────────
  # 4. K8S INFRASTRUCTURE: Provision k3s on VPS
  # ─────────────────────────────────────────────────────────────

  provision-k8s-vps:
    name: Provision k3s Cluster on VPS (Step-by-Step, Safe)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    outputs:
      kubeconfig_available: ${{ steps.kubeconfig.outputs.available }}
    steps:
      - uses: actions/checkout@v6
      
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Make retry script executable
        run: chmod +x scripts/ssh-retry.sh

      # 🔹 Шаг 1: Очистка старого k3s (отдельный SSH-вызов)
      - name: Clean up old k3s (safe)
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -x  # 🔥 Включить отладку — будет видно каждую выполняемую команду
            echo "→ Stopping k3s..."
            systemctl stop k3s 2>/dev/null || true
            pkill -9 -f "k3s server" 2>/dev/null || true
            echo "→ Removing k3s files..."
            rm -rf /var/lib/rancher/k3s /etc/rancher/k3s
            rm -f /usr/local/bin/k3s /etc/systemd/system/k3s.service /etc/systemd/system/k3s*.timer
            systemctl daemon-reload
            echo "✅ Cleanup done"
          '

      # 🔹 Шаг 2: Подготовка конфига (отдельный SSH-вызов)
      - name: Prepare k3s config on VPS
        run: |
          VPS_HOST="${{ secrets.VPS_HOST }}"
          printf '%s\n' 'bind-address: 0.0.0.0' 'tls-san:' "  - ${VPS_HOST}" 'disable:' '  - traefik' '  - servicelb' '  - metrics-server' 'flannel-backend: wireguard' 'kubelet-arg:' '  - "cloud-provider=external"' 'write-kubeconfig-mode: 644' 'docker: true' > /tmp/k3s-config-remote.yaml
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
          mkdir -p /etc/rancher/k3s
          echo "✅ Directory ready"
          ./scripts/ssh-retry.sh scp /tmp/k3s-config-remote.yaml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/config.yaml"
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            mkdir -p /etc/rancher/k3s
            echo "✅ Config written:"
            cat /etc/rancher/k3s/config.yaml
          '

      # 🔹 Шаг 3: Установка k3s (отдельный SSH-вызов)
      - name: Install k3s with Docker runtime
        run: |
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "→ Installing k3s..."
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--docker" sh -s - server --write-kubeconfig-mode 644
            echo "✅ k3s installed"
          '

      # 🔹 Шаг 4: Запуск и проверка (отдельный SSH-вызов)
      - name: Start and verify k3s
        run: |
          # shellcheck disable=SC2016
          ./scripts/ssh-retry.sh ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            echo "→ Starting k3s..."
            systemctl daemon-reload
            systemctl enable --now k3s
            
            echo "→ Waiting for readiness..."
            for i in $(seq 1 120); do
              if k3s kubectl cluster-info &> /dev/null; then
                echo "✅ k3s ready after ${i}s"
                break
              fi
              [ $i -eq 120 ] && { echo "❌ Timeout"; journalctl -u k3s -n 20 --no-pager; exit 1; }
              sleep 2
            done
            
            echo "=== Cluster status ==="
            k3s kubectl get nodes -o wide
            k3s kubectl get pods -A
            echo "=== Docker check ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | head -5 || true
          '

      # 🔹 Шаг 5: Скачивание и фикс kubeconfig
      - name: Download and fix kubeconfig
        id: kubeconfig
        run: |
          ./scripts/ssh-retry.sh scp \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/rancher/k3s/k3s.yaml" \
            ./k3s-config.yaml
          
          # 🔥 Заменяем ВСЕ "неподключаемые" адреса
          sed -i "s|127.0.0.1|${{ secrets.VPS_HOST }}|g; s|localhost|${{ secrets.VPS_HOST }}|g; s|0.0.0.0|${{ secrets.VPS_HOST }}|g" ./k3s-config.yaml
          
          echo "=== Fixed kubeconfig ==="
          grep "server:" ./k3s-config.yaml
          
          if grep -q "server: https://${{ secrets.VPS_HOST }}:6443" ./k3s-config.yaml; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v7
        with:
          name: kubeconfig
          path: ./k3s-config.yaml
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # 5. STAGING DEPLOY (K8s namespace: fitness-platform-staging)
  # ─────────────────────────────────────────────────────────────

  deploy-staging:
    name: Deploy to K8s Staging
    runs-on: ubuntu-latest
    needs: [docker, provision-k8s-vps]
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    outputs:
      configured: ${{ steps.kubeconfig.outputs.configured }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Configure kubectl
        id: kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          if kubectl cluster-info &> /dev/null; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            kubectl config set-context --current --namespace=fitness-platform-staging
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Update image tags to SHA
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          find configs/k8s/deployments -name "*.yaml" -exec sed -i "s|:latest|:$SHA|g" {} \;
      - name: Deploy infrastructure (staging namespace)
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl apply -f configs/k8s/namespace.yaml || true
          kubectl create namespace fitness-platform-staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f configs/k8s/configmap.yaml -n fitness-platform-staging || true
          kubectl apply -f configs/k8s/deployments/postgres.yaml -n fitness-platform-staging
          kubectl apply -f configs/k8s/deployments/redis.yaml -n fitness-platform-staging
          kubectl apply -f configs/k8s/deployments/rabbitmq.yaml -n fitness-platform-staging
          kubectl wait --for=condition=ready pod -l app=postgres -n fitness-platform-staging --timeout=300s || true
      - name: Deploy application services (staging)
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          for f in configs/k8s/deployments/{user-service,biometric-service,training-service,gateway,ml-classifier,ml-generator}.yaml; do
            [ -f "$f" ] && kubectl apply -f "$f" -n fitness-platform-staging
          done
          kubectl apply -f configs/k8s/services/ -n fitness-platform-staging || true
          kubectl apply -f configs/k8s/nginx-lb.yaml -n fitness-platform-staging || true
      - name: Verify staging deployment
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl get pods -n fitness-platform-staging
          kubectl wait --for=condition=ready pod -l app=gateway -n fitness-platform-staging --timeout=120s || echo "⚠️ Gateway not ready yet"

  # ─────────────────────────────────────────────────────────────
  # 6. E2E TESTS ON STAGING
  # ─────────────────────────────────────────────────────────────

  test-staging:
    name: Test Staging (E2E)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: needs.deploy-staging.outputs.configured == 'true'
    env:
      STAGING_URL: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v6
      - name: Prepare target URL
        id: target
        run: |
          URL="${{ secrets.VPS_HOST }}"
          [[ "$URL" == http* ]] || URL="http://$URL"
          echo "target=$URL" >> "$GITHUB_OUTPUT"
      - name: Health check
        run: |
          curl -sf --max-time 10 "${{ steps.target.outputs.target }}/health" || {
            echo "❌ Staging health check failed"; exit 1
          }
      - name: Run UAT tests
        run: |
          python scripts/api-test.py --base-url "${{ steps.target.outputs.target }}" || echo "⚠️ UAT tests had issues"
      - name: Performance test (k6) — optional
        if: always()
        continue-on-error: true
        uses: k6io/action@v0.3.1
        with:
          filename: load-test.k6
        env:
          BASE_URL: ${{ steps.target.outputs.target }}

  # ─────────────────────────────────────────────────────────────
  # 7. PRODUCTION DEPLOY (только после успешных тестов)
  # ─────────────────────────────────────────────────────────────

  deploy-production:
    name: Deploy to K8s Production
    runs-on: ubuntu-latest
    needs: [test-staging]
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    environment: production  # ← Требует ручного апрува в UI GitHub!
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download kubeconfig artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeconfig
          path: ./kubeconfig
      - name: Configure kubectl
        id: kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          cp ./kubeconfig/k3s-config.yaml "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          if ! kubectl cluster-info &> /dev/null; then
            echo "❌ Cannot connect to cluster"; exit 1
          fi
          kubectl config set-context --current --namespace=fitness-platform-production
      - name: Create production secrets
        run: |
          kubectl create namespace fitness-platform-production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secrets -n fitness-platform-production \
            --from-literal=POSTGRES_USER=${{ vars.POSTGRES_USER || 'fitness_admin' }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=RABBITMQ_USER=${{ secrets.RABBITMQ_USER }} \
            --from-literal=RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy infrastructure (production)
        run: |
          kubectl apply -f configs/k8s/pvc.yaml -n fitness-platform-production || true
          kubectl apply -f configs/k8s/deployments/postgres.yaml -n fitness-platform-production
          kubectl apply -f configs/k8s/deployments/redis.yaml -n fitness-platform-production
          kubectl apply -f configs/k8s/deployments/rabbitmq.yaml -n fitness-platform-production
          kubectl wait --for=condition=ready pod -l app=postgres -n fitness-platform-production --timeout=300s || true
      - name: Deploy application services (production)
        run: |
          for f in configs/k8s/deployments/{user-service,biometric-service,training-service,gateway,ml-classifier,ml-generator}.yaml; do
            [ -f "$f" ] && kubectl apply -f "$f" -n fitness-platform-production
          done
          kubectl apply -f configs/k8s/services/ -n fitness-platform-production || true
          kubectl apply -f configs/k8s/nginx-lb.yaml -n fitness-platform-production || true
          # Apply policies & scaling
          kubectl apply -f configs/k8s/network-policies.yaml -n fitness-platform-production || true
          kubectl apply -f configs/k8s/hpa.yaml -n fitness-platform-production || true
          kubectl apply -f configs/k8s/pdb.yaml -n fitness-platform-production || true
      - name: Verify production deployment
        run: |
          kubectl get pods -n fitness-platform-production
          kubectl wait --for=condition=ready pod -l app=gateway -n fitness-platform-production --timeout=120s || echo "⚠️ Gateway not ready yet"

  # ─────────────────────────────────────────────────────────────
  # 8. RELEASE CANDIDATE CHECKS (после всех деплоев)
  # ─────────────────────────────────────────────────────────────

  release-candidate:
    name: Release Candidate Checks
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Final code quality checks
        run: |
          go vet ./...
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          GO_BIN="$(go env GOPATH)"
          PATH="${GO_BIN}/bin:${PATH}"
          export PATH
          golangci-lint run --timeout=5m
          FILES="$(gofmt -l ./cmd ./internal ./pkg 2>/dev/null | grep -v "cmd/tools/tools.go" || true)"
          [ -z "$FILES" ] || { echo "Unformatted files: $FILES"; exit 1; }
      - name: Run short tests
        run: go test -v -short -parallel 2 ./...

  # ─────────────────────────────────────────────────────────────
  # 9. NOTIFICATIONS (всегда, в конце)
  # ─────────────────────────────────────────────────────────────

  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [security-scan, secrets-scan, binary_build, docker, deploy-test, deploy-staging, test-staging, deploy-production]
    if: always() && (github.ref == 'refs/heads/Microservice_arc' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      - name: Collect job statuses
        id: statuses
        run: |
          # shellcheck disable=SC2016
          get_emoji() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "❓";; esac; }
          
          TEST="$(get_emoji '${{ needs['deploy-test'].result }}')"
          SEC="$(get_emoji '${{ needs['security-scan'].result }}')"
          SECRET="$(get_emoji '${{ needs['secrets-scan'].result }}')"
          BUILD="$(get_emoji '${{ needs.binary_build.result }}')"
          DOCKER="$(get_emoji '${{ needs.docker.result }}')"
          STAGING="$(get_emoji '${{ needs['deploy-staging'].result }}')"
          E2E="$(get_emoji '${{ needs['test-staging'].result }}')"
          PROD="$(get_emoji '${{ needs['deploy-production'].result }}')"
          
          if [[ "$PROD" == "✅" ]]; then
            OVERALL="✅ УСПЕШНО"; STATUS="success"
          elif [[ "$PROD" == "❌" || "$STAGING" == "❌" ]]; then
            OVERALL="❌ ОШИБКА ДЕПЛОЯ"; STATUS="failure"
          elif [[ "$DOCKER" == "❌" ]]; then
            OVERALL="❌ ОШИБКА СБОРКИ"; STATUS="failure"
          elif [[ "$E2E" == "❌" ]]; then
            OVERALL="❌ ОШИБКА ТЕСТОВ"; STATUS="failure"
          else
            OVERALL="✅ УСПЕШНО"; STATUS="success"
          fi
          
          {
            echo "overall=$OVERALL"
            echo "status=$STATUS"
            echo "test=$TEST"
            echo "sec=$SEC"
            echo "secret=$SECRET"
            echo "build=$BUILD"
            echo "docker=$DOCKER"
            echo "staging=$STAGING"
            echo "e2e=$E2E"
            echo "prod=$PROD"
          } >> "$GITHUB_OUTPUT"
      - name: Send to Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>🚀 CI/CD — ${{ steps.statuses.outputs.overall }}</b>
            <code>${{ github.repository }}</code> @ <code>${{ github.ref_name }}</code>
            Commit: <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">{{ github.sha }}</a>

            <b>Статусы:</b>
            ${{ steps.statuses.outputs.test }} Test (Compose)
            ${{ steps.statuses.outputs.sec }} Security
            ${{ steps.statuses.outputs.secret }} Secrets
            ${{ steps.statuses.outputs.build }} Build
            ${{ steps.statuses.outputs.docker }} Docker
            ${{ steps.statuses.outputs.staging }} Deploy Staging
            ${{ steps.statuses.outputs.e2e }} E2E Tests
            ${{ steps.statuses.outputs.prod }} Deploy Production

            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔗 Открыть запуск</a>