name: Security Maintenance

on:
  schedule:
    # Monthly on the first day at 09:00 UTC
    - cron: '0 9 1 * *'
    # Quarterly on the first day of January, April, July, October at 09:00 UTC
    - cron: '0 9 1 1,4,7,10 *'
  push:
    paths:
      - 'go.mod'
      - 'go.sum'

jobs:
  monthly-update:
    if: github.event.schedule == '0 9 1 * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy
      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies"
          branch: "security/maintenance/update-dependencies"
          title: "chore: update dependencies"
          body: |
            This PR updates all Go dependencies to their latest versions and tidies the go.mod file.

  quarterly-vulncheck:
    if: contains(github.event.schedule, '0 9 1 1,4,7,10 *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./... -show verbose
        # The job will fail if any vulnerabilities are found, which is desired.

  dependency-audit:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: Install osv-scanner
        run: |
          GOBIN=$HOME/go/bin go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      - name: Run osv-scanner
        run: $HOME/go/bin/osv-scanner -r ./...
        # The job will fail if any vulnerabilities are found.