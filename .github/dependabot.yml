version: 2
updates:
  # Go модули
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(go)"
      include: "scope"

    groups:
      go-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"

  # Docker (обязательно для вашего проекта)
  - package-ecosystem: "docker"
    directory: "/cmd"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      # Не ломать сборку на мажорных версиях базовых образов без теста
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]