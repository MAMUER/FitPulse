version: 2
# Чеклист для поддержания безопасности
# Раз в месяц: go get -u ./... && go mod tidy
# Раз в квартал: govulncheck ./... -show verbose
# При добавлении новых зависимостей: проверять через osv-scanner
# Документация: автоматические проверки версий запускаются через .github/workflows/docs-check.yml
# Debian base images: отслеживаются через ecosystem "docker" (python:3.14-slim и др.)

registries:
  ghcr:
    type: docker-registry
    url: https://ghcr.io
    username: ${{ github.actor }}
    password: ${{ secrets.GHCR_TOKEN }}

updates:
  # ═══════════════════════════════════════════════════════════════
  # 1. GO МОДУЛИ (основной backend)
  # ═══════════════════════════════════════════════════════════════
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(go)"
      include: "scope"
    labels:
      - "dependencies"
      - "go"
      - "automated"
    assignees:
      - "MAMUER"
    groups:
      go-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      go-major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
    allow:
      - dependency-type: "direct"

  # ═══════════════════════════════════════════════════════════════
  # 2. GITHUB ACTIONS (CI/CD)
  # ═══════════════════════════════════════════════════════════════
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
      - "automated"
    assignees:
      - "MAMUER"
    groups:
      actions-updates:
        patterns:
          - "*"

  # ═══════════════════════════════════════════════════════════════
  # 3. DOCKER — Go-сервисы
  # ═══════════════════════════════════════════════════════════════
  - package-ecosystem: "docker"
    directory: "/cmd/gateway"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message: { prefix: "deps(docker/gateway)", include: "scope" }
    labels: ["dependencies", "docker", "gateway"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  - package-ecosystem: "docker"
    directory: "/cmd/user-service"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message: { prefix: "deps(docker/user-service)", include: "scope" }
    labels: ["dependencies", "docker", "user-service"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  - package-ecosystem: "docker"
    directory: "/cmd/biometric-service"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message:
      { prefix: "deps(docker/biometric-service)", include: "scope" }
    labels: ["dependencies", "docker", "biometric-service"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  - package-ecosystem: "docker"
    directory: "/cmd/training-service"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message:
      { prefix: "deps(docker/training-service)", include: "scope" }
    labels: ["dependencies", "docker", "training-service"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  - package-ecosystem: "docker"
    directory: "/cmd/device-connector"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message:
      { prefix: "deps(docker/device-connector)", include: "scope" }
    labels: ["dependencies", "docker", "device-connector"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  - package-ecosystem: "docker"
    directory: "/cmd/device-aggregator"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message:
      { prefix: "deps(docker/device-aggregator)", include: "scope" }
    labels: ["dependencies", "docker", "device-aggregator"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  - package-ecosystem: "docker"
    directory: "/cmd/classifier"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message: { prefix: "deps(docker/classifier)", include: "scope" }
    labels: ["dependencies", "docker", "classifier"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  # ═══════════════════════════════════════════════════════════════
  # 4. PYTHON (pip) — ML-сервисы
  # ═══════════════════════════════════════════════════════════════
  - package-ecosystem: "pip"
    directory: "/cmd/ml_generator"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(pip/ml-generator)", include: "scope" }
    labels: ["dependencies", "python", "ml-generator"]
    assignees: ["MAMUER"]
    groups:
      ml-dependencies:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic"
          - "pandas"
          - "matplotlib"
          - "valkey"
          - "pika"
          - "joblib"
          - "prometheus-client"
        update-types:
          - "minor"
          - "patch"

  # ═══════════════════════════════════════════════════════════════
  # 5. DOCKER — ML-сервисы (Python-образы)
  # ═══════════════════════════════════════════════════════════════
  - package-ecosystem: "docker"
    directory: "/cmd/ml_generator"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message: { prefix: "deps(docker/ml-generator)", include: "scope" }
    labels: ["dependencies", "docker", "ml-generator"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  # ═══════════════════════════════════════════════════════════════
  # 6. KUBERNETES MANIFESTS — базовые deployment'ы
  # ═══════════════════════════════════════════════════════════════
  - package-ecosystem: "docker"
    directory: "/configs/k8s/base/deployments"
    schedule:
      {
        interval: "weekly",
        day: "monday",
        time: "08:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 5
    commit-message: { prefix: "deps(k8s/deployments)", include: "scope" }
    labels: ["dependencies", "docker", "kubernetes"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]

  # ═══════════════════════════════════════════════════════════════
  # 7. KUBERNETES MANIFESTS — ingress-nginx
  # ═══════════════════════════════════════════════════════════════
  - package-ecosystem: "docker"
    directory: "/configs/k8s/base/ingress-nginx"
    schedule:
      {
        interval: "monthly",
        day: "monday",
        time: "09:00",
        timezone: "Europe/Moscow",
      }
    open-pull-requests-limit: 3
    commit-message: { prefix: "deps(k8s/ingress-nginx)", include: "scope" }
    labels: ["dependencies", "docker", "kubernetes", "ingress-nginx"]
    assignees: ["MAMUER"]
    registries: ["ghcr"]
