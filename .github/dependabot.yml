version: 2
# Чеклист для поддержания безопасности
# Раз в месяц: go get -u ./... && go mod tidy
# Раз в квартал: govulncheck ./... с флагом -show verbose
# При добавлении новых зависимостей: проверять их через go dev audit или osv-scanner
updates:
  # Go модули
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(go)"
      include: "scope"

    groups:
      go-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"

  # Docker (обязательно для вашего проекта)
  # gateway
  - package-ecosystem: "docker"
    directory: "/cmd/gateway"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]

  # user-service
  - package-ecosystem: "docker"
    directory: "/cmd/user-service"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]

  # device-emulator
  - package-ecosystem: "docker"
    directory: "/cmd/device-emulator"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]

  # training-service
  - package-ecosystem: "docker"
    directory: "/cmd/training-service"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]

  # device-connector
  - package-ecosystem: "docker"
    directory: "/cmd/device-connector"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]

  # biometric-service
  - package-ecosystem: "docker"
    directory: "/cmd/biometric-service"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]

  # ml-classifier
  - package-ecosystem: "docker"
    directory: "/cmd/ml-classifier"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]
      - dependency-name: "python"
        versions: [">=3.13"]

  # ml-generator
  - package-ecosystem: "docker"
    directory: "/cmd/ml-generator"
    schedule:
      interval: "daily"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]
      - dependency-name: "python"
        versions: [">=3.13"]