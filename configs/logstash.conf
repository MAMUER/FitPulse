input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Ensure timestamp is parsed correctly
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Add geoip if IP is present
  if [context][ip] {
    geoip {
      source => "[context][ip]"
      target => "[context][geoip]"
    }
  }

  # Sanitize sensitive data
  mutate {
    remove_field => ["[context][userAgent]"]
    remove_field => ["[context][ip]"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "fitness-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  stdout {
    codec => rubydebug
  }
}