apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  labels:
    app: logstash
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.13.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 5044
              name: tcp
            - containerPort: 5045
              name: beats
            - containerPort: 9600
              name: api
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
            - name: settings
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: data
              mountPath: /var/lib/logstash
            - name: tmp
              mountPath: /tmp
          env:
             - name: LS_JAVA_OPTS
               value: "-Xmx128m -Xms128m"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: pipeline
          configMap:
            name: logstash-pipeline
        - name: settings
          configMap:
            name: logstash-settings
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
