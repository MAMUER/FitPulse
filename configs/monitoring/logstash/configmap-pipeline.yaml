apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  labels:
    app: logstash
data:
  logstash.conf: |
    input {
      tcp {
        port => 5044
        codec => json_lines
      }
      beats {
        port => 5045
      }
    }

    filter {
      date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
      }

      if [context][ip] {
        geoip {
          source => "[context][ip]"
          target => "[context][geoip]"
        }
      }

      mutate {
        remove_field => ["[context][userAgent]"]
      }
    }

    output {
      stdout {
        codec => rubydebug
      }
    }