apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  labels:
    app: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          continue: true
        - match:
            severity: warning
          receiver: 'default'

    receivers:
      - name: 'default'
        # Логируем алерты в stdout (для просмотра через kubectl logs)
        webhook_configs:
          - url: 'http://localhost:9093/api/v1/alerts'
            send_resolved: false

      - name: 'critical'
        # Критические алерты — можно настроить webhook на Telegram/Slack
        # Пример webhook для Telegram:
        # webhook_configs:
        #   - url: 'https://api.telegram.org/bot<TOKEN>/sendMessage'
        #     send_resolved: true
        #     http_config:
        #       tls_config:
        #         insecure_skip_verify: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace', 'service']