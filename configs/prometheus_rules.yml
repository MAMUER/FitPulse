groups:
  - name: fitpulse-alerts
    rules:
      - alert: LowMLConfidence
        expr: classification_confidence < 0.7
        for: 15m
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "ML model confidence dropped below 70%"
          description: "Model {{ $labels.class }} confidence is {{ $value }} for version {{ $labels.model_version }}"

      - alert: BackupFailed
        expr: backup_success{type='full'} == 0
        for: 5m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Database full backup failed"
          description: "Last full backup attempt failed. Check pg_dump or WAL archiving."

      - alert: BackupSuccess
        expr: backup_success{type='full'} == 1
        for: 0m
        labels:
          severity: info
          team: database
        annotations:
          summary: "Database full backup succeeded"
          description: "Latest backup job succeeded for {{ $labels.job }} (type={{ $labels.type }})."

      - alert: BiometricSyncLagHigh
        expr: biometric_sync_lag_seconds > 300
        for: 10m
        labels:
          severity: warning
          team: device-integration
        annotations:
          summary: "Biometric data sync lag > 5 minutes"
          description: "Sync lag is {{ $value }}s for {{ $labels.device_type }}"

      - alert: DBConnectionPoolExhausted
        expr: db_connection_pool_usage > 0.9
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Pool usage is {{ $value }} for {{ $labels.service }}"

      - alert: NotificationQueueDepthHigh
        expr: notification_queue_depth > 1000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "RabbitMQ queue depth too high"
          description: "Queue {{ $labels.queue_name }} (priority={{ $labels.priority }}) depth is {{ $value }}"