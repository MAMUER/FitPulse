---
# ServiceAccount for gateway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-sa
  namespace: fitness-platform

---
# ServiceAccount for user-service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service-sa
  namespace: fitness-platform

---
# ServiceAccount for biometric-service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: biometric-service-sa
  namespace: fitness-platform

---
# ServiceAccount for training-service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: training-service-sa
  namespace: fitness-platform

---
# ServiceAccount for monitoring stack
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-sa
  namespace: fitness-platform

---
# Role for minimal permissions (example: read pods, get logs)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fitness-read-only
  namespace: fitness-platform
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["logs"]
  verbs: ["get"]

---
# RoleBinding for gateway
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-role-binding
  namespace: fitness-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fitness-read-only
subjects:
- kind: ServiceAccount
  name: gateway-sa
  namespace: fitness-platform

---
# RoleBinding for monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-role-binding
  namespace: fitness-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fitness-read-only
subjects:
- kind: ServiceAccount
  name: monitoring-sa
  namespace: fitness-platform