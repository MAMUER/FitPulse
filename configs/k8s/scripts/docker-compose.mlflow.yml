version: '3.8'
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: fitpulse-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - /opt/fitpulse/mlflow-data:/mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fitness-network
networks:
  fitness-network:
    external: true
