apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
  labels:
    app.kubernetes.io/name: local-path-storage
    app.kubernetes.io/part-of: k8s-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-path-provisioner-service-account
  namespace: local-path-storage
  labels:
    app.kubernetes.io/name: local-path-provisioner
    app.kubernetes.io/part-of: k8s-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-path-provisioner-role
  labels:
    app.kubernetes.io/name: local-path-provisioner
    app.kubernetes.io/part-of: k8s-system
rules:
  - apiGroups: [""]
    resources:
      [
        "nodes",
        "persistentvolumes",
        "persistentvolumeclaims",
        "configmaps",
        "events",
        "pods",
        "pods/log",
      ]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-path-provisioner-bind
  labels:
    app.kubernetes.io/name: local-path-provisioner
    app.kubernetes.io/part-of: k8s-system
subjects:
  - kind: ServiceAccount
    name: local-path-provisioner-service-account
    namespace: local-path-storage
roleRef:
  kind: ClusterRole
  name: local-path-provisioner-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: local-path-storage
  labels:
    app.kubernetes.io/name: local-path-provisioner
    app.kubernetes.io/part-of: k8s-system
data:
  config.json: |
    {
      "nodePathMap":[
        {
          "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths":["/opt/local-path-provisioner"]
        }
      ]
    }
  setup: |
    #!/bin/sh
    while getopts "m:s:p:" opt
    do
      case $opt in
        p)
        ABS_PATH=$OPTARG
        ;;
        m)
        VOL_MODE=$OPTARG
        ;;
        s)
        SIZE=$OPTARG
        ;;
      esac
    done
    mkdir -m 0777 -p ${ABS_PATH}
  teardown: |
    #!/bin/sh
    while getopts "m:s:p:" opt
    do
      case $opt in
        p)
        ABS_PATH=$OPTARG
        ;;
        m)
        VOL_MODE=$OPTARG
        ;;
        s)
        SIZE=$OPTARG
        ;;
      esac
    done
    rm -rf ${ABS_PATH}
  helperPod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      restartPolicy: Never
      containers:
        - name: helper-pod
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args: ["echo 'Helper pod started'; sleep 3600"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-path-provisioner
  namespace: local-path-storage
  labels:
    app: local-path-provisioner
    app.kubernetes.io/name: local-path-provisioner
    app.kubernetes.io/part-of: k8s-system
  annotations:
    kubescape.io/ignore: "C-0013,C-0017,C-0055,C-0034"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-path-provisioner
  template:
    metadata:
      labels:
        app: local-path-provisioner
        app.kubernetes.io/name: local-path-provisioner
        app.kubernetes.io/part-of: k8s-system
    spec:
      serviceAccountName: local-path-provisioner-service-account
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: local-path-provisioner
          image: rancher/local-path-provisioner:v0.0.26
          imagePullPolicy: IfNotPresent
          command:
            - local-path-provisioner
            - start
            - --config
            - /etc/local-path-config/config.json
            - --helper-pod-file
            - /etc/local-path-config/helperPod.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
              add: ["DAC_OVERRIDE"]
          resources:
            requests:
              cpu: "5m"
              memory: "8Mi"
            limits:
              cpu: "20m"
              memory: "16Mi"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f "local-path-provisioner"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f "local-path-provisioner"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: local-path-config
              mountPath: /etc/local-path-config
      volumes:
        - name: local-path-config
          configMap:
            name: local-path-config
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  labels:
    app.kubernetes.io/name: local-path-provisioner
    app.kubernetes.io/part-of: k8s-system
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
---
# NetworkPolicy for local-path-storage (безопасность)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-path-provisioner-network-policy
  namespace: local-path-storage
  labels:
    app.kubernetes.io/name: local-path-provisioner
    app.kubernetes.io/part-of: k8s-system
spec:
  podSelector:
    matchLabels:
      app: local-path-provisioner
  policyTypes:
    - Egress
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
