apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: fitness-platform-production
  labels:
    app: fitness-platform
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_SSLMODE: "disable"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  GATEWAY_PORT: "8080"
  USER_SERVICE_PORT: "8081"
  BIOMETRIC_SERVICE_PORT: "50052"
  TRAINING_SERVICE_PORT: "8083"
  DEVICE_CONNECTOR_PORT: "8082"
  CLASSIFIER_PORT: "8001"
  ML_GENERATOR_HOST: "ml-generator"
  ML_GENERATOR_PORT: "8002"
  K8S_PODS_PER_SERVICE: "1"
  POSTGRESQL_TOPOLOGY: "1 инстанс (локальный)"
  REDIS_TOPOLOGY: "1 узел"
  GPU_RESOURCES: "CPU only"
  MONITORING_STACK: "Fluent Bit + Prometheus + Grafana"
  BACKUP_STRATEGY: "Нет"
  SSL_TLS: "Self-signed сертификаты"
  ACCESS_CONTROL: "Локальный доступ"
  READINESS_ENABLED: "true"
