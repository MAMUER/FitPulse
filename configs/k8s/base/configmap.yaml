apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app: app-config
  annotations:
    kubescape.io/ignore-control: C-0012
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_SSLMODE: "disable"
  REDIS_ADDR: "redis:6379"
  REDIS_DB: "0"
  USER_SERVICE_PORT: "50051"
  BIOMETRIC_SERVICE_PORT: "50052"
  TRAINING_SERVICE_PORT: "50053"
  GATEWAY_PORT: "8080"
  CLASSIFIER_PORT: "8001"
  ML_GENERATOR_PORT: "8002"
  CACHE_TTL_SECONDS: "120"
  CACHE_TTL_JITTER_SECONDS: "30"