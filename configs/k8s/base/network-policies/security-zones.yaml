---
# DMZ zone - ingress traffic (Gateway)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dmz-zone
spec:
  podSelector:
    matchLabels:
      zone: dmz
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Разрешаем ВЕСЬ входящий трафик на порты Gateway (включая NodePort из интернета)
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 30080
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Access to App Zone (gRPC services + ML)
    - to:
        - podSelector:
            matchLabels:
              zone: app-zone
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8082   # device-connector
        - protocol: TCP
          port: 50051  # user-service
        - protocol: TCP
          port: 50052  # biometric-service
        - protocol: TCP
          port: 50053  # training-service
        - protocol: TCP
          port: 8001   # ml-classifier
        - protocol: TCP
          port: 8002   # ml-generator
    # Access to Data Zone (Redis, RabbitMQ)
    - to:
        - podSelector:
            matchLabels:
              zone: data-zone
      ports:
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 5672   # RabbitMQ AMQP
        - protocol: TCP
          port: 15672  # RabbitMQ Mgmt
---
# App zone - microservices
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-zone
spec:
  podSelector:
    matchLabels:
      zone: app-zone
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              zone: dmz
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 50052
        - protocol: TCP
          port: 50053
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8082
    - from:
        - podSelector:
            matchLabels:
              zone: monitoring-zone
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              zone: data-zone
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 5672
    - to:
        - podSelector:
            matchLabels:
              zone: app-zone
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 50052
        - protocol: TCP
          port: 50053
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
---
# Data zone - databases, cache, queues
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-zone
spec:
  podSelector:
    matchLabels:
      zone: data-zone
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              zone: app-zone
        - podSelector:
            matchLabels:
              zone: dmz
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 5672  # RabbitMQ
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Monitoring zone - ELK, Prometheus, Grafana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-zone
spec:
  podSelector:
    matchLabels:
      zone: monitoring-zone
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              zone: app-zone
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 5044
        - protocol: TCP
          port: 5601
        - protocol: TCP
          port: 3000
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
  egress:
    - to:
        - podSelector:
            matchLabels:
              zone: app-zone
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              zone: data-zone
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 5672
        - protocol: TCP
          port: 9200
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53