apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
data:
  # Proxy settings
  proxy-body-size: "10m"
  proxy-read-timeout: "60"
  proxy-send-timeout: "60"
  proxy-connect-timeout: "5"

  # Hide version
  server-tokens: "false"

  # HSTS
  hsts: "true"
  hsts-max-age: "63072000"
  hsts-include-subdomains: "true"
  hsts-preload: "true"

  # ===== ModSecurity WAF =====
  enable-modsecurity: "true"
  modsecurity-snippet: |
    # ===== ModSecurity Core Rules =====
    SecRuleEngine On
    SecRequestBodyAccess On
    SecResponseBodyAccess Off

    # Request body limits
    SecRequestBodyLimit 13107200
    SecRequestBodyNoFilesLimit 131072

    # ===== Logging =====
    SecAuditEngine RelevantOnly
    SecAuditLogRelevantStatus "^(?:5|4(?!04))"
    SecAuditLogParts ABIJDEFHZ
    SecAuditLogType Serial
    SecAuditLog /var/log/nginx/modsecurity_audit.log
    SecDebugLog /var/log/nginx/modsecurity_debug.log
    SecDebugLogLevel 0

    # ===== Custom rules =====
    # Allow health checks without triggering rules
    SecRule REQUEST_URI "@beginsWith /health" \
        "id:1000001,phase:1,allow,ctl:ruleEngine=Off"

    # Block requests with SQL injection patterns in query args
    SecRule ARGS "@detectSQLi" \
        "id:1000002,phase:2,deny,status:403,log"

    # Block requests with XSS patterns in query args
    SecRule ARGS "@detectXSS" \
        "id:1000003,phase:2,deny,status:403,log"

    # Block request smuggling attempts
    SecRule REQUEST_HEADERS:Transfer-Encoding "@streq chunked" \
        "id:1000004,phase:1,deny,status:400,log"

    # ===== Load OWASP CRS v4 =====
    # Include the CRS setup configuration if present
    <IfFile /etc/nginx/modsecurity-crs/crs-setup.conf>
        Include /etc/nginx/modsecurity-crs/crs-setup.conf
    </IfFile>

    # Include all CRS rules if the directory exists
    <IfDirectory /etc/nginx/modsecurity-crs/rules>
        Include /etc/nginx/modsecurity-crs/rules/*.conf
    </IfDirectory>
  modsecurity-crs-rules-path: "/etc/nginx/modsecurity-crs/rules"
