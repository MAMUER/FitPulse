apiVersion: v1
kind: ConfigMap
metadata:
  name: modsecurity-crs
  namespace: ingress-nginx
data:
  crs-setup.conf: |
    # OWASP ModSecurity CRS v4 Setup
    # Default configuration file for the OWASP ModSecurity Core Rule Set (CRS)
    # https://github.com/coreruleset/coreruleset
    
    SecRuleEngine On
    SecRequestBodyAccess On
    SecResponseBodyAccess Off
    SecRequestBodyLimit 13107200
    SecRequestBodyNoFilesLimit 131072
    
    # Logging
    SecAuditEngine RelevantOnly
    SecAuditLogRelevantStatus "^(?:5|4(?!04))"
    SecAuditLogParts ABIJDEFHZ
    SecAuditLogType Serial
    SecAuditLog /var/log/nginx/modsecurity_audit.log
    SecDebugLog /var/log/nginx/modsecurity_debug.log
    SecDebugLogLevel 0
    
    # Exclude health check endpoint from WAF rules
    SecRule REQUEST_URI "@beginsWith /health" \
        "id:1000001,phase:1,allow,ctl:ruleEngine=Off"
    
    # Include request body in ARGS
    SecRuleUpdateTargetById 100001 ARGS
    SecRuleUpdateTargetById 100002 ARGS
    SecRuleUpdateTargetById 100003 ARGS
    SecRuleUpdateTargetById 100004 ARGS
    SecRuleUpdateTargetById 100005 ARGS
    SecRuleUpdateTargetById 100006 ARGS
    SecRuleUpdateTargetById 100007 ARGS
    SecRuleUpdateTargetById 100008 ARGS
