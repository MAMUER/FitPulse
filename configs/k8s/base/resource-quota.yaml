apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: fitness-platform-production
spec:
  hard:
    requests.cpu: "800m" # 80% от 1 vCPU
    requests.memory: 1200Mi # ~60% от 2GB (оставляем место для k3s/system)
    limits.cpu: "1200m"
    limits.memory: 1600Mi # ~80% от 2GB — максимум для всех подов
    pods: "20"
    persistentvolumeclaims: "5"
