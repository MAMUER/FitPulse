apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: fitness-platform-production
spec:
  hard:
    requests.cpu: "800m"
    requests.memory: 800Mi
    limits.cpu: "1500m"
    limits.memory: 1600Mi # Жесткий потолок: 1.6GB на все поды (остальное на систему)
    pods: "110"
    persistentvolumeclaims: "5"
