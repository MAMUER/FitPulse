apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: fitness-platform-production
  labels:
    app: rabbitmq
    tier: infrastructure
    environment: production
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: rabbitmq
    app.kubernetes.io/component: message-queue
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "3.13"
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
      tier: infrastructure
  template:
    metadata:
      labels:
        app: rabbitmq
        tier: infrastructure
        zone: data-zone
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/instance: rabbitmq
        app.kubernetes.io/component: message-queue
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "3.13"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: secrets
          secret:
            secretName: app-secrets
        - name: tmp
          emptyDir: {}
        - name: mnesia
          emptyDir: {}
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER_FILE
              value: "/etc/secrets/RABBITMQ_USER"
            - name: RABBITMQ_DEFAULT_PASS_FILE
              value: "/etc/secrets/RABBITMQ_PASS"
            - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
              value: "-rabbit ignore_cluster_mismatch true +S 1 +S 1:1"
          volumeMounts:
            - name: rabbitmq-storage
              mountPath: /var/lib/rabbitmq
            - name: tmp
              mountPath: /tmp
            - name: mnesia
              mountPath: /var/lib/rabbitmq/mnesia
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 20
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 512Mi