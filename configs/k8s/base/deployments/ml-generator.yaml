apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-generator
  namespace: fitness-platform-production
  labels:
    app: ml-generator
    tier: ml
    environment: production
    app.kubernetes.io/name: ml-generator
    app.kubernetes.io/instance: ml-generator
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: ml-generator
  template:
    metadata:
      labels:
        app: ml-generator
        zone: app-zone
        environment: production
        app.kubernetes.io/name: ml-generator
        app.kubernetes.io/instance: ml-generator
        app.kubernetes.io/component: ml
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      containers:
        - name: ml-generator
          image: ghcr.io/mamuer/project/ml-generator:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8002
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: ML_GENERATOR_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ML_GENERATOR_PORT
            - name: MPLCONFIGDIR
              value: "/tmp/matplotlib"
            - name: TF_CPP_MIN_LOG_LEVEL
              value: "2"
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
