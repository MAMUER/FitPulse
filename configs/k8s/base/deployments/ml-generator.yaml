apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-generator
  namespace: fitness-platform-production
  labels:
    app: ml-generator
    tier: ml
    environment: production
    app.kubernetes.io/name: ml-generator
    app.kubernetes.io/instance: ml-generator
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: fitness-platform
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: ml-generator
  template:
    metadata:
      labels:
        app: ml-generator
        zone: app-zone
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        readOnlyRootFilesystem: true
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: ml-generator
          image: ghcr.io/mamuer/project/ml-generator:latest
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8002
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: ML_GENERATOR_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ML_GENERATOR_PORT
            - name: MPLCONFIGDIR
              value: "/tmp/matplotlib"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 180
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"