apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: fitness-platform-production
  labels:
    app: redis
    tier: infrastructure
    environment: production
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        zone: data-zone
        environment: production
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: redis-config
          configMap:
            name: redis-config
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - redis-server
            - /etc/redis/redis.conf
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: redis-config
              mountPath: /etc/redis
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "15m"
              memory: "32Mi"
            limits:
              cpu: "20m"
              memory: "24Mi"
