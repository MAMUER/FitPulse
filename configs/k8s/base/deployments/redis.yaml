apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
    tier: infrastructure
    zone: data-zone
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        zone: data-zone
    spec:
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      volumes:
        - name: redis-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              if [ -z "$REDIS_PASSWORD" ]; then
                echo "Starting Redis WITHOUT password..."
                exec redis-server \
                  --bind 0.0.0.0 \
                  --appendonly yes \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru
              else
                echo "Starting Redis WITH password..."
                exec redis-server \
                  --bind 0.0.0.0 \
                  --appendonly yes \
                  --requirepass "$REDIS_PASSWORD" \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru
              fi
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          livenessProbe:
            tcpSocket:  # ← tcp надежнее, чем exec с паролем
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5