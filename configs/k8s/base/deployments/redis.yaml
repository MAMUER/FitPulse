apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: fitness-platform-production
  labels:
    app: redis
    tier: infrastructure
    environment: production
    zone: data-zone
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "7"
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        zone: data-zone
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "7"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
        - name: redis-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              if [ -f "/etc/secrets/REDIS_PASSWORD" ] && [ -s "/etc/secrets/REDIS_PASSWORD" ]; then
                echo "Starting Redis WITH password from file..."
                exec redis-server \
                  --bind 0.0.0.0 \
                  --appendonly yes \
                  --requirepass-file /etc/secrets/REDIS_PASSWORD \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru
              else
                echo "Starting Redis WITHOUT password..."
                exec redis-server \
                  --bind 0.0.0.0 \
                  --appendonly yes \
                  --maxmemory 256mb \
                  --maxmemory-policy allkeys-lru
              fi
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5