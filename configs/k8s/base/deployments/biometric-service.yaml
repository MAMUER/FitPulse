apiVersion: apps/v1
kind: Deployment
metadata:
  name: biometric-service
  namespace: fitness-platform-production
  labels:
    app: biometric-service
    tier: backend
    environment: production
    app.kubernetes.io/name: biometric-service
    app.kubernetes.io/instance: biometric-service
    app.kubernetes.io/component: biometric
    app.kubernetes.io/part-of: fitness-platform
spec:
  revisionHistoryLimit: 1
  replicas: 2
  selector:
    matchLabels:
      app: biometric-service
      tier: backend
  template:
    metadata:
      labels:
        app: biometric-service
        tier: backend
        zone: app-zone
        environment: production
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        readOnlyRootFilesystem: true
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
      containers:
        - name: biometric-service
          image: ghcr.io/mamuer/project/biometric-service:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 50052
              name: grpc
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: POSTGRES_USER_FILE
              value: "/etc/secrets/POSTGRES_USER"
            - name: POSTGRES_PASSWORD_FILE
              value: "/etc/secrets/POSTGRES_PASSWORD"
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSLMODE
            - name: BIOMETRIC_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BIOMETRIC_SERVICE_PORT
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PASSWORD_FILE
              value: "/etc/secrets/REDIS_PASSWORD"
            - name: RABBITMQ_URL_FILE
              value: "/etc/secrets/RABBITMQ_URL"
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"