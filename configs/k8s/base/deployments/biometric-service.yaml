apiVersion: apps/v1
kind: Deployment
metadata:
  name: biometric-service
  namespace: fitness-platform-production
  labels:
    app: biometric-service
    tier: backend
    environment: production
    app.kubernetes.io/name: biometric-service
    app.kubernetes.io/instance: biometric-service
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: biometric-service
  template:
    metadata:
      labels:
        app: biometric-service
        zone: app-zone
        environment: production
        app.kubernetes.io/name: biometric-service
        app.kubernetes.io/instance: biometric-service
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
            items:
              - key: POSTGRES_USER
                path: POSTGRES_USER
              - key: POSTGRES_PASSWORD
                path: POSTGRES_PASSWORD
              - key: POSTGRES_DB
                path: POSTGRES_DB
              - key: RABBITMQ_URL
                path: RABBITMQ_URL
              - key: REDIS_PASSWORD
                path: REDIS_PASSWORD
      containers:
        - name: biometric-service
          image: ghcr.io/mamuer/project/biometric-service:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 50052
              name: grpc
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: POSTGRES_USER_FILE
              value: "/etc/secrets/POSTGRES_USER"
            - name: POSTGRES_PASSWORD_FILE
              value: "/etc/secrets/POSTGRES_PASSWORD"
            - name: POSTGRES_DB_FILE
              value: "/etc/secrets/POSTGRES_DB"
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSLMODE
            - name: BIOMETRIC_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BIOMETRIC_SERVICE_PORT
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PASSWORD_FILE
              value: "/etc/secrets/REDIS_PASSWORD"
            - name: RABBITMQ_URL_FILE
              value: "/etc/secrets/RABBITMQ_URL"
            - name: GRPC_SERVER_ADDRESS
              value: "0.0.0.0:50052"
          livenessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "15m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "48Mi"
