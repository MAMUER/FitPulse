apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-connector
  namespace: fitness-platform-production
  labels:
    app: device-connector
    tier: backend
    component: device-connector
    environment: production
    app.kubernetes.io/name: device-connector
    app.kubernetes.io/instance: device-connector
    app.kubernetes.io/component: device-connector
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 2
  selector:
    matchLabels:
      app: device-connector
  template:
    metadata:
      labels:
        app: device-connector
        tier: backend
        component: device-connector
        zone: app-zone
        app.kubernetes.io/name: device-connector
        app.kubernetes.io/instance: device-connector
        app.kubernetes.io/component: device-connector
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "latest"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - device-connector
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
            items:
              - key: POSTGRES_USER
                path: POSTGRES_USER
              - key: POSTGRES_PASSWORD
                path: POSTGRES_PASSWORD
      containers:
        - name: device-connector
          image: ghcr.io/mamuer/project/device-connector:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8082
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: BIOMETRIC_SERVICE_ADDR
              value: "biometric-service:50052"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSLMODE
            - name: SECRETS_PATH
              value: "/etc/secrets"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"