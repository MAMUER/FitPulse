apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-connector
  namespace: fitness-platform-production
  labels:
    app: device-connector
    tier: backend
    environment: production
    app.kubernetes.io/name: device-connector
    app.kubernetes.io/instance: device-connector
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: device-connector
  template:
    metadata:
      labels:
        app: device-connector
        zone: app-zone
        environment: production
        app.kubernetes.io/name: device-connector
        app.kubernetes.io/instance: device-connector
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
            items:
              - key: POSTGRES_USER
                path: POSTGRES_USER
              - key: POSTGRES_PASSWORD
                path: POSTGRES_PASSWORD
              - key: POSTGRES_DB
                path: POSTGRES_DB
              - key: RABBITMQ_URL
                path: RABBITMQ_URL
      containers:
        - name: device-connector
          image: ghcr.io/mamuer/project/device-connector:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8082
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: POSTGRES_USER_FILE
              value: "/etc/secrets/POSTGRES_USER"
            - name: POSTGRES_PASSWORD_FILE
              value: "/etc/secrets/POSTGRES_PASSWORD"
            - name: POSTGRES_DB_FILE
              value: "/etc/secrets/POSTGRES_DB"
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSLMODE
            - name: RABBITMQ_URL_FILE
              value: "/etc/secrets/RABBITMQ_URL"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "8m"
              memory: "12Mi"
            limits:
              cpu: "40m"
              memory: "36Mi"
