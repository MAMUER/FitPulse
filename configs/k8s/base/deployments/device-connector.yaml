apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-connector
  labels:
    app: device-connector
    tier: backend
    component: device-connector
spec:
  revisionHistoryLimit: 1
  replicas: 2
  selector:
    matchLabels:
      app: device-connector
  template:
    metadata:
      labels:
        app: device-connector
        tier: backend
        component: device-connector
        zone: app-zone
    spec:
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - device-connector
                topologyKey: kubernetes.io/hostname
      containers:
        - name: device-connector
          image: ghcr.io/mamuer/project/device-connector:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: BIOMETRIC_SERVICE_ADDR
              value: "biometric-service:50052"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSLMODE
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"