apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: fitness-platform-production
  labels:
    app: valkey
    tier: infrastructure
    environment: production
    app.kubernetes.io/name: valkey
    app.kubernetes.io/instance: valkey
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
        zone: data-zone
        environment: production
        app.kubernetes.io/name: valkey
        app.kubernetes.io/instance: valkey
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: valkey-config
          configMap:
            name: valkey-config
      containers:
        - name: valkey
          image: valkey/valkey:9-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: valkey
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - valkey-server
            - /etc/valkey/valkey.conf
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: valkey-config
              mountPath: /etc/valkey
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "15m"
              memory: "32Mi"
            limits:
              cpu: "20m"
              memory: "48Mi"
