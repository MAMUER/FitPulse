apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-emulator
  labels:
    app: device-emulator
    tier: backend
    component: device-emulator
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: device-emulator
  template:
    metadata:
      labels:
        app: device-emulator
        tier: backend
        zone: app-zone
    spec:
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: device-emulator
          image: ghcr.io/mamuer/project/device-emulator:latest
          imagePullPolicy: Always
          env:
            - name: USER_ID
              value: "admin-user-id-placeholder"  # Заменится в CI/CD
            - name: DEVICE_TYPE
              value: "samsung_galaxy_watch"
            - name: CONNECTOR_URL
              value: "http://device-connector-service:8082"
            - name: SYNC_INTERVAL
              value: "30s"
            - name: AUTO_REGISTER
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"