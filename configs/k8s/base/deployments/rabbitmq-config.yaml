apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: fitness-platform-production
  labels:
    app: rabbitmq
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: fitness-platform
data:
  rabbitmq.conf: |
    # RabbitMQ configuration with environment variable interpolation
    default_user = ${RABBITMQ_DEFAULT_USER}
    default_pass = ${RABBITMQ_DEFAULT_PASS}
    # Additional settings can be added here if needed
