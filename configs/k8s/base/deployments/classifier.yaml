apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: fitness-platform-production
  labels:
    app: classifier
    tier: ml
    environment: production
    app.kubernetes.io/name: classifier
    app.kubernetes.io/instance: classifier
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: classifier
      tier: ml
  template:
    metadata:
      labels:
        app: classifier
        tier: ml
        zone: app-zone
        app.kubernetes.io/name: classifier
        app.kubernetes.io/instance: classifier
        app.kubernetes.io/component: ml
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "latest"
        app.kubernetes.io/managed-by: kustomize
        environment: production
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: classifier
          image: ghcr.io/mamuer/project/classifier:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8001
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: CLASSIFIER_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CLASSIFIER_PORT
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
