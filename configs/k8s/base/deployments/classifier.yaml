apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: fitness-platform-production
  labels:
    app: classifier
    tier: ml
    environment: production
    app.kubernetes.io/name: classifier
    app.kubernetes.io/instance: classifier
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: classifier
  template:
    metadata:
      labels:
        app: classifier
        zone: app-zone
        environment: production
        app.kubernetes.io/name: classifier
        app.kubernetes.io/instance: classifier
        app.kubernetes.io/component: ml
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: classifier
          image: ghcr.io/mamuer/project/classifier:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8001
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: CLASSIFIER_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CLASSIFIER_PORT
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "384Mi"
