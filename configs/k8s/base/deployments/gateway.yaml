apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: fitness-platform-production
  labels:
    app: gateway
    tier: frontend
    environment: production
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        zone: dmz
        environment: production
        app.kubernetes.io/name: gateway
        app.kubernetes.io/instance: gateway
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 20
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
            items:
              - key: JWT_SECRET
                path: JWT_SECRET
              - key: RABBITMQ_URL
                path: RABBITMQ_URL
              - key: REDIS_PASSWORD
                path: REDIS_PASSWORD
      containers:
        - name: gateway
          image: ghcr.io/mamuer/project/gateway:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PASSWORD_FILE
              value: "/etc/secrets/REDIS_PASSWORD"
            - name: ML_ASYNC
              value: "false"
            - name: RABBITMQ_URL_FILE
              value: "/etc/secrets/RABBITMQ_URL"
            - name: JWT_SECRET_FILE
              value: "/etc/secrets/JWT_SECRET"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              httpHeaders:
                - name: User-Agent
                  value: kube-probe/1.26
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "15m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
