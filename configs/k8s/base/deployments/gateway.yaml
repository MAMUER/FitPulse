apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      tier: api
  template:
    metadata:
      labels:
        app: gateway
        tier: api
        zone: dmz
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/metrics'
    spec:
      securityContext:
        runAsUser: 1001
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: gateway
          image: ghcr.io/mamuer/project/gateway:latest
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: GATEWAY_PORT
              value: '8080'
            - name: USER_SERVICE_ADDR
              value: "user-service:50051"
            - name: BIOMETRIC_SERVICE_ADDR
              value: "biometric-service:50052"
            - name: TRAINING_SERVICE_ADDR
              value: "training-service:50053"
            - name: DEVICE_CONNECTOR_URL
              value: "http://device-connector-service:8082"
            - name: PROMETHEUS_ENABLED
              value: 'true'
            - name: ML_CLASSIFIER_URL
              value: "http://ml-classifier:8001"
            - name: ML_GENERATOR_URL
              value: "http://ml-generator:8002"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_URL
            - name: REDIS_HOST
              value: "redis"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"