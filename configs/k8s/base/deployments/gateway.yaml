apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: fitness-platform-production
  labels:
    app: gateway
    tier: api
    environment: production
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      tier: api
  template:
    metadata:
      labels:
        app: gateway
        tier: api
        zone: dmz
        environment: production
        app.kubernetes.io/name: gateway
        app.kubernetes.io/instance: gateway
        app.kubernetes.io/component: api-gateway
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "latest"
        app.kubernetes.io/managed-by: kustomize
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/metrics'
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
        - name: tls-certs
          secret:
            secretName: gateway-tls
            optional: true
      containers:
        - name: gateway
          image: ghcr.io/mamuer/project/gateway:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          env:
            - name: GATEWAY_PORT
              value: '8080'
            - name: USER_SERVICE_ADDR
              value: "user-service:50051"
            - name: BIOMETRIC_SERVICE_ADDR
              value: "biometric-service:50052"
            - name: TRAINING_SERVICE_ADDR
              value: "training-service:50053"
            - name: DEVICE_CONNECTOR_URL
              value: "http://device-connector-service:8082"
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@postgres-service:5432/fitness?sslmode=disable"
            - name: POSTGRES_PASSWORD_FILE
              value: "/etc/secrets/POSTGRES_PASSWORD"
            - name: PROMETHEUS_ENABLED
              value: 'true'
            - name: CLASSIFIER_URL
              value: "http://classifier:8001"
            - name: ML_GENERATOR_URL
              value: "http://ml-generator:8002"
            - name: JWT_SECRET_FILE
              value: "/etc/secrets/JWT_SECRET"
            - name: TLS_CERT_FILE
              value: "/etc/tls/tls.crt"
            - name: TLS_KEY_FILE
              value: "/etc/tls/tls.key"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PASSWORD_FILE
              value: "/etc/secrets/REDIS_PASSWORD"
            - name: ML_ASYNC
              value: "false"
            - name: RABBITMQ_URL_FILE
              value: "/etc/secrets/RABBITMQ_URL"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              httpHeaders:
                - name: User-Agent
                  value: kube-probe/1.26
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"