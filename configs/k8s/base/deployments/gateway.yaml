apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      tier: api
  template:
    metadata:
      labels:
        app: gateway
        tier: api
        zone: dmz
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/metrics'
    spec:
      securityContext:
        runAsUser: 1001
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tls-certs
          secret:
            secretName: gateway-tls
            optional: true
      containers:
        - name: gateway
          image: ghcr.io/mamuer/project/gateway:latest
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          env:
            - name: GATEWAY_PORT
              value: '8080'
            - name: USER_SERVICE_ADDR
              value: "user-service:50051"
            - name: BIOMETRIC_SERVICE_ADDR
              value: "biometric-service:50052"
            - name: TRAINING_SERVICE_ADDR
              value: "training-service:50053"
            - name: DEVICE_CONNECTOR_URL
              value: "http://device-connector-service:8082"
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@postgres-service:5432/fitness?sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: PROMETHEUS_ENABLED
              value: 'true'
            - name: ML_CLASSIFIER_URL
              value: "http://ml-classifier:8001"
            - name: ML_GENERATOR_URL
              value: "http://ml-generator:8002"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: TLS_CERT_FILE
              value: "/etc/tls/tls.crt"
            - name: TLS_KEY_FILE
              value: "/etc/tls/tls.key"
            - name: REDIS_HOST
              value: "redis"
            # FIX: Добавляем пароль для Redis
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD
            - name: ML_ASYNC
              value: "false"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              httpHeaders:
                - name: User-Agent
                  value: kube-probe/1.26
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"