apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-service
  namespace: fitness-platform-production
  labels:
    app: training-service
    tier: backend
    environment: production
    app.kubernetes.io/name: training-service
    app.kubernetes.io/instance: training-service
    app.kubernetes.io/component: training
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  replicas: 2
  selector:
    matchLabels:
      app: training-service
  template:
    metadata:
      labels:
        app: training-service
        zone: app-zone
        app.kubernetes.io/name: training-service
        app.kubernetes.io/instance: training-service
        app.kubernetes.io/component: training
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "latest"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets
          secret:
            secretName: app-secrets
      containers:
        - name: training-service
          image: ghcr.io/mamuer/project/training-service:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 50053
              name: grpc
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: POSTGRES_USER_FILE
              value: "/etc/secrets/POSTGRES_USER"
            - name: POSTGRES_PASSWORD_FILE
              value: "/etc/secrets/POSTGRES_PASSWORD"
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSLMODE
            - name: TRAINING_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TRAINING_SERVICE_PORT
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PASSWORD_FILE
              value: "/etc/secrets/REDIS_PASSWORD"
            - name: ML_ASYNC
              value: "false"
            - name: ML_CLASSIFIER_URL
              value: "http://ml-classifier:8001"
            - name: ML_GENERATOR_URL
              value: "http://ml-generator:8002"
            - name: RABBITMQ_URL_FILE
              value: "/etc/secrets/RABBITMQ_URL"
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"