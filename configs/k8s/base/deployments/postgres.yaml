apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: fitness-platform-production
  labels:
    app: postgres
    tier: database
    environment: production
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "15"
    app.kubernetes.io/managed-by: kustomize
spec:
  revisionHistoryLimit: 1
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      tier: database
  template:
    metadata:
      labels:
        app: postgres
        tier: database
        zone: data-zone
        environment: production
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "15"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: app-service-account
      volumes:
        - name: secrets
          secret:
            secretName: app-secrets
        - name: tmp
          emptyDir: {}
        - name: postgres-config
          configMap:
            name: postgres-config
      initContainers:
        - name: fix-permissions
          image: postgres:15-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              chown -R 999:999 /var/lib/postgresql/data || true
              chmod 2775 /var/run/postgresql || true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /var/run/postgresql
          resources:
            requests:
              cpu: "5m"
              memory: "8Mi"
            limits:
              cpu: "20m"
              memory: "24Mi"
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: tmp
              mountPath: /var/run/postgresql
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
            - name: postgres-config
              mountPath: /etc/postgresql
              readOnly: true
          env:
            - name: POSTGRES_USER_FILE
              value: "/etc/secrets/POSTGRES_USER"
            - name: POSTGRES_PASSWORD_FILE
              value: "/etc/secrets/POSTGRES_PASSWORD"
            - name: POSTGRES_DB_FILE
              value: "/etc/secrets/POSTGRES_DB"
            - name: POSTGRES_INITDB_ARGS
              value: "--locale=en_US.utf8"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h "${DB_HOST:-localhost}" -p 5432 -U "${POSTGRES_USER:-postgres}"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h "${DB_HOST:-localhost}" -p 5432 -U "${POSTGRES_USER:-postgres}"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
