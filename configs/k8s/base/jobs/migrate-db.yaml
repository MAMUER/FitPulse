apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-db
  namespace: fitness-platform-production
  labels:
    app: migrate-db
    zone: app-zone
    app.kubernetes.io/name: migrate-db
    app.kubernetes.io/instance: migrate-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "11"
    app.kubernetes.io/managed-by: kustomize
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate-db
        zone: app-zone
        app.kubernetes.io/name: migrate-db
        app.kubernetes.io/instance: migrate-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "11"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: secrets
          secret:
            secretName: app-secrets
        - name: migrations
          configMap:
            name: db-migrations
      containers:
        - name: migrate
          image: flyway/flyway:11
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: FLYWAY_URL
              value: "jdbc:postgresql://postgres-service:5432/fitness_platform"
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/sql"
            - name: FLYWAY_CONNECT_RETRIES
              value: "60"
          command: ["flyway"]
          args:
            - "migrate"
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
