apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-db
  namespace: fitness-platform-production
  labels:
    app: migrate-db
    zone: app-zone
    app.kubernetes.io/name: migrate-db
    app.kubernetes.io/instance: migrate-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "15"
    app.kubernetes.io/managed-by: kustomize
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate-db
        zone: app-zone
        app.kubernetes.io/name: migrate-db
        app.kubernetes.io/instance: migrate-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "15"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: secrets
          secret:
            secretName: app-secrets
        - name: sql
          configMap:
            name: init-db-sql
      containers:
        - name: migrate
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              export POSTGRES_USER=$(cat /etc/secrets/POSTGRES_USER)
              export POSTGRES_DB=$(cat /etc/secrets/POSTGRES_DB)
              export PGPASSWORD=$(cat /etc/secrets/POSTGRES_PASSWORD)

              echo "-> Waiting for PostgreSQL to accept connections..."
              for i in $(seq 1 60); do
                if psql -h "postgres-service" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c "SELECT 1" >/dev/null 2>&1; then
                  echo "✅ PostgreSQL is ready"
                  break
                fi
                if [ "$i" -eq 60 ]; then
                  echo "❌ Timeout waiting for PostgreSQL"
                  exit 1
                fi
                echo "  Attempt $i/60: PostgreSQL not ready yet, waiting 5s..."
                sleep 5
              done

              psql -h postgres-service -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -f /sql/init.sql -v ON_ERROR_STOP=1
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "32Mi"
              cpu: "15m"
            limits:
              memory: "96Mi"
              cpu: "100m"
