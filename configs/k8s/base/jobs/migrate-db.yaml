apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-db
  labels:
    app: migrate-db
    zone: app-zone
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate-db
        zone: app-zone
    spec:
      restartPolicy: OnFailure
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: migrate
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          command: ["psql"]
          args:
            - "-h"
            - "postgres-service"
            - "-U"
            - "$(POSTGRES_USER)"
            - "-d"
            - "$(POSTGRES_DB)"
            - "-f"
            - "/sql/init.sql"
            - "-v"
            - "ON_ERROR_STOP=1"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: sql
          configMap:
            name: init-db-sql