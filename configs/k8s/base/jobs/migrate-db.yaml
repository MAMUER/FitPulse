apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-db
  namespace: fitness-platform-production
  labels:
    app: migrate-db
    zone: app-zone
    app.kubernetes.io/name: migrate-db
    app.kubernetes.io/instance: migrate-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fitness-platform
    app.kubernetes.io/version: "15"
    app.kubernetes.io/managed-by: kustomize
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate-db
        zone: app-zone
        app.kubernetes.io/name: migrate-db
        app.kubernetes.io/instance: migrate-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: fitness-platform
        app.kubernetes.io/version: "15"
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: secrets
          secret:
            secretName: app-secrets
        - name: sql
          configMap:
            name: init-db-sql
      containers:
        - name: migrate
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              export POSTGRES_USER=$(cat /etc/secrets/POSTGRES_USER)
              export POSTGRES_DB=$(cat /etc/secrets/POSTGRES_DB)
              export PGPASSWORD=$(cat /etc/secrets/POSTGRES_PASSWORD)
              psql -h postgres-service -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -f /sql/init.sql -v ON_ERROR_STOP=1
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h postgres-service -p 5432 -U "$(cat /etc/secrets/POSTGRES_USER)"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h postgres-service -p 5432 -U "$(cat /etc/secrets/POSTGRES_USER)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
