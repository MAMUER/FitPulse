apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: db-migrations
    files:
      - V1__full_schema.sql=../../../../db/migrations/V1__full_schema.sql
    options:
      disableNameSuffixHash: true

resources:
  - migrate-db.yaml
  - seed-admin.yaml
  - update-modsecurity-crs.yaml
