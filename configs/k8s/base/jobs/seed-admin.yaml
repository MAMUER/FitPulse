apiVersion: batch/v1
kind: Job
metadata:
  name: seed-admin
  labels:
    app: seed-admin
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600  # Удаляется через час после завершения
  template:
    metadata:
      labels:
        app: seed-admin
    spec:
      restartPolicy: OnFailure
      serviceAccountName: app-service-account
      containers:
        - name: seed-admin
          image: ghcr.io/mamuer/project/user-service:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "=== FitPulse Admin Seed ==="
              echo "Email: $SEED_ADMIN_EMAIL"
              
              # Проверяем, существует ли уже админ
              EXISTING=$(PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres-service -U $POSTGRES_USER -d $POSTGRES_DB -tAc \
                "SELECT COUNT(*) FROM users WHERE email = '$SEED_ADMIN_EMAIL'")
              
              if [ "$EXISTING" != "0" ]; then
                echo "✅ Admin user already exists: $SEED_ADMIN_EMAIL"
                exit 0
              fi
              
              # Генерируем bcrypt hash пароля (используем Go binary из образа)
              echo "Creating admin user..."
              
              # Используем встроенную утилиту user-service для хеширования
              # Или можно использовать Python/htpasswd
              HASH=$(apk add --no-cache apache2-utils >/dev/null 2>&1 && \
                     htpasswd -nbBC 10 "" "$SEED_ADMIN_PASSWORD" | tr -d ':\n' | sed 's/$2y/$2a/')
              
              if [ -z "$HASH" ]; then
                echo "❌ Failed to generate password hash"
                exit 1
              fi
              
              # Создаём админа
              PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres-service -U $POSTGRES_USER -d $POSTGRES_DB <<EOF
              BEGIN;
              
              INSERT INTO users (id, email, password_hash, full_name, role, email_confirmed, created_at, updated_at)
              VALUES (
                gen_random_uuid(),
                '$SEED_ADMIN_EMAIL',
                '$HASH',
                'System Administrator',
                'admin',
                TRUE,
                NOW(),
                NOW()
              );
              
              -- Создаём профиль
              INSERT INTO user_profiles (user_id)
              SELECT id FROM users WHERE email = '$SEED_ADMIN_EMAIL'
              ON CONFLICT (user_id) DO NOTHING;
              
              -- Создаём bootstrap invite-коды (5 штук для начала)
              INSERT INTO invite_codes (code, role, max_uses, is_active, created_at)
              SELECT 
                'INVITE-' || substr(md5(random()::text || i::text), 1, 8),
                'client',
                1,
                TRUE,
                NOW()
              FROM generate_series(1, 5) AS i
              WHERE NOT EXISTS (
                SELECT 1 FROM invite_codes WHERE code LIKE 'INVITE-%'
              );
              
              COMMIT;
              
              -- Показываем результат
              SELECT email, role, email_confirmed FROM users WHERE email = '$SEED_ADMIN_EMAIL';
              SELECT code, role, max_uses FROM invite_codes WHERE code LIKE 'INVITE-%' LIMIT 5;
              EOF
              
              echo "✅ Admin user created successfully"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: SEED_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SEED_ADMIN_EMAIL
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SEED_ADMIN_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"