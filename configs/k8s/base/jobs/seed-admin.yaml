# configs/k8s/base/jobs/seed-admin.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-admin
  labels:
    app: seed-admin
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: seed-admin
    spec:
      restartPolicy: OnFailure
      serviceAccountName: app-service-account
      imagePullSecrets:
        - name: ghcr-pull-secret
      # FIX: Использовать postgres образ с psql и nslookup
      containers:
        - name: seed-admin
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== FitPulse Admin Seed ==="
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "Email: ${SEED_ADMIN_EMAIL}"
              echo "DB Host: ${DB_HOST:-postgres-service}"
              echo "DB Port: ${DB_PORT:-5432}"
              echo "DB Name: ${POSTGRES_DB}"
              
              # === Wait for postgres-service DNS resolution ===
              echo "-> Waiting for postgres-service DNS..."
              for i in $(seq 1 30); do
                if nslookup "${DB_HOST:-postgres-service}" >/dev/null 2>&1; then
                  echo "✅ DNS resolved: ${DB_HOST:-postgres-service}"
                  break
                fi
                echo "  Attempt $i/30: DNS not resolved yet, waiting 5s..."
                sleep 5
              done
              
              # === Wait for TCP connectivity ===
              echo "-> Waiting for TCP connection to ${DB_HOST:-postgres-service}:${DB_PORT:-5432}..."
              for i in $(seq 1 30); do
                if timeout 3 bash -c "</dev/tcp/${DB_HOST:-postgres-service}/${DB_PORT:-5432}" 2>/dev/null; then
                  echo "✅ TCP connection established"
                  break
                fi
                echo "  Attempt $i/30: TCP connection failed, waiting 5s..."
                sleep 5
              done
              
              # === Wait for PostgreSQL ready ===
              echo "-> Waiting for PostgreSQL to accept connections..."
              for i in $(seq 1 30); do
                if PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${DB_HOST:-postgres-service}" \
                    -p "${DB_PORT:-5432}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
                    -c "SELECT 1" >/dev/null 2>&1; then
                  echo "✅ PostgreSQL is ready"
                  break
                fi
                echo "  Attempt $i/30: PostgreSQL not ready yet, waiting 5s..."
                sleep 5
              done
              
              # Final connection test
              if ! PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${DB_HOST:-postgres-service}" \
                  -p "${DB_PORT:-5432}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
                  -c "SELECT 1" >/dev/null 2>&1; then
                echo "❌ Cannot connect to database after retries"
                exit 1
              fi
              
              # Check if admin already exists (idempotent)
              echo "-> Checking if admin exists..."
              EXISTING=$(PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${DB_HOST:-postgres-service}" \
                -p "${DB_PORT:-5432}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -tAc \
                "SELECT COUNT(*) FROM users WHERE email = '${SEED_ADMIN_EMAIL}'" 2>/dev/null || echo "0")
              
              if [ "${EXISTING:-0}" != "0" ]; then
                echo "✅ Admin user already exists: ${SEED_ADMIN_EMAIL}"
                exit 0
              fi
              
              # Generate bcrypt hash using Python (if available) or use pgcrypto
              echo "-> Generating password hash..."
              # Using pgcrypto extension for bcrypt-like hashing
              HASH=$(PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${DB_HOST:-postgres-service}" \
                -p "${DB_PORT:-5432}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -tAc \
                "SELECT crypt('${SEED_ADMIN_PASSWORD}', gen_salt('bf', 10))" 2>/dev/null)
              
              if [ -z "${HASH}" ]; then
                echo "❌ Failed to generate password hash"
                exit 1
              fi
              echo "Hash generated"
              
              # Create admin user
              echo "-> Creating admin user..."
              PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${DB_HOST:-postgres-service}" \
                -p "${DB_PORT:-5432}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" <<EOF
              BEGIN;
              
              INSERT INTO users (id, email, password_hash, full_name, role, email_confirmed, created_at, updated_at)
              VALUES (
                gen_random_uuid(),
                '${SEED_ADMIN_EMAIL}',
                '${HASH}',
                'System Administrator',
                'admin',
                TRUE,
                NOW(),
                NOW()
              );
              
              INSERT INTO user_profiles (user_id)
              SELECT id FROM users WHERE email = '${SEED_ADMIN_EMAIL}'
              ON CONFLICT (user_id) DO NOTHING;
              
              INSERT INTO invite_codes (code, role, max_uses, is_active, created_at)
              SELECT 
                'INVITE-' || substr(md5(random()::text || i::text), 1, 8),
                'client',
                1,
                TRUE,
                NOW()
              FROM generate_series(1, 5) AS i
              WHERE NOT EXISTS (
                SELECT 1 FROM invite_codes WHERE code LIKE 'INVITE-%'
              );
              
              COMMIT;
              
              SELECT 'Admin created: ' || email FROM users WHERE email = '${SEED_ADMIN_EMAIL}';
              EOF
              
              echo "✅ Admin user created successfully"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: SEED_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SEED_ADMIN_EMAIL
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SEED_ADMIN_PASSWORD
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"