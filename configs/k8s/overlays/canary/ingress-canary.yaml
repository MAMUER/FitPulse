apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-canary-ingress
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  rules:
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-canary-service
            port:
              number: 8080
