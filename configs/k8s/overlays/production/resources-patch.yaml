apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: fitness-platform-production
spec:
  template:
    spec:
      containers:
        - name: redis
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: apps/v1
