---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      tier: api
  template:
    metadata:
      labels:
        app: gateway
        tier: api
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/metrics'
    spec:
      # volumes мерджатся по name — tls-certs из base сохранится, но на всякий случай укажем явно
      volumes:
        - name: tls-certs
          secret:
            secretName: gateway-tls
            optional: true
      containers:
        - name: gateway
          # volumeMounts мерджатся по name — tls-certs из base сохранится
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          # env мерджатся по name — все env из base сохранятся, добавляем только недостающие
          env:
            # Эти env уже есть в base, но на всякий случай укажем явно
            - name: REDIS_HOST
              value: "redis"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_URL
            - name: TLS_CERT_FILE
              value: "/etc/tls/tls.crt"
            - name: TLS_KEY_FILE
              value: "/etc/tls/tls.key"
            - name: DEVICE_CONNECTOR_URL
              value: "http://device-connector-service:8082"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          env:
            # Эти env уже есть в base, но на всякий случай укажем явно
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_URL
            - name: SMTP_TLS
              value: "true"

---
# FIX: Уменьшаем реплики до 1 для экономии RAM на 2GB VPS
# Для этих сервисов не меняем env/volumes — только replicas
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biometric-service
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-service
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-connector
spec:
  replicas: 1