apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-generator
  namespace: fitness-platform-production
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: ml-generator
          securityContext:
            runAsNonRoot: true
          resources:
             requests:
               cpu: 100m
               memory: 128Mi
             limits:
               cpu: 500m
               memory: 256Mi
