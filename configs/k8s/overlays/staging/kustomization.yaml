apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

namespace: fitness-platform-staging

commonLabels:
  environment: staging

patches:
  - path: replicas-patch.yaml

images:
  - name: ghcr.io/mamuer/project/gateway
    newTag: ${IMAGE_TAG:-latest}
