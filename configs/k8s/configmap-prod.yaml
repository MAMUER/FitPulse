apiVersion: v1
kind: ConfigMap
metadata:
  name: fitness-config-prod
  namespace: fitness-platform
data:
  # Environment matrix: Prod
  K8S_PODS_PER_SERVICE: "5+ (HPA: min=5, max=20)"
  POSTGRESQL_TOPOLOGY: "1 primary + 3 replicas (1 sync + 2 async)"
  REDIS_TOPOLOGY: "6 узлов (Cluster mode, 3 master + 3 replica)"
  GPU_RESOURCES: "4+× NVIDIA A10 (ML inference)"
  MONITORING_STACK: "Полный + on-call ротация + PagerDuty"
  BACKUP_STRATEGY: "Каждые 6 часов (WAL) + PITR"
  SSL_TLS: "Corporate CA + HSM"
  ACCESS_CONTROL: "2FA + IP whitelist + Hardware token"

  # Service configs
  LOG_LEVEL: "INFO"
  POSTGRES_USER: "fitness_prod"
  POSTGRES_DB: "fitness_prod"
  RABBITMQ_DEFAULT_USER: "fitness_prod"
  # Secrets should be stored in a Kubernetes Secret, not in a ConfigMap:
  # GRAFANA_ADMIN_PASSWORD, ELASTIC_PASSWORD