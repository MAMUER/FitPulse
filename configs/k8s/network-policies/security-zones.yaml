---
# DMZ zone - ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dmz-zone
  namespace: fitness-platform
spec:
  podSelector:
    matchLabels:
      zone: dmz
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}  # internet/external traffic
    ports:
    - protocol: TCP
      port: 8443
  egress:
  - to:
    - podSelector:
        matchLabels:
          zone: app-zone
    ports:
    - protocol: TCP
      port: 8080

---
# App zone - microservices
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-zone
  namespace: fitness-platform
spec:
  podSelector:
    matchLabels:
      zone: app-zone
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          zone: dmz
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - podSelector:
        matchLabels:
          zone: monitoring-zone
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          zone: data-zone
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 5672  # RabbitMQ
  - to:
    - podSelector:
        matchLabels:
          zone: monitoring-zone
    ports:
    - protocol: TCP
      port: 9090  # Prometheus
    - protocol: TCP
      port: 5044  # Logstash

---
# Data zone - databases, cache, queues
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-zone
  namespace: fitness-platform
spec:
  podSelector:
    matchLabels:
      zone: data-zone
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          zone: app-zone
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 5672  # RabbitMQ
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
# Monitoring zone
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-zone
  namespace: fitness-platform
spec:
  podSelector:
    matchLabels:
      zone: monitoring-zone
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: vpn-users  # Only from VPN
    ports:
    - protocol: TCP
      port: 5601  # Kibana
    - protocol: TCP
      port: 3000  # Grafana
    - protocol: TCP
      port: 9090  # Prometheus
  egress:
  - to:
    - podSelector:
        matchLabels:
          zone: app-zone
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - podSelector:
        matchLabels:
          zone: data-zone
    ports:
    - protocol: TCP
      port: 9200  # Elasticsearch
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53