apiVersion: v1
kind: ConfigMap
metadata:
  name: fitness-config-dev
  namespace: fitness-platform
data:
  # Environment matrix: Dev
  K8S_PODS_PER_SERVICE: "1"
  POSTGRESQL_TOPOLOGY: "1 инстанс (локальный)"
  REDIS_TOPOLOGY: "1 узел"
  GPU_RESOURCES: "CPU only"
  MONITORING_STACK: "Базовый (логи в консоль)"
  BACKUP_STRATEGY: "Нет"
  SSL_TLS: "Self-signed сертификаты"
  ACCESS_CONTROL: "Локальный доступ"

  # Service configs
  LOG_LEVEL: "DEBUG"
  JWT_SECRET: "dev-jwt-secret-change-in-prod"
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "fitness"
  RABBITMQ_DEFAULT_USER: "guest"
  RABBITMQ_DEFAULT_PASS: "guest"
  GRAFANA_ADMIN_PASSWORD: "admin"
  ELASTIC_PASSWORD: "changeme"