apiVersion: v1
kind: ConfigMap
metadata:
  name: fitness-config-dev
data:
  # Environment matrix: Dev
  K8S_PODS_PER_SERVICE: "1"
  POSTGRESQL_TOPOLOGY: "1 инстанс (локальный)"
  REDIS_TOPOLOGY: "1 узел"
  GPU_RESOURCES: "CPU only"
  MONITORING_STACK: "Базовый (логи в консоль)"
  BACKUP_STRATEGY: "Нет"
  SSL_TLS: "Self-signed сертификаты"
  ACCESS_CONTROL: "Локальный доступ"

  # Service configs
  LOG_LEVEL: "DEBUG"
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "fitness"
  RABBITMQ_DEFAULT_USER: "guest"
  # Secrets should be stored in a Kubernetes Secret, not in a ConfigMap:
  # JWT_SECRET, RABBITMQ_DEFAULT_PASS, GRAFANA_ADMIN_PASSWORD, ELASTIC_PASSWORD
