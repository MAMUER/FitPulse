apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: biometric-service-hpa
  namespace: fitness-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: biometric-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70