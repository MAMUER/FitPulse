# Gitleaks configuration for FitPulse project
# Detects secrets, API keys, passwords, and other sensitive information

title = "FitPulse Gitleaks Configuration"

[extend]
useDefault = true

[[rules]]
id = "smtp-password"
description = "SMTP password detected"
regex = '''SMTP_PASSWORD\s*=\s*['"]?[^\s'"]+['"]?'''
tags = ["smtp", "password"]

[[rules]]
id = "jwt-secret-value"
description = "JWT secret with high entropy detected"
regex = '''JWT_SECRET\s*=\s*['"]?[A-Za-z0-9_\-!@#$%^&*]{32,}['"]?'''
tags = ["jwt", "secret"]

[[rules]]
id = "postgres-password-value"
description = "PostgreSQL password detected"
regex = '''POSTGRES_PASSWORD\s*=\s*['"]?[^\s'"]+['"]?'''
tags = ["database", "password"]

[[rules]]
id = "redis-password-value"
description = "Redis password detected"
regex = '''REDIS_PASSWORD\s*=\s*['"]?[^\s'"]+['"]?'''
tags = ["redis", "password"]

[[rules]]
id = "rabbitmq-password-value"
description = "RabbitMQ password detected"
regex = '''RABBITMQ_DEFAULT_PASS\s*=\s*['"]?[^\s'"]+['"]?'''
tags = ["rabbitmq", "password"]

[allowlist]
description = "Allowlisted paths that should not be scanned"
paths = [
    '''^\.git''',
    '''^vendor/''',
    '''^api/gen/''',
]
